  { id:"c1-participles", title:"Verbal Nouns & Participles", icon:"📖", sections:[
      { type:"concept", title:"Verbs Becoming Nouns, Adjectives, Adverbs",
        body:"**Infinitive as verbal noun:**\n• Jó futni. (It is good to run.) — subject\n• Szeretem olvasni. (I like to read.) — object\n• Nehéz volt elhagyni. (It was hard to leave.) — subject complement\n• Jó látni téged. (Good to see you.) — subject\n\n**Personal infinitive** (must/have to — possessive endings on infinitive):\n| Person | megy (to go) | olvas (to read) |\n|--------|------------|----------------|\n| 1st PS | mennem | olvasnom |\n| 2nd PS | menned | olvasnod |\n| 3rd PS | mennie | olvasnia |\n| 1st PP | mennünk | olvasnunk |\n| 2nd PP | mennetek | olvasnotok |\n| 3rd PP | menniük | olvasniuk |\n\nUsage: Mennem kell. (I have to go.) / El kell olvasnom. (I have to read it.)\n\n**Present participle (-ó/-ő)** — currently doing (active):\n• futó ember (running person) · énekelő madár (singing bird)\n• dolgozó nő (working woman) · alvó gyerek (sleeping child)\n\n**Past participle (-tt/-t)** — completed/done:\n• eladott ház (sold house) · megevett kenyér (eaten bread)\n• megírt levél (written letter) · hozott ajándék (brought gift)\n\n**Future participle (-andó/-endő)** — must be done / to be done:\n• megoldandó feladat (task to be solved)\n• elvégzendő munkák (works to be completed)\n\n**Adverb participle (-va/-ve)** — while doing / in doing:\n• Sírva mondta. (He/she said it while crying.)\n• Nevetve jött be. (He/she came in laughing.)\n• Állva vacsorázott. (He/she had dinner standing up.)" },
      { type:"example", title:"20 Participle Examples",
        examples:[
          {hu:"Mennem kell.",en:"I have to go.",note:"personal infinitive 1PS: menn+em kell"},
          {hu:"El kell olvasnod.",en:"You have to read it.",note:"personal infinitive 2PS: olvasno+d"},
          {hu:"Neki mennie kell.",en:"He/she has to go.",note:"personal infinitive 3PS: menn+ie"},
          {hu:"Haza kell mennünk.",en:"We have to go home.",note:"personal infinitive 1PP: menn+ünk"},
          {hu:"az eladott ház",en:"the sold house",note:"past participle as adjective"},
          {hu:"a megírt levél",en:"the written letter",note:"past participle: ír → megírt"},
          {hu:"a futó gyerek",en:"the running child",note:"present participle: fut → futó"},
          {hu:"az alvó bébi",en:"the sleeping baby",note:"present participle: alszik → alvó"},
          {hu:"a dolgozó emberek",en:"the working people",note:"present participle: dolgozik → dolgozó"},
          {hu:"Sírva mondta el.",en:"He/she told it while crying.",note:"adverb participle: sír → sírva"},
          {hu:"Nevetve jött be.",en:"He/she came in laughing.",note:"adverb participle: nevet → nevetve"},
          {hu:"Állva evett.",en:"He/she ate standing up.",note:"adverb participle: áll → állva"},
          {hu:"megoldandó probléma",en:"a problem to be solved",note:"future participle: megold → megoldandó"},
          {hu:"elvégzendő feladatok",en:"tasks to be completed",note:"future participle"},
          {hu:"Jó látni téged.",en:"Good to see you.",note:"infinitive as subject"},
          {hu:"Szeretem úszni.",en:"I like to swim.",note:"infinitive as object"},
          {hu:"Nehéz volt eldönteni.",en:"It was hard to decide.",note:"infinitive after adjective"},
          {hu:"Elkezdett sírni.",en:"He/she started to cry.",note:"infinitive after verb"},
          {hu:"Próbált segíteni.",en:"He/she tried to help.",note:"infinitive after próbál"},
          {hu:"a főtt tojás",en:"the boiled egg",note:"past participle: főz → főtt"},
        ]},
      { type:"exercise", title:"Exercise 18 — Participles",
        instructions:"Choose the correct participle form.",
        ex_type:"mcq",
        questions:[
          {q:"'the singing bird' (énekel):",opts:["énekelt madár","énekelő madár","éneklendő madár"],correct:1,explain:"Present participle: énekel + -ő = énekelő (currently singing)"},
          {q:"'I must go' (personal infinitive, 1PS):",opts:["Menniük kell.","Mennem kell.","Menjek."],correct:1,explain:"1PS personal infinitive: menn+em kell = mennem kell"},
          {q:"'while laughing' (nevet):",opts:["nevető","nevetett","nevetve"],correct:2,explain:"Adverb participle: nevet + -ve = nevetve"},
        ]},
      { type:"summary",
        summary:"This chapter covered the four participle types and the personal infinitive — tools that unlock elegant, compressed expression.\n\n**What we covered:**\n• Present participle (-ó/-ő): currently doing (futó, énekelő)\n• Past participle (-tt/-t): completed (eladott, megírt)\n• Future participle (-andó/-endő): must be done (megoldandó)\n• Adverb participle (-va/-ve): while doing (sírva, nevetve)\n• Personal infinitive with possessive endings (mennem, menned, mennie...)\n• Kell + personal infinitive for expressing obligation",
        takeaways:["**Present participle = English -ing as adjective** — a futó ember (the running man). Directly modifies nouns.","**Past participle unlocks passive-like constructions** — az eladott ház (the sold house). Very common in formal and written Hungarian.","**-andó/-endő signals obligation** — megoldandó feladat = a task that must be solved. Official/bureaucratic register.","**Adverb participle replaces entire clauses** — Sírva mondta = He said it while crying. One word = four English words.","**Personal infinitive + kell is the primary way to say 'must'** — Mennem kell = I must go. The possessive ending shows who must act."] }
    ]},
    { id:"c1-wordformation", title:"Word Formation & Derivation", icon:"🏗️", sections:[
      { type:"concept", title:"Stacking Suffixes — Hungarian Agglutination",
        body:"Hungarian is **agglutinative** — complex words built by stacking suffixes.\n\n**Noun-forming suffixes:**\n| Suffix | Creates | Example |\n|--------|---------|----------|\n| -ság/-ség | abstract noun | szép→szépség (beauty) |\n| -ás/-és | verbal noun | fut→futás (running) |\n| -ó/-ő | agent/tool noun | tanít→tanító (teacher) |\n| -at/-et | result noun | épít→épület (building) |\n| -alom/-elem | abstract from verb | félelem (fear), hatalom (power) |\n\n**Adjective-forming suffixes:**\n| Suffix | Meaning | Example |\n|--------|---------|----------|\n| -s/-as/-es/-os | having/characterized | ház→házas (married), vizes (wet) |\n| -i | relating to (place/time) | magyarországi, tavaszi |\n| -talan/-telen | without / un- | otthontalan, lelketlen |\n| -ható/-hető | can be done | megoldható, eladható |\n| -beli | belonging to | falubeli (from the village) |\n\n**Verb-forming suffixes:**\n• -ít → causative: szép→szépít (to beautify), nagyít (to enlarge)\n• -ul/-ül → become/change state: szép→szépül (to become beautiful)\n• -gat/-get → frequentative: kérdez→kérdezget (keeps asking)\n• -tat/-tet → causative/commissive: dolgoz→dolgoztat (to make s.o. work)\n• -odik/-edik/-ödik → reflexive/become: megváltozik (changes)\n\n**Suffix stacking example:**\nme+enged+het+etlen+ség = megengedhetetlenség = inadmissibility\n(admit + can + not + ness)\n\n**Compound words:**\n• Hungarian freely combines nouns: házifeladat (homework = home+task)\n• The compound follows the last element's vowel harmony" },
      { type:"example", title:"20 Word Formation Examples",
        examples:[
          {hu:"szép → szépség",en:"beautiful → beauty",note:"-ség = abstract noun"},
          {hu:"boldogság",en:"happiness",note:"-ság: boldog (happy) + -ság"},
          {hu:"futás",en:"running (as a noun)",note:"-ás = verbal noun: fut+ás"},
          {hu:"olvasás",en:"reading (as activity)",note:"-ás: olvas+ás"},
          {hu:"tanító",en:"teacher (primary school)",note:"-ó: tanít+ó = one who teaches"},
          {hu:"dolgozó",en:"worker / employee",note:"-ó: dolgozik+ó"},
          {hu:"épület",en:"building",note:"-et: épít+et → épület (result)"},
          {hu:"félelem",en:"fear",note:"-elem: fél+elem (abstract)"},
          {hu:"vizes",en:"wet",note:"-es: víz+es (having water)"},
          {hu:"házas",en:"married",note:"-as: ház+as (having a house = married)"},
          {hu:"magyarországi",en:"Hungarian (relating to Hungary)",note:"-i: Magyarország+i"},
          {hu:"lelketlen",en:"soulless / heartless",note:"-telen: lélek+telen (without soul)"},
          {hu:"megoldható",en:"solvable",note:"-ható: megold+ható"},
          {hu:"szépít",en:"to beautify",note:"-ít: szép+ít (causative: make beautiful)"},
          {hu:"szépül",en:"to become beautiful",note:"-ül: szép+ül (change state)"},
          {hu:"kérdezget",en:"to keep asking",note:"-get: kérdez+get (repeated action)"},
          {hu:"dolgoztat",en:"to make someone work",note:"-tat: dolgoz+tat (causative)"},
          {hu:"megengedhetetlenség",en:"inadmissibility",note:"5 morphemes stacked!"},
          {hu:"házifeladat",en:"homework",note:"compound: házi+feladat"},
          {hu:"nagyít",en:"to enlarge",note:"-ít: nagy+ít (make big)"},
        ]},
      { type:"exercise", title:"Exercise 19 — Word Formation",
        instructions:"Identify the correct suffix meaning.",
        ex_type:"mcq",
        questions:[
          {q:"'szépség' — the suffix -ség/-ság creates:",opts:["can be done","abstract noun","agent noun","adverb"],correct:1,explain:"-ség/-ság = abstract nouns: szépség (beauty), boldogság (happiness)"},
          {q:"'megoldható' uses the suffix:",opts:["-ható (can be)","-(a)tlan (without)","-(á)s (action)"],correct:0,explain:"-ható/-hető = can be done / -able: megoldható = solvable"},
          {q:"'kérdezget' — -get adds the meaning of:",opts:["one-time action","repeated/ongoing action","causative"],correct:1,explain:"-gat/-get = frequentative: action done repeatedly or casually"},
        ]},
      { type:"summary",
        summary:"This chapter revealed how Hungarian builds complex vocabulary through systematic suffix stacking (agglutination).\n\n**What we covered:**\n• Noun-forming suffixes: -ság/-ség, -ás/-és, -ó/-ő, -at/-et, -alom/-elem\n• Adjective-forming suffixes: -s/-as/-es, -i, -talan/-telen, -ható/-hető\n• Verb-forming suffixes: -ít, -ul/-ül, -gat/-get, -tat/-tet\n• Stacking multiple suffixes: megengedhetetlenség (5 morphemes)\n• Compound word formation",
        takeaways:["**-ság/-ség is the most productive abstract noun suffix** — any adjective can become a concept: szépség, boldogság, magányosság.","**-ít and -ul/-ül are mirror images** — szépít = to make beautiful (causative); szépül = to become beautiful (change of state).","**-gat/-get signals repeated or casual action** — kérdezget ≠ kérdez. The frequentative adds nuance English needs extra words for.","**Compound analysis is a reading superpower** — break házifeladat → házi (house/home) + feladat (task) = homework. Hungarian compounds are transparent.","**The suffix -i relates to place or time** — tavaszi (spring-), magyarországi (Hungarian), reggeli (morning). Extremely productive."] }
    ]},
{ id:"c1-inversion", title:"Information Structure & Topicalization", icon:"📐", sections:[
      { type:"concept", title:"Topic, Focus, and Presupposition in Discourse",
        body:`At C1 level, word order mastery means understanding how Hungarian encodes information structure — what is given vs. new, emphasized vs. backgrounded.

**Three structural positions in Hungarian:**
1. **Topic** — what the sentence is about (given/known information)
   • Usually sentence-initial
   • Can be ANY constituent: noun phrase, adverb, clause
2. **Focus** — what is being asserted (new/contrastive information)
   • Immediately before the finite verb
   • Carries the main communicative weight
3. **Comment** — the rest of the information

**Example contrasts:**
• Péter tegnap moziba ment. (Topic=Péter, Comment=went to cinema yesterday)
• PÉTER ment moziba tegnap. (Focus=Péter — it was Peter, not someone else)
• Tegnap ment Péter moziba. (Focus=tegnap — it was yesterday, not another day)
• Moziba ment tegnap Péter. (Focus=moziba — it was to the cinema, not elsewhere)

**Topicalization vs. focalization:**
• Topic markers: ami/aki...azt/azt (as for X...): Ami Pétert illeti, ő jó ember.
• Double topic: A filmeket — azokat szeretem, a könyveket meg nem.
  (As for films — I like those, books not so much.)

**"Splitting" constructions:**
• Az, hogy... constructions: Az, hogy eljöttél, nagy öröm.
  (The fact that you came is a great joy.)
• Olyan... hogy: Olyan sok volt, hogy alig bírtam enni.
  (There was so much that I could barely eat.)

**Contrast focus with nem...hanem:**
• Nem Péter jött, hanem Anna. (It wasn't Peter who came, but Anna.)
• Nem moziba mentünk, hanem színházba.

**Emphatic particles:**
• is (also/even): Én is jöttem. / Még Péter is eljött.
• sem (not even/neither): Én sem jöttem. / Még Péter sem jött el.
• csak (only): Csak Péter jött. · Csak akkor megyek, ha te is jössz.
• még...is / sem (even): Még ő is elvesztette.` },
      { type:"example", title:"20 Information Structure Examples",
        examples:[

      { type:"concept", title:"Formal, Informal and Bureaucratic Hungarian",
        body:"**Three main registers:**\n\n**Informal (tegeződés) — use with:**\nFriends, family, peers, children, classmates\n• Uses te (you sg.), ti (you pl.)\n• Verb forms: mész (you go), csinálod (you do it), gyere! (come!)\n• Shortened/colloquial: tévé (TV), köszi (thanks), szia (hi/bye), srác (guy/kid)\n\n**Formal/polite (önözés) — use with:**\nStrangers, elders, bosses, officials, in shops/offices\n• Uses Ön (formal sg.) — verbs in 3rd PS: Ön megy? (Are you going?)\n• Plural: Önök, with 3rd PP verbs: Önök mennek?\n• RULE: NEVER use te with strangers until they invite you to!\n\n**Semi-formal: Magázás** (now old-fashioned but still used by older people)\n• Uses Maga (sg.), Maguk (pl.) — 3rd person verbs\n• More intimate than Önözés, less intimate than Tegeződés\n\n**Bureaucratic/written (hivatalos):**\n• Heavy use of verbal nouns: az irat benyújtása (the submission of the doc)\n• -andó/-endő participles: elvégzendő feladatok (tasks to be completed)\n• Passive-like 3PP: Az ügyet kivizsgálták. (The matter was investigated.)\n\n**Address forms (titles):**\n• Orvos úr / Doktor úr — Doctor (male)\n• Orvos asszony / Doktornő — Doctor (female)\n• Tanár úr / Tanárnő — Teacher (Sir/Ma'am) — still used in schools!\n• Igazgató úr — Director (male)\n• Elnök úr — President/Chairman\n\n**'Tegezés' invitation:** Tegezhetsz! / Tegezhetjük egymást!" },

        body:"**Famous proverbs (közmondások):**\n\nNem esik messze az alma a fájától.\n→ The apple doesn't fall far from the tree. (Like father, like son.)\n\nAddig jár a korsó a kútra, amíg el nem törik.\n→ The jug goes to the well until it breaks. (Don't push your luck.)\n\nNem mind arany, ami fénylik.\n→ Not all that glitters is gold.\n\nAhány ház, annyi szokás.\n→ As many houses, as many customs. (Different strokes for different folks.)\n\nJobb ma egy veréb, mint holnap egy túzok.\n→ Better a sparrow today than a bustard tomorrow. (A bird in hand...)\n\nKi korán kel, aranyat lel.\n→ He who rises early finds gold. (The early bird catches the worm.)\n\nSzükség törvényt bont.\n→ Necessity breaks law. (Necessity knows no law.)\n\n**Common idioms (szólások):**\n• Veri a mellét. (He beats his chest.) = He boasts.\n• Befogja a száját. (He closes his mouth.) = He shuts up.\n• Két legyet üt egy csapásra. = Kill two birds with one stone.\n• Nincs az ujján semmi (He has nothing on his finger) = He has no ring = He's single\n• Megadja magát. = He gives up / surrenders.\n\n**Hungary — key cultural facts:**\n• Capital: Budapest (Buda + Pest — unified 1873 with Óbuda)\n• Language family: Uralic/Finno-Ugric (related to Finnish and Estonian!)\n• Hungarian name: Magyarország\n• Currency: forint (HUF)\n• Famous Hungarians: Liszt Ferenc, Bartók Béla, Rubik Ernő, Zrínyi Miklós\n\n**Folk culture:**\n• Hímzés (folk embroidery) — Kalocsa and Matyó styles\n• Paprika — the national spice, introduced from Americas via Turks\n• Puszta — the Great Hungarian Plain, home of the csikós (horse herder)\n• Tokaj — world-famous wine region (UNESCO World Heritage)\n• Thermal baths (fürdő) — 118 natural springs in Budapest alone" },

    { id:"c2-historical", title:"Historical Hungarian & Language History", icon:"📜", sections:[
          { type:"concept", title:"Where Hungarian Comes From — Origins and Development",
            body:`**Language family:**
    Hungarian (Magyar) is a Uralic language, belonging to the Finno-Ugric branch along with Finnish, Estonian, Khanty, and Mansi. It split from its closest relatives approximately 3,000–4,000 years ago.
    
    **Timeline of Hungarian:**
    • ~2500 BCE: Proto-Ugric (ancestor of Hungarian, Khanty, Mansi)
    • ~1000 CE: Hungarian tribes settle in the Carpathian Basin (honfoglalás = the taking of the homeland)
    • 1000 CE: Stephen I (István I) crowned — Hungary becomes a Christian kingdom
    • 11th–15th c: Old Hungarian period — earliest texts, Latin influence
    • 1490s–1526: Renaissance period — first Hungarian-language printed books
    • 16th–18th c: Turkish occupation, German Habsburg influence
    • 1772–1820s: Hungarian Enlightenment — language reform movement (nyelvújítás)
    • 1844: Hungarian becomes official language of Hungary
    • 1920: Treaty of Trianon — Hungary loses 2/3 of territory; large Hungarian minorities formed in Romania, Slovakia, Serbia, Ukraine
    
    **The Language Reform (Nyelvújítás, 1772–1840s):**
    Ferenc Kazinczy and others coined ~10,000 new Hungarian words to replace German/Latin equivalents:
    • múzeum → múzeum · szótár (dictionary) · iroda (office) · lap (newspaper/sheet)
    • Most Hungarian scientific and intellectual vocabulary dates from this era.
    
    **Loanword layers in Hungarian:**
    | Period | Source | Examples |
    |--------|--------|---------|
    | Ugric era | Finno-Ugric | víz, fa, hal, kéz, fej |
    | Migration | Turkic (Bulgar-Turkic) | búza (wheat), ökör (ox), gyümölcs (fruit) |
    | Christianity | Latin/German | mise (mass), püspök (bishop), király (king from Slavic) |
    | Ottoman era | Turkish | kávé (coffee), dohány (tobacco), papucs (slippers) |
    | Modern | German/Latin/English | autó, telefon, számítógép (computer) |
    
    **Why Hungarian seems hard:**
    • 18 grammatical cases (though many are postposition-derived)
    • Agglutinative: megszentségteleníthetetlenségeskedéseitekért (22 syllables, one word)
    • Vowel harmony affects every suffix
    • No grammatical gender
    • SOV/SVO/VSO all valid depending on information structure` },

        body:`**Key Hungarian literary figures every educated speaker knows:**
• Petőfi Sándor (1823–1849) — national poet; Nemzeti dal (National Song) recited on March 15th
• Arany János (1817–1882) — epic poet; master of the Hungarian language
• Ady Endre (1877–1919) — symbolist poet; modernized Hungarian poetry
• Babits Mihály (1883–1941) — poet, translator, literary critic
• Radnóti Miklós (1909–1944) — poet; murdered in Holocaust; Razglednicák (Postcards)
• Márai Sándor (1900–1989) — novelist; Embers (A gyertyák csonkig égnek)
• Kertész Imre (1929–2016) — Nobel Prize 2002; Sorstalanság (Fatelessness)
• Nádas Péter (1942–) — Emlékiratok könyve (Book of Memories)

**Literary/formal Hungarian features:**
• Inverted word order for elevation: Nagy a mi hegyünk (Our mountain is great) — literary
• Archaic 2PP -atok/-etek/-ötök used as formal singular (you): Miképpen van Önök egészsége?
• -ván/-vén adverb participle (archaic): Látván ezt... (Having seen this...)
• -andó/-endő future participle in formal/official text
• Passive-like constructions in official Hungarian: az alulírott (the undersigned)

**Rhetorical devices:**
• alliteráció (alliteration): Sárga sásban sárgán sírt (yellow, in yellow reeds, weeping yellow)
• chiazmus (chiasmus): az ember él, a világ forog (man lives, the world turns)
• apostrophe: Hazám, hazám, te mindenem! (My homeland, my homeland, you are my everything!)

    {q:"'Whose bag is this?' — which question word?",opts:["Kié ez a táska?","Hol ez a táska?","Mi ez a táska?","Kinek ez a táska?"],correct:0,explain:"Kié? = Whose? The special possession question word. Not to be confused with kinek (to whom)."},
    {q:"'My husband is a doctor' — article usage:",opts:["A férjem egy orvos.","A férjem az orvos.","A férjem orvos.","Férjem egy orvos."],correct:2,explain:"Professions as predicate OMIT the article: A férjem orvos. This is a core Hungarian rule."},
    {q:"'The book is on the table' — which article before 'book'?",opts:["egy","a","az","no article"],correct:1,explain:"'a' before consonants: a könyv. 'az' before vowels. Definite article used for specific/known objects."},
    {q:"'Two apples' — noun form after number:",opts:["két almák","két alma","kettő almák","kettő alma"],correct:1,explain:"After a number, the noun stays SINGULAR: két alma (two apple). Never két almák."},
    {q:"'Twice' in Hungarian:",opts:["kétszer","kettőszer","két","kétszeres"],correct:0,explain:"kétszer = twice. Multiplicatives: egyszer (once), kétszer (twice), háromszor (three times)."},
    {q:"'The third floor' — correct ordinal:",opts:["három emelet","harmadik emelet","háromadik emelet","három-dik emelet"],correct:1,explain:"harmadik = third. Ordinals: első (1st), második (2nd), harmadik (3rd). These use -dik/-adik/-edik."},
    {q:"'2024. március 15.' in Hungarian date format — the period after the year means:",opts:["Decimal separator","End of sentence","The year is an ordinal/date marker","Abbreviation"],correct:2,explain:"In Hungarian dates, a period after the year is standard punctuation marking it as a date ordinal."}

    {q:"'I'm going tomorrow' — most natural Hungarian:",opts:["Menni fogok holnap.","Holnap megyek.","Majd megyek holnap.","Holnap mentem."],correct:1,explain:"For near/planned future, present tense is most natural: Holnap megyek."},
    {q:"'She will definitely read it' — fog + infinitive:",opts:["Olvasni fog.","Olvasott.","Olvasna.","Majd olvassa."],correct:0,explain:"Deliberate/certain future: olvasni fog (definite form: fogja would also work with the object)."},

    {q:"'meg-' prefix in 'megír' (write up/finish) primarily adds:",opts:["Direction away","A sense of completion","Repeated action","Upward direction"],correct:1,explain:"meg- primarily adds COMPLETION/ACHIEVEMENT aspect. megír = to finish writing (vs. ír = to write)."},
    {q:"Normal sentence 'I'm going away' — correct form:",opts:["El megyek.","Elmegyek.","Megyek el.","El én megyek."],correct:1,explain:"In normal affirmative sentences, prefix attaches to verb: Elmegyek."},
    {q:"'I'm NOT going away' — correct negation:",opts:["Nem elmegyek.","Nem megyek el.","Elmegyek nem.","El nem megyek."],correct:1,explain:"With negation, prefix ALWAYS separates: nem + verb + prefix: Nem megyek el."},
    {q:"Imperative 'Go away!' — correct form:",opts:["Elmenj!","Menjel!","Menj el!","El menj!"],correct:2,explain:"In imperative, prefix goes AFTER the verb: Menj el! (megy → menj, then el after)"},
    // === Moods (4q: imperative formation, negative imperative, conditional for polite, conditional clause)
    {q:"Informal imperative of 'megy' (to go) — 'go!':",opts:["Megy!","Menj!","Menjen!","Mennél!"],correct:1,explain:"Informal imperative of megy = menj! (irregular: megy→menj). Formal would be Menjen!"},
    {q:"'Don't eat it!' — negative imperative:",opts:["Nem edd meg!","Ne edd meg!","Ne megedd!","Edd nem meg!"],correct:1,explain:"Negative imperative: ne (not nem!) + imperative form. Ne edd meg! (edd = definite imperative of eszik)"},
    {q:"Most polite way to say 'I would like a coffee':",opts:["Kérek egy kávét.","Kérnék egy kávét.","Kérj egy kávét!","Adj egy kávét!"],correct:1,explain:"Conditional (kérnék) = polite request. 'I would like' sounds much more polite than the direct 'I want'."},
    {q:"'If I knew, I would help' — conditional clause:",opts:["Ha tudok, segítek.","Ha tudnék, segítenék.","Ha tudtam, segítettem.","Ha tud, segít."],correct:1,explain:"Both clauses must be conditional: ha tudnék (if I could) → segítenék (I would help)."},

    {q:"'The book IS IN the bag' — static inside:",opts:["a táskába","a táskában","a táskából","a táskánál"],correct:1,explain:"-ban/-ben = static location INSIDE a container. a táskában = in the bag."},
    {q:"'I'm going INTO the house' — motion into:",opts:["a házban","a házba","a házból","a házhoz"],correct:1,explain:"-ba/-be = motion toward the INSIDE. a házba = into the house."},
    {q:"'I'm waiting AT the stop' — static near/by:",opts:["a megállón","a megállóra","a megállóba","a megállónál"],correct:3,explain:"-nál/-nél = static position NEAR/BY something. a megállónál = at the bus stop."},
    {q:"Hungary uses surface suffix (-n/-ra/-ről) instead of inside (-ban/-ba/-ból) because:",opts:["Hungary is inside a building","Hungary is treated as a flat open area (plain)","It's an exception with no rule","Hungarian has only 6 location suffixes"],correct:1,explain:"Countries/regions on a plain use the surface triplet: Magyarországon/ra/ról (on/to/from Hungary)."},

    // === New questions for B1 new chapters ===
    {q:"Past tense of 'megy' (3rd person singular):",opts:["megyed","megy","ment","menett"],correct:2,explain:"megy (go) → ment (went). Highly irregular — must be memorized."},
    {q:"Imperative of 'jön' — 'Come here!': ___ ide!",opts:["Jöjj","Jön","Gyere","Jössz"],correct:2,explain:"jön has the highly irregular imperative: gyere! Completely different from the stem. Very common."},
    {q:"1st person singular present of 'eszik' (to eat):",opts:["eszek","eszem","eszik","evek"],correct:0,explain:"eszek (indefinite 1PS). eszik is an -ik verb. Without a definite object: eszek. With definite: eszem."},
    {q:"'Van' in the past tense (3rd person singular):",opts:["van","lenne","volt","len"],correct:2,explain:"van (is) → volt (was). Future: lesz. Three completely different stems (suppletive paradigm)."},
    {q:"Which verbs take -m (not -k) in the 1st person singular?",opts:["All regular verbs","Only transitive verbs","-ik verbs","V-stem verbs"],correct:2,explain:"-ik verbs (eszik, iszik, alszik, fekszik) take -m in 1PS: eszem, iszom, alszom. NOT -k like regular verbs."},
    {q:"'I took it' (definite) from 'vesz':",opts:["vettem","veszem","vettem el","vettük"],correct:0,explain:"vesz (takes/buys) → vettem (I took it, definite past 1PS). V-stem: vet-tem."},
    {q:"'The woman WHO works here is my mother.'",opts:["ami","aki","ahol","amit"],correct:1,explain:"aki = who (for persons). A nő, aki itt dolgozik = The woman who works here."},
    {q:"'The book THAT I read was interesting.'",opts:["aki","akit","amit","akivel"],correct:2,explain:"amit = which/that (accusative of ami, for things). A könyv, amit olvastam = The book that I read."},
    {q:"'The city WHERE I live is beautiful.'",opts:["ahol","ahova","ahonnan","akiben"],correct:0,explain:"ahol = where (static location). A város, ahol lakom = The city where I live."},
    {q:"Relative clauses in Hungarian are ALWAYS:",opts:["written without commas","set off by commas","optional with commas","only at sentence end"],correct:1,explain:"Hungarian always uses commas around relative clauses: A fiú, aki ott áll, Péter."},
    {q:"The past tense suffix for definite 3PS 'lát' (sees):",opts:["látott","látta","látott el","látjuk"],correct:1,explain:"látta = he/she saw it (definite past 3PS). látott = he/she saw (indefinite past 3PS)."},
    {q:"'I will go' (future) — most common expression:",opts:["fogok menni","el fogok menni","menni fogok","Menni fogok"],correct:0,explain:"fogok menni = I will go (periphrastic future: fog + infinitive). Most natural future expression."},
    {q:"The prefix 'meg-' typically indicates:",opts:["Direction away","Repeated action","Completion/perfectivity","Returning motion"],correct:2,explain:"meg- marks completion/perfectivity: eszik (eats) → megeszik (eats up, finishes eating)."},
    {q:"'Nem megyek el.' — the prefix separates because:",opts:["el- never stays attached","In negation, prefixes separate from the verb","It's an irregular form","The prefix changes meaning"],correct:1,explain:"In negation, focus position, and imperative, verbal prefixes SEPARATE: Nem megyek el (not el-megyek)."},
    {q:"'El fogok menni.' — why is the prefix separated?",opts:["With fog + infinitive, the prefix detaches from the infinitive","el- is always separate","It's the past tense","Preference"],correct:0,explain:"With the periphrastic future (fog + inf), the prefix detaches: el fogok menni, not fogok elmenni."},
    {q:"What does 'vissza-' mean as a verbal prefix?",opts:["forward","down","back (returning)","through"],correct:2,explain:"vissza- = back, returning. visszamegy = goes back, visszajön = comes back."},
    {q:"'I can swim' (learned ability, skill) — correct form:",opts:["Úszhatok.","Tudok úszni.","Lehet úszni.","Szabad úszni."],correct:1,explain:"tud = knows how to / can (learned ability/skill). -hat/-het = permission/possibility. Tudok úszni."},
    {q:"'Smoking is not allowed' — correct form:",opts:["Nem lehet dohányozni.","Tilos dohányozni.","Nem szabad dohányozni.","Both B and C"],correct:3,explain:"Both 'Tilos dohányozni' and 'Nem szabad dohányozni' = Smoking is forbidden. Both are correct."},
    {q:"'I am going into the house' — which suffix?",opts:["a házban","a házba","a házból","a házon"],correct:1,explain:"-ba/-be = into (motion toward inside). -ban/-ben = inside (static). -ból/-ből = from inside."},
    {q:"'I'm standing next to the tree' — which postposition?",opts:["a fa előtt","a fa mögött","a fa mellett","a fa felett"],correct:2,explain:"mellett = next to/beside. előtt = in front of. mögött = behind. felett = above."},
    {q:"Negative imperative 'Don't go!' in Hungarian:",opts:["Nem megy!","Ne menj!","Menj nem!","Menjél nem!"],correct:1,explain:"ne + imperative form = negative command. Ne menj! = Don't go! (ne, not nem, for imperatives)"},
    {q:"'If I had money, I would buy it' — which mood?",opts:["Imperative","Conditional","Past tense","Future"],correct:1,explain:"Conditional: Ha lenne pénzem, megvenném. -na/-ne/-ná/-né endings. Used for hypotheticals."}

  // B2: 12 questions — 4 per chapter
  B2:[
    // === Word Order (4q: pre-verbal focus, negation, question word, prefix separates)
    {q:"'IT'S PETER who sees the house' — PETER is the focus:",opts:["Péter látja a házat.","A házat látja Péter.","Látja Péter a házat.","A házban látja Péter."],correct:0,explain:"Péter directly BEFORE the verb látja = Péter is in focus position = emphasized."},
    {q:"'IT'S THE HOUSE that Peter sees' — house in focus:",opts:["Péter látja a házat.","A házat látja Péter.","Látja Péter a házat.","Péter a házat látja."],correct:1,explain:"A házat (the house) directly before verb látja = house is focused/emphasized."},
    {q:"Correct negation of 'elmegyek' (I'm going away):",opts:["Nem elmegyek.","Nem megyek el.","Elmegyek nem.","El nem megyek."],correct:1,explain:"Negation: nem directly before verb, prefix ALWAYS separates: Nem megyek el."},
    {q:"'Where are you going?' — question word position:",opts:["Mész hova?","Te hova mész?","Hova mész?","Mész te hova?"],correct:2,explain:"Question word (hova) ALWAYS goes directly before the verb: Hova mész?"},
    // === Conjunctions (4q: causal, conditional, double, hogy uses)
    {q:"'He can't come BECAUSE he is sick' — correct conjunction:",opts:["hogy","mert","ha","bár"],correct:1,explain:"mert = because (causal conjunction). 'Nem tud jönni, mert beteg.'"},
    {q:"'IF I knew, I would help' — correct conjunction:",opts:["Amikor","Ha","Hogy","Mert"],correct:1,explain:"Ha = if (conditional conjunction for hypotheticals and real conditions)."},
    {q:"'Not only smart BUT ALSO kind' — double conjunction:",opts:["nemcsak okos, mert kedves is","nemcsak okos, hanem kedves is","vagy okos, vagy kedves","akár okos, akár kedves"],correct:1,explain:"nemcsak...hanem...is = not only...but also. 'Hanem' is the key word."},
    {q:"'Tell him to come' — hogy + what mood?",opts:["hogy + present","hogy + past","hogy + imperative","hogy + infinitive"],correct:2,explain:"When 'hogy' introduces a directive/command, it's followed by imperative mood: Mondd meg, hogy jöjjön!"},
    // === Passive & Reported Speech (4q: 3PP impersonal, -ható, reported tense, reported question)
    {q:"'The car was stolen' — Hungarian passive strategy:",opts:["Az autó volt ellopva.","Az autót ellopták.","Az autót ellopta.","Az autó ellopódott."],correct:1,explain:"3PP impersonal (ellopták = they stole it) = passive meaning without passive voice."},
    {q:"'The problem is solvable' — using -ható suffix:",opts:["A probléma megoldva.","A probléma megoldható.","A probléma meg kell oldani.","A problémát megoldják."],correct:1,explain:"-ható/-hető suffix = can be done / -able: megold + ható = megoldható."},
    {q:"'He said he is tired' — reported speech tense:",opts:["Mondta, hogy fáradt volt.","Mondta, hogy fáradt.","Mondta, hogy fáradt lesz.","Mondta, hogy fárad."],correct:1,explain:"Hungarian reported speech does NOT change tense! 'fáradt' (is tired) stays present: mondta, hogy fáradt."},
    {q:"'I asked where he was' — reported question form:",opts:["Megkérdeztem, hol volt.","Megkérdeztem, hol van.","Kérdeztem, hogy hol.","Kérdeztem volt, hol van."],correct:1,explain:"Reported questions also keep present tense in Hungarian: megkérdeztem, hol van (not 'volt')."},

    // === New questions for B2 new chapters ===
    {q:"'It was PETER who bought the cake' — Peter is in focus before the verb:",opts:["A tortát Péter vette meg.","PÉTER vette meg a tortát.","Péter a tortát vette meg.","Megvette Péter a tortát."],correct:1,explain:"Focus goes directly before the finite verb. PÉTER vette meg = Peter (focus) bought it."},
    {q:"'I didn't go to the cinema but to the theatre':",opts:["Nem moziba mentünk, hanem színházba.","Moziba nem mentünk, hanem színházba.","Moziba mentünk, de nem színházba.","Nem mentünk moziba és színházba."],correct:0,explain:"nem...hanem = not...but (contrastive). The focused elements follow nem/hanem respectively."},
    {q:"Question words in Hungarian go:",opts:["At the end of the sentence","After the subject","Directly before the finite verb","At the beginning always"],correct:2,explain:"Question words take the focus position — directly before the finite verb: Hova MÉSZ? (not Mész hova?)"},
    {q:"'Neither did I come' (adding to a negative statement):",opts:["Én is jöttem.","Én sem jöttem.","Én nem is jöttem.","Én jöttem sem."],correct:1,explain:"sem = not either / neither. Én sem jöttem = I didn't come either. (Mirror: Én is jöttem = I came too.)"},
    {q:"'I stayed home BECAUSE OF the rain' vs 'BECAUSE it rained':",opts:["Both use mert","az eső miatt vs mert esett az eső","az eső mert vs az eső miatt","Both use mivel"],correct:1,explain:"miatt (postposition) + noun: az eső miatt. mert (conjunction) + clause: mert esett az eső."},
    {q:"'Although it was raining, we went out' — conjunction:",opts:["amikor","mivel","bár/habár","amíg"],correct:2,explain:"bár/habár = although/even though. Concessive conjunction: Bár esett az eső, kimentünk."},
    {q:"'While I was reading, he was cooking' — conjunction:",opts:["amikor","amíg","mivel","pedig"],correct:1,explain:"amíg = while (simultaneous duration). amikor = when (a point in time). Amíg olvastam, ő főzött."},
    {q:"'Péter works, whereas Anna studies' — contrasting conjunction:",opts:["mert","tehát","pedig","azért"],correct:2,explain:"pedig = whereas/but (contrast between clauses). Péter dolgozik, Anna pedig tanul."},
    {q:"Hungarian reported speech (indirect speech) — does the tense shift?",opts:["Yes, like English (said→had said)","No — the original tense is kept","Only in formal writing","Only for past events"],correct:1,explain:"NO tense shift in Hungarian reported speech. Mondta, hogy fáradt. (He said he WAS tired — present kept.)"},
    {q:"'The work can be done' — Hungarian -ható/-hető construction:",opts:["A munkát lehet csinálni.","A munka elvégezhető.","A munkát elvégzik.","A munka elvégzett."],correct:1,explain:"-ható/-hető = -able/-ible. elvégezhető = accomplishable/can be done. Adjectival passive-like form."},
    {q:"'I asked him TO COME' — correct form after kért:",opts:["Megkértem, hogy jön.","Megkértem, hogy jöjjön.","Megkértem, hogy jönni.","Megkértem, hogy jött."],correct:1,explain:"After megkért (asked/requested), Hungarian requires subjunctive (imperative form): jöjjön."},
    {q:"'It is important THAT you understand' — correct form:",opts:["Fontos, hogy megérted.","Fontos, hogy megérteni.","Fontos, hogy megértsd.","Fontos, hogy megértett."],correct:2,explain:"Fontos/szükséges + hogy + subjunctive: megértsd (2PS subjunctive of megért)."},
    {q:"'Be careful NOT TO fall!' — negative purpose word:",opts:["hogy ne","nehogy","ne hogy","hogynem"],correct:1,explain:"nehogy (one word) = lest / so that...not. Vigyázz, nehogy eless! Very common in warnings."},
    {q:"'My head hurts' — the verb agrees with:",opts:["The speaker (1PS)","The head (3PS subject)","Always fájnak","Random"],correct:1,explain:"Fáj a fejem — the subject is 'a fejem' (my head). The body part is the grammatical subject, not you."},
    {q:"'My teeth hurt' — correct verb form:",opts:["Fáj a fogaim.","Fájnak a fogaim.","Fájok a fogaim.","A fogaim fáj."],correct:1,explain:"Fogaim (my teeth) is plural → fájnak (3PP). The verb agrees with the plural noun subject."},
    {q:"'I feel unwell' in Hungarian:",opts:["Rosszul érzem magam.","Beteg érzem.","Fáj vagyok.","Rosszul vagyok érezve."],correct:0,explain:"Rosszul érzem magam = I feel myself badly = I feel unwell. The reflexive magam is required."},
    {q:"'I'll be there IN TEN MINUTES (from now)':",opts:["tíz perc után","tíz percig","tíz perc múlva","tíz perckor"],correct:2,explain:"múlva = in (future time from now). tíz perc múlva = in ten minutes. After = után. Until = -ig."},
    {q:"'Two days ago' in Hungarian:",opts:["két nap előtt","két nappal ezelőtt","két nap után","két napja"],correct:1,explain:"két nappal ezelőtt = two days ago. -val/-vel ezelőtt is the standard 'ago' construction."},
    {q:"'She has lived here FOR TWO YEARS' (ongoing):",opts:["Két éve itt lakik.","Két évig itt lakott.","Két éven itt lakik.","Két évet lakik itt."],correct:0,explain:"két éve = for two years (ongoing). The temporal -ja/-je/-a/-e suffix expresses duration to the present."}

    {q:"'The letter written by Péter' uses which participle?",opts:["futó/-ó","írandó/-andó","írt/-tt past participle","írva/-va"],correct:2,explain:"-tt/-t = past participle. Péter által írt levél = the letter written by Péter. Functions as adjective."},
    {q:"Word formation: '-ság/-ség' creates:",opts:["Verbs from nouns","Adjectives from verbs","Abstract nouns from adjectives","Diminutives"],correct:2,explain:"-ság/-ség makes abstract nouns: szabad (free) → szabadság (freedom), szép → szépség (beauty)."},
    {q:"'Only Peter came' — emphatic particle:",opts:["Péter is eljött.","Még Péter is eljött.","Csak Péter jött el.","Péter mégis eljött."],correct:2,explain:"csak = only. Csak Péter jött el = Only Peter came. Csak is always in focus position before the verb."},
    {q:"'Even Peter came' — scalar emphasis:",opts:["Péter is eljött.","Még Péter is eljött.","Csak Péter jött el.","Péter mégis eljött."],correct:1,explain:"még...is = even. Még Péter is eljött = Even Peter came. Higher emphasis than Péter is (Peter too came)."},
    {q:"'Is vs. sem' — correct rule:",opts:["Both mean 'also'","is = also/too (positive); sem = not either (negative)","Both mean 'not'","They are interchangeable"],correct:1,explain:"is = also/too (affirmative). sem = neither/not either (negative). They are exact mirrors in polarity."},
    {q:"'The fact that you came means a lot' — structure:",opts:["Hogy eljöttél sokat jelent.","Az, hogy eljöttél, sokat jelent.","Eljöttél, ami sokat jelent.","Ha eljöttél, sokat jelent."],correct:1,explain:"Az, hogy... = The fact that... This nominalizes the clause. The commas are required in Hungarian."}
  ],

  // C2: 8 questions — 4 per chapter
  C2:[
    // === Register (4q: informal vs formal, Ön usage, address forms, bureaucratic)
    {q:"Addressing a stranger in a shop — correct register:",opts:["Szia! Mit kérsz?","Jó napot! Mit kér Ön?","Hé, mit akarsz?","Hogy vagy?"],correct:1,explain:"With strangers, use Önözés: Jó napot + Ön + 3rd PS verb form (kér, not kérsz)."},
    {q:"'Ön' (formal you) uses which verb forms?",opts:["2nd person singular: mész","2nd person plural: mentek","3rd person singular: megy","1st person: megyek"],correct:2,explain:"Ön takes 3rd person singular verb forms: Ön megy? (Are you going?). This is a key formal rule."},
    {q:"Addressing a primary school teacher — correct form:",opts:["Szia tanár!","Tanár úr! / Tanárnő!","Hey teacher!","Ön tanár?"],correct:1,explain:"Teachers in Hungary are addressed as 'Tanár úr' (male) or 'Tanárnő' (female) — still standard practice."},
    {q:"'Az irat benyújtása szükséges' is an example of:",opts:["Informal speech","Bureaucratic/official language","Colloquial expression","Proverb"],correct:1,explain:"Verbal noun (benyújtása = the submission of) is typical of bureaucratic/official Hungarian writing."},
    // === Culture & Proverbs (4q: proverb meaning, Hungarian fact, idiom, cultural knowledge)
    {q:"'Nem esik messze az alma a fájától' means:",opts:["Apples grow on trees","Like father, like son","Don't go far from home","The apple is delicious"],correct:1,explain:"The apple doesn't fall far from the tree = like father, like son (children resemble their parents)."},
    {q:"Hungarian is most closely related to which language(s)?",opts:["German and Austrian","Russian and Polish","Finnish and Estonian","Turkish and Mongolian"],correct:2,explain:"Hungarian is Uralic/Finno-Ugric, most closely related to Finnish and Estonian — not to any Slavic or Germanic language!"},
    {q:"'Jó étvágyat!' is said:",opts:["When greeting someone","Before or during a meal","When someone sneezes","When leaving"],correct:1,explain:"Jó étvágyat! = Bon appétit! / Enjoy your meal! — said before or during eating. It means 'good appetite'."},
    {q:"'Egészségedre!' is used:",opts:["Only when drinking (cheers)","Only when someone sneezes","Both when drinking AND when someone sneezes","Only as a formal farewell"],correct:2,explain:"Egészségedre! (lit: to your health) is used both as a toast/cheers AND as 'bless you' when someone sneezes!"},
  ,
    // === New questions for C2 new chapters ===
    {q:"In Hungarian schools, students address teachers as:",opts:["te (informal you)","Ön (formal you)","Tanár úr / Tanárnő","By first name"],correct:2,explain:"Tanár úr (male teacher) / Tanárnő (female teacher) is the required form of address in Hungarian schools."},
    {q:"'You can use informal address with me' — Hungarian:",opts:["Önözzön engem!","Tegezhet engem! / Tegezhetsz!","Magázzon engem!","Önnek szóljon!"],correct:1,explain:"Tegezhetsz (engem) / Tegezhetjük egymást = You can use informal address with me. Social invitation."},
    {q:"Bureaucratic Hungarian prefers:",opts:["Short simple sentences","Active voice with pronouns","Verbal nouns and passive 3PP constructions","Informal register"],correct:2,explain:"Official Hungarian uses verbal nouns (benyújtás=submission), -andó participles, passive-like 3PP (kivizsgálták)."},
    {q:"'Ön' (formal you) takes which verb person?",opts:["2nd person singular","2nd person plural","3rd person singular","1st person plural"],correct:2,explain:"Ön takes 3rd person singular verb forms: Ön megy? (Are you going?). This is why it confuses learners."},
    {q:"Hungarian belongs to which language family?",opts:["Indo-European (Slavic)","Turkic","Uralic (Finno-Ugric)","Semitic"],correct:2,explain:"Hungarian is Uralic/Finno-Ugric — related to Finnish and Estonian, not to any neighboring language."},
    {q:"The 'Nyelvújítás' (language reform, 1772–1840s) created approximately:",opts:["100 new words","1,000 new words","10,000 new words","100,000 new words"],correct:2,explain:"~10,000 words were coined during the Nyelvújítás by Kazinczy and others to replace German/Latin terms."},
    {q:"Which Hungarian word comes from Ottoman Turkish?",opts:["víz (water)","kávé (coffee)","autó (car)","ház (house)"],correct:1,explain:"kávé (coffee) from Ottoman Turkish kahve, absorbed during the 150-year Ottoman occupation (1541–1699)."},
    {q:"The Treaty of Trianon (1920) resulted in:",opts:["Hungary gaining independence","Hungary losing 2/3 of its territory","Budapest being founded","Hungarian becoming official language"],correct:1,explain:"Trianon reduced Hungary to 1/3 of its pre-war territory, creating large Hungarian minorities in neighboring states."},
    {q:"Petőfi's 'Talpra magyar!' is recited on which Hungarian holiday?",opts:["August 20 (St. Stephen's Day)","March 15 (Revolution Day)","October 23 (Republic Day)","January 1"],correct:1,explain:"March 15 commemorates the 1848 revolution. Petőfi's Nemzeti Dal is recited at every ceremony."},
    {q:"Kertész Imre's 'Sorstalanság' received which international recognition?",opts:["Pulitzer Prize","Man Booker Prize","Nobel Prize in Literature 2002","Goncourt Prize"],correct:2,explain:"Imre Kertész won the Nobel Prize in Literature in 2002 for Sorstalanság (Fatelessness), about the Holocaust."},
    {q:"'-ván/-vén' (e.g. 'Látván ezt...') is:",opts:["Modern colloquial form","Archaic adverb participle still used in formal texts","Future participle","Past conditional"],correct:1,explain:"-ván/-vén is an archaic adverb participle meaning 'having done'. Still appears in literature and official texts."},
    {q:"'gyönyörű' vs 'szép' — register difference:",opts:["gyönyörű is informal, szép is formal","gyönyörű is elevated/literary, szép is everyday","They are identical in register","szép is archaic"],correct:1,explain:"szép (beautiful) = everyday register. gyönyörű (gorgeous/wonderful) = elevated register. Using gyönyörű in the right context marks sophistication."}
  ],
};




window.MagyarDiakApp = function MagyarDiak() {

  // ── Persisted state ──────────────────────────────────────────
  const [themeKey,       setThemeKey]       = useState('piros');
  const [hapticEnabled,  setHapticEnabled]  = useState(true);

  const [userSentences,  setUserSentences]  = useState([]);
  const [userVocabulary, setUserVocabulary] = useState([]);
  const [srsCards,       setSrsCards]       = useState({});
  const [customChapters, setCustomChapters] = useState([]);
  const [editedChapters, setEditedChapters] = useState({});

  // ── UI state ─────────────────────────────────────────────────
  const [view,          setView]          = useState('home');
  const [navOpen,       setNavOpen]       = useState(false);
  const [notif,         setNotif]         = useState(null);
  const [searchQuery,   setSearchQuery]   = useState('');
  const [showSearch,    setShowSearch]    = useState(false);
  const [showOnboard,   setShowOnboard]   = useState(false);
  const [settingsPage,  setSettingsPage]  = useState(null);

  // ── Learn state ──────────────────────────────────────────────
  const [selLevel,   setSelLevel]   = useState(null);
  const [selChap,    setSelChap]    = useState(null);
  const [secIdx,     setSecIdx]     = useState(0);
  const [exAns,      setExAns]      = useState({});
  const [exShow,     setExShow]     = useState({});
  const [matchSt,    setMatchSt]    = useState({ left:null, matched:[] });
  const [editMode,   setEditMode]   = useState(false);

  // ── Quiz state ───────────────────────────────────────────────
  const [quiz,        setQuiz]        = useState(null);

  // ── Practice state ───────────────────────────────────────────
  const [practiceTab, setPracticeTab] = useState('srs');
  const [srsSession,  setSrsSession]  = useState(null);

  // ── Notes state ──────────────────────────────────────────────
  const [notesTab,    setNotesTab]    = useState('quizbank');
  const [qbView,      setQbView]      = useState('list');
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [editingQ,    setEditingQ]    = useState(null);
  const [confirmDel,  setConfirmDel]  = useState(null);

  const T = THEMES[themeKey];

  // ── Haptic gate ──────────────────────────────────────────────
  useEffect(() => { window.__hapticOn = hapticEnabled; }, [hapticEnabled]);

  // ── Streak updater ────────────────────────────────────────────
  useEffect(() => {
    const today = new Date().toDateString();
    if (profile.lastLogin !== today) {
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      const newStreak = profile.lastLogin === yesterday ? profile.streak + 1 : 1;
      setProfile(p => ({ ...p, lastLogin: today, streak: newStreak }));
    }
  }, []);

  // ── Persistence: load on mount ────────────────────────────────
  useEffect(() => {
    const saved = persist.load();
    if (saved) {
      if (saved.themeKey)       setThemeKey(saved.themeKey);
      if (saved.hapticEnabled != null) setHapticEnabled(saved.hapticEnabled);
      if (saved.profile)        setProfile(p => ({ ...p, ...saved.profile }));
      if (saved.userQuestions)  setUserQuestions(saved.userQuestions);
      if (saved.userSentences)  setUserSentences(saved.userSentences);
      if (saved.userVocabulary) setUserVocabulary(saved.userVocabulary);
      if (saved.srsCards)       setSrsCards(saved.srsCards);
      if (saved.customChapters) setCustomChapters(saved.customChapters);
      if (saved.editedChapters) setEditedChapters(saved.editedChapters);
    } else {
      setTimeout(() => setShowOnboard(true), 500);
    }
  }, []);

  // ── Persistence: auto-save ────────────────────────────────────
  useEffect(() => {
    persist.save({ themeKey, hapticEnabled, profile, userQuestions, userSentences, userVocabulary, srsCards, customChapters, editedChapters });
  }, [themeKey, hapticEnabled, profile, userQuestions, srsCards, customChapters, editedChapters]);

  // ── Full curriculum (built-in + user edits + custom) ─────────
  const fullCurriculum = useMemo(() => {
    const base = CURRICULUM.map(level => ({
      ...level,
      chapters: level.chapters.map(ch =>
        editedChapters[ch.id] ? { ...ch, ...editedChapters[ch.id] } : ch
      )
    }));
    if (!customChapters.length) return base;
    const byLevel = {};
    customChapters.forEach(ch => { (byLevel[ch.level] = byLevel[ch.level] || []).push(ch); });
    return base.map(level => ({
      ...level,
      chapters: [...level.chapters, ...(byLevel[level.level] || [])]
    }));
  }, [customChapters, editedChapters]);

  // ── Search index ──────────────────────────────────────────────
  const searchIdx     = useMemo(() => buildSearchIndex(fullCurriculum), [fullCurriculum]);
  const searchResults = useMemo(() => searchIndex(searchIdx, searchQuery), [searchIdx, searchQuery]);

  // ── SRS cards ─────────────────────────────────────────────────
  const allVocabCards = useMemo(() => {
    const cards = {};
    fullCurriculum.forEach(level => {
      level.chapters.forEach(ch => {
        ch.sections.forEach(sec => {
          if (sec.type === 'vocab' || sec.type === 'example') {
            (sec.words || sec.examples || []).forEach(w => {
              const id = `${ch.id}_${w.hu}`;
              if (!cards[id]) cards[id] = SRS.makeCard(id, w.hu, w.en || '', level.level);
            });
          }
        });
      });
    });
    return cards;
  }, [fullCurriculum]);

  const mergedSrsCards = useMemo(() => {
    const merged = { ...allVocabCards };
    Object.entries(srsCards).forEach(([id, card]) => {
      if (merged[id]) merged[id] = { ...merged[id], ...card };
    });
    return merged;
  }, [allVocabCards, srsCards]);

  const dueSrsCards = useMemo(() => SRS.getDue(mergedSrsCards), [mergedSrsCards]);

  // ── Derived ───────────────────────────────────────────────────
  const totalCh  = useMemo(() => fullCurriculum.reduce((a, l) => a + l.chapters.length, 0), [fullCurriculum]);
  const donePct  = Math.round((profile.done.length / totalCh) * 100);
  const notify   = (msg) => { setNotif(msg); setTimeout(() => setNotif(null), 2600); };
  const resetEx  = () => { setExAns({}); setExShow({}); setMatchSt({ left:null, matched:[] }); };
  const goView   = v => {
    setView(v); setNavOpen(false); setShowSearch(false);
    if (v !== 'learn') { setSelLevel(null); setSelChap(null); }
    if (v !== 'settings') setSettingsPage(null);
  };

  const markDone = id => {
    if (!profile.done.includes(id)) {
      HAPTIC.success();
      setProfile(p => ({ ...p, done:[...p.done, id], xp: p.xp + 30 }));
      notify('Chapter complete · +30 XP');
    }
  };

  const doMCQ = (ei, qi, oi) => {
    const k = `${ei}-${qi}`;
    if (exAns[k] != null) return;
    setExAns(p => ({ ...p, [k]: oi }));
    setExShow(p => ({ ...p, [k]: true }));
  };
  const doTF = (ei, qi, ans) => {
    const k = `${ei}-${qi}`;
    if (exAns[k] != null) return;
    setExAns(p => ({ ...p, [k]: ans }));
    setExShow(p => ({ ...p, [k]: true }));
  };

  // ── Quiz ──────────────────────────────────────────────────────
  const startQuiz = lv => {
    HAPTIC.medium();
    setQuiz({ lv, qs: QUIZZES[lv] || [], cur:0, score:0, done:false, res:null });
  };
  const answerQuiz = i => {
    if (quiz.res) return;
    const q = quiz.qs[quiz.cur], ok = i === q.correct;
    ok ? HAPTIC.success() : HAPTIC.error();
    setQuiz(p => ({ ...p, res:{ ok, explain:q.explain, selectedIdx:i } }));
  };
  const advanceQuiz = () => {
    if (!quiz?.res) return;
    HAPTIC.light();
    const ok = quiz.res.ok, ns = ok ? quiz.score+1 : quiz.score, fin = quiz.cur+1 >= quiz.qs.length;
    if (fin) {
      const pct = Math.round((ns / quiz.qs.length) * 100);
      setProfile(p => ({ ...p, xp: p.xp + ns*10, best: { ...p.best, [quiz.lv]: Math.max(p.best[quiz.lv]||0, pct) } }));
      notify(`Quiz done · +${ns*10} XP`);
      setQuiz(p => ({ ...p, score:ns, done:true, res:null }));
    } else {
      setQuiz(p => ({ ...p, score:ns, cur:p.cur+1, res:null }));
    }
  };

  // ── SRS ───────────────────────────────────────────────────────
  const startSrs = () => {
    const due = [...dueSrsCards].sort(() => Math.random() - 0.5).slice(0, 20);
    if (!due.length) { notify('No cards due! Come back tomorrow.'); return; }
    setSrsSession({ cards:due, cur:0, shown:false, done:false, correct:0 });
    HAPTIC.medium();
  };
  const showSrsAnswer = () => setSrsSession(s => s && { ...s, shown:true });
  const rateSrs = quality => {
    if (!srsSession) return;
    const card    = srsSession.cards[srsSession.cur];
    const updated = SRS.review({ ...mergedSrsCards[card.id], ...card }, quality);
    setSrsCards(p => ({ ...p, [card.id]: updated }));
    quality >= 3 ? HAPTIC.success() : HAPTIC.error();
    const next    = srsSession.cur + 1;
    const correct = srsSession.correct + (quality >= 3 ? 1 : 0);
    if (next >= srsSession.cards.length) {
      notify(`Review done · ${correct}/${srsSession.cards.length} correct`);
      setSrsSession(s => ({ ...s, done:true, correct }));
      setProfile(p => ({ ...p, xp: p.xp + correct * 5 }));
    } else {
      setSrsSession(s => ({ ...s, cur:next, shown:false, correct }));
    }
  };

  // ── Chapter / custom ──────────────────────────────────────────
  const saveChapterEdit  = (id, ch) => { setEditedChapters(p => ({ ...p, [id]:ch })); notify('Saved'); };
  const addCustomChapter = ch       => { setCustomChapters(p => [...p, { ...ch, id:`custom_${Date.now()}`, isCustom:true }]); notify('Chapter added'); };
  const deleteCustom     = id       => { setCustomChapters(p => p.filter(c => c.id !== id)); notify('Deleted'); };

  // ── Toast ─────────────────────────────────────────────────────
  const NotifToast = () => notif ? (
    <div role="status" aria-live="polite" style={{position:'fixed',bottom:68,left:'50%',transform:'translateX(-50%)',background:T.text,color:T.bg,padding:'10px 18px',borderRadius:30,fontWeight:500,fontSize:13,whiteSpace:'nowrap',zIndex:500,boxShadow:T.shadowMd,animation:'toastUp .2s ease'}}>
      {notif}
    </div>
  ) : null;

  // ── Onboarding ────────────────────────────────────────────────
  const Onboarding = () => !showOnboard ? null : (
    <div style={{position:'fixed',inset:0,zIndex:600,background:'rgba(0,0,0,0.55)',display:'flex',alignItems:'flex-end',justifyContent:'center',padding:'0 0 66px'}}
      onClick={e => { if (e.target === e.currentTarget) setShowOnboard(false); }}>
      <div style={{...mk.card(T,{width:'100%',maxWidth:480,padding:'22px 20px',borderRadius:'16px 16px 0 0'})}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <img src={COAT_OF_ARMS} alt="" style={{height:32}} onError={e=>e.target.style.display='none'}/>
            <div>
              <h2 style={{fontSize:17,fontWeight:700,color:T.text,margin:0}}>Magyar Diák</h2>
              <div style={{fontSize:12,color:T.muted}}>Hungarian A1–C2</div>
            </div>
          </div>
          <button onClick={() => setShowOnboard(false)} style={{background:'none',border:'none',cursor:'pointer',color:T.muted,padding:4}}><Icons.close/></button>
        </div>
        <div style={{display:'grid',gap:8,marginBottom:16}}>
          {[
            {e:'📚',t:'36 chapters · A1 to C2 — tap Learn to begin'},
            {e:'🧠',t:'SRS flashcards schedule reviews at the optimal time'},
            {e:'🔊',t:'Tap any word to hear its pronunciation'},
            {e:'📝',t:'Add your own questions and chapters in My Notes'},
          ].map(({e,t},i) => (
            <div key={i} style={{display:'flex',gap:10,alignItems:'center'}}>
              <span style={{fontSize:18,flexShrink:0}}>{e}</span>
              <span style={{fontSize:13,color:T.textSub,lineHeight:1.4}}>{t}</span>
            </div>
          ))}
        </div>
        <button onClick={() => { HAPTIC.medium(); setShowOnboard(false); }}
          style={{...mk.btn(T,{width:'100%',justifyContent:'center',padding:'13px',fontSize:15,borderRadius:10})}}>
          Start Learning
        </button>
      </div>
    </div>
  );

  // ── Search overlay ────────────────────────────────────────────
  const SearchOverlay = () => !showSearch ? null : (
    <div style={{position:'fixed',inset:0,zIndex:300,background:T.bg,paddingTop:52,overflow:'auto'}}>
      <div style={{padding:'12px 14px',borderBottom:`1px solid ${T.border}`,display:'flex',gap:8,alignItems:'center',position:'sticky',top:0,background:T.bg}}>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:8,background:T.surfaceAlt,borderRadius:8,padding:'8px 12px',border:`1.5px solid ${T.border}`}}>
          <Icons.search/>
          <input autoFocus value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
            placeholder="Search words, grammar, examples…" aria-label="Search content"
            style={{flex:1,border:'none',background:'transparent',fontSize:14,color:T.text,outline:'none',fontFamily:'inherit'}}/>
          {searchQuery && <button onClick={() => setSearchQuery('')} style={{background:'none',border:'none',cursor:'pointer',color:T.muted,padding:2}}><Icons.close/></button>}
        </div>
        <button onClick={() => { HAPTIC.light(); setShowSearch(false); setSearchQuery(''); }}
          style={{...mk.btn(T,'secondary',{padding:'8px 14px'})}}>Cancel</button>
      </div>
      <div style={{padding:'8px 14px',maxWidth:820,margin:'0 auto'}}>
        {!searchQuery && (
          <div style={{textAlign:'center',padding:'40px 0',color:T.muted,fontSize:14}}>
            Type to search {searchIdx.length} vocabulary items, examples, and concepts
          </div>
        )}
        {searchQuery && !searchResults.length && (
          <div style={{textAlign:'center',padding:'40px 0',color:T.muted,fontSize:14}}>No results for "{searchQuery}"</div>
        )}
        {searchResults.map((r, i) => {
          const lv = fullCurriculum.find(l => l.level === r.level);

            <button key={i} onClick={() => {
