// ═══════════════════════════════════════════════════════════════
//  HAPTIC — AudioContext + navigator.vibrate, cross-platform
// ═══════════════════════════════════════════════════════════════
let _actx = null;
const _ctx = () => { if(!_actx) try{ _actx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} return _actx; };
const _tap = (freq=440,dur=0.015,gain=0.18) => { const c=_ctx(); if(!c) return; try{ c.resume(); const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.frequency.value=freq;o.type='sine'; g.gain.setValueAtTime(gain,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur); o.start(c.currentTime);o.stop(c.currentTime+dur); }catch(e){} };
if(typeof window!=='undefined') window.addEventListener('pointerdown',()=>_ctx()?.resume(),{once:true,passive:true});
const _h = fn => (...a) => { if(window.__hapticOn!==false) fn(...a); };
const HAPTIC = {
  tick:   _h(()=>{ navigator.vibrate?.(5);  _tap(600,0.008,0.10); }),
  light:  _h(()=>{ navigator.vibrate?.(8);  _tap(520,0.013,0.16); }),
  medium: _h(()=>{ navigator.vibrate?.(18); _tap(440,0.018,0.20); }),
  heavy:  _h(()=>{ navigator.vibrate?.(35); _tap(300,0.030,0.28); }),
  success:_h(()=>{ navigator.vibrate?.([10,40,20]); _tap(660,0.013,0.16); setTimeout(()=>_tap(880,0.013,0.13),80); }),
  error:  _h(()=>{ navigator.vibrate?.([20,30,20,30,20]); _tap(220,0.025,0.22); setTimeout(()=>_tap(180,0.025,0.18),60); }),
  warning:_h(()=>{ navigator.vibrate?.([15,20,40]); _tap(360,0.020,0.20); }),
};

// ═══════════════════════════════════════════════════════════════
//  SRS ENGINE — SM-2 spaced repetition algorithm
// ═══════════════════════════════════════════════════════════════
const SRS = {
  // quality: 0=blackout 1=wrong 2=wrong+correct 3=hard 4=good 5=easy
  review: (card, quality) => {
    let { easeFactor=2.5, interval=1, repetitions=0 } = card;
    if (quality >= 3) {
      if (repetitions === 0) interval = 1;
      else if (repetitions === 1) interval = 6;
      else interval = Math.round(interval * easeFactor);
      repetitions++;
      easeFactor = Math.max(1.3, easeFactor + 0.1 - (5-quality)*(0.08+(5-quality)*0.02));
    } else {
      repetitions = 0; interval = 1;
    }
    const nextReview = Date.now() + interval * 86400000;
    return { ...card, easeFactor, interval, repetitions, nextReview, lastQuality: quality };
  },
  isDue: (card) => !card.nextReview || Date.now() >= card.nextReview,
  getDue: (cards) => Object.values(cards).filter(c => SRS.isDue(c)),
  makeCard: (id, hu, en, level) => ({ id, hu, en, level, easeFactor:2.5, interval:1, repetitions:0, nextReview:null }),
};

// ═══════════════════════════════════════════════════════════════
//  WEB SPEECH — Text-to-speech for Hungarian
// ═══════════════════════════════════════════════════════════════
const SPEECH = {
  _synth: typeof window !== 'undefined' ? window.speechSynthesis : null,
  speak: (text, lang='hu-HU', rate=0.85) => {
    if (!SPEECH._synth) return;
    SPEECH._synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1.0;
    // Prefer a Hungarian voice if available
    const voices = SPEECH._synth.getVoices();
    const huVoice = voices.find(v=>v.lang.startsWith('hu')) || voices.find(v=>v.lang.startsWith('hu-'));
    if (huVoice) u.voice = huVoice;
    SPEECH._synth.speak(u);
  },
  stop: () => SPEECH._synth?.cancel(),
  available: () => !!SPEECH._synth,
};

// ═══════════════════════════════════════════════════════════════
//  SEARCH ENGINE — index all content for instant search
// ═══════════════════════════════════════════════════════════════
const buildSearchIndex = (curriculum) => {
  const index = [];
  curriculum.forEach(level => {
    level.chapters.forEach(ch => {
      ch.sections.forEach((sec, si) => {
        if (sec.type==='example') {
          sec.examples?.forEach((ex,ei) => {
            index.push({ type:'example', level:level.level, chapId:ch.id, chapTitle:ch.title, secIdx:si,
              hu:ex.hu, en:ex.en, note:ex.note||'', text:(ex.hu+' '+ex.en+' '+(ex.note||'')).toLowerCase() });
          });
        }
        if (sec.type==='vocab') {
          sec.words?.forEach((w,wi) => {
            index.push({ type:'vocab', level:level.level, chapId:ch.id, chapTitle:ch.title, secIdx:si,
              hu:w.hu, en:w.en, text:(w.hu+' '+w.en).toLowerCase() });
          });
        }
        if (sec.type==='concept') {
          index.push({ type:'concept', level:level.level, chapId:ch.id, chapTitle:ch.title, secIdx:si,
            title:sec.title, text:(sec.title+' '+(sec.body||'')).toLowerCase().slice(0,300) });
        }
      });
    });
  });
  return index;
};

const searchIndex = (index, query) => {
  if (!query || query.trim().length < 2) return [];
  const q = query.toLowerCase().trim();
  const results = index.filter(item => item.text.includes(q));
  // Sort: exact hu match first, then en match, then partial
  results.sort((a,b) => {
    const aExact = a.hu?.toLowerCase()===q || a.en?.toLowerCase()===q ? 0 : 1;
    const bExact = b.hu?.toLowerCase()===q || b.en?.toLowerCase()===q ? 0 : 1;
    return aExact - bExact;
  });
  return results.slice(0, 40);
};

function ConceptSection({sec, T}) {
  return (
    <div>
      <h3 style={{fontSize:17,fontWeight:600,marginBottom:14,color:T.text,letterSpacing:"-0.01em"}}>{sec.title}</h3>
      <div style={{fontSize:14.5,lineHeight:1.85,color:T.textSub}}>
        {(() => {
          const bodyLines = (sec.body||'').split('\n');
          const out = [];
          let tRows = [], cols = 0;
          const flush = (k) => {
            if (!tRows.length) return;
            out.push(
              <div key={'t'+k} style={{overflowX:'auto',marginBottom:10,marginTop:4}}>
                <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,border:`1px solid ${T.border}`,borderRadius:6,overflow:'hidden'}}>
                  {tRows.map((row,ri) => row.cells.map((c,ci) => (
                    <div key={ri+'-'+ci} style={{
                      padding:'7px 10px',fontSize:13,lineHeight:1.4,
                      background:row.isHdr ? T.accentSoft : ri%2===0 ? T.surface : T.surfaceAlt,
                      borderRight:ci<cols-1 ? `1px solid ${T.border}` : 'none',
                      borderBottom:ri<tRows.length-1 ? `1px solid ${T.border}` : 'none',
                      fontWeight:row.isHdr ? 600 : 400,
                      color:row.isHdr ? T.accent : T.textSub,
                      wordBreak:'break-word',
                    }}>{c.trim()}</div>
                  )))}
                </div>
              </div>
            );
            tRows = []; cols = 0;
          };
          bodyLines.forEach((line,i) => {
            if (line.startsWith('|')) {
              const cells = line.split('|').filter(c=>c.trim());
              if (cells.every(c=>/^[-:\s]+$/.test(c.trim()))) return;
              const isHdr = tRows.length === 0;
              cols = Math.max(cols, cells.length);
              while (cells.length < cols) cells.push('');
              tRows.push({cells, isHdr});
            } else {
              flush(i);
              if (!line.trim()) { out.push(<div key={i} style={{height:8}}/>); return; }
              const html = line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
              if (line.startsWith('•')) {
                out.push(<div key={i} style={{display:'flex',gap:9,marginBottom:4,paddingLeft:4}}><span style={{color:T.accent,flexShrink:0,marginTop:2,fontSize:11}}>▸</span><span dangerouslySetInnerHTML={{__html:html.slice(2)}}/></div>);
              } else {
                out.push(<p key={i} style={{margin:'3px 0'}} dangerouslySetInnerHTML={{__html:html}}/>);
              }
            }
          });
          flush('end');
          return out;
        })()}
      </div>
    </div>
  );
}

function ExerciseMCQ({sec,ei,T,exAns,exShow,doMCQ}) {
  return (
    <div style={{...mk.card(T,{background:T.surfaceAlt,padding:18})}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}} role="heading" aria-level="3"><Icons.edit/><span style={{fontSize:14,fontWeight:600,color:T.text}}>{sec.title}</span></div>
      <p style={{fontSize:13,color:T.muted,marginBottom:16,marginTop:4,lineHeight:1.5}}>{sec.instructions}</p>
      {(sec.questions||[]).map((q,qi)=>{
        const k=`${ei}-${qi}`,ans=exAns[k],ok=ans===q.correct;
        return <div key={qi} style={{marginBottom:18}} role="group" aria-label={`Question ${qi+1}`}>
          <div style={{fontSize:14,fontWeight:500,color:T.text,marginBottom:9,lineHeight:1.5}}>{qi+1}. {q.q}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}} role="radiogroup">
            {(q.opts||[]).map((o,oi)=>{
              let bg=T.surface,bdr=T.border,col=T.textSub,fw=400;
              if(ans!==undefined){if(oi===q.correct){bg=T.successBg;bdr=T.success;col=T.successText;fw=500;}else if(oi===ans&&oi!==q.correct){bg=T.accentSoft;bdr=T.accent;col=T.accent;fw=500;}}
              return <button key={oi} onClick={()=>{HAPTIC.light();doMCQ(ei,qi,oi);}} aria-pressed={ans===oi} style={{padding:"7px 13px",borderRadius:7,border:`1.5px solid ${bdr}`,background:bg,color:col,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:fw}}>{o}</button>;
            })}
          </div>
          {exShow[k]&&<div role="status" style={{marginTop:7,padding:"9px 13px",borderRadius:8,fontSize:13,lineHeight:1.5,background:ok?T.successBg:T.accentSoft,color:ok?T.successText:T.accent,fontWeight:500,display:"flex",gap:8,alignItems:"flex-start"}}><span aria-hidden>{ok?"✓":"✗"}</span><span>{q.explain}</span></div>}
        </div>;
      })}
    </div>
  );
}

function ExerciseMatch({sec,T,matchSt,setMatchSt}) {
  return (
    <div style={{...mk.card(T,{background:T.surfaceAlt,padding:18})}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><Icons.match/><span style={{fontSize:14,fontWeight:600,color:T.text}}>{sec.title}</span></div>
      <p style={{fontSize:13,color:T.muted,marginBottom:16,marginTop:4}}>{sec.instructions}</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {["left","right"].map(side=>(
          <div key={side}>
            <div style={{...mk.label(T,{marginBottom:8})}}>{side==="left"?"Hungarian":"English"}</div>
            {(sec.pairs||[]).map((p,i)=>{
              const m=side==="left"?matchSt.matched.find(x=>x.left===i):matchSt.matched.find(x=>x.right===i);
              const active=side==="left"&&matchSt.left===i;
              return <button key={i} aria-pressed={!!m}
                onClick={()=>{
                  HAPTIC.tick();
                  if(side==="left"){setMatchSt(prev=>({...prev,left:prev.left===i?null:i}));}
                  else{if(matchSt.left===null||matchSt.matched.find(x=>x.right===i))return;const correct=matchSt.left===i;setMatchSt(prev=>({left:null,matched:[...prev.matched,{left:prev.left,right:i,correct}]}));}
                }}
                style={{display:"block",width:"100%",padding:"9px 12px",marginBottom:6,borderRadius:8,textAlign:"left",border:`1.5px solid ${active?T.accent:m?(m.correct?T.success:T.accent):T.border}`,background:m?(m.correct?T.successBg:T.accentSoft):T.surface,color:m?(m.correct?T.successText:T.accent):T.text,cursor:"pointer",fontFamily:side==="left"?"Georgia,serif":"inherit",fontSize:13,fontWeight:side==="left"?600:400}}>
                {side==="left"?p.left:p.right}
              </button>;
            })}
          </div>
        ))}
      </div>
      {matchSt.matched.length===(sec.pairs||[]).length&&(sec.pairs||[]).length>0&&(
        <div role="status" style={{marginTop:12,padding:"10px 14px",borderRadius:8,background:T.successBg,color:T.successText,fontWeight:500,fontSize:13,display:"flex",gap:8,alignItems:"center"}}>
          <Icons.check/>{matchSt.matched.every(m=>m.correct)?"All matched!": `${matchSt.matched.filter(m=>m.correct).length}/${(sec.pairs||[]).length} correct — try again.`}
        </div>
      )}
    </div>
  );
}

      { type:"summary",
        summary:"This chapter covered Hungarian's 14 vowels and the fundamental law of vowel harmony.\n\n**What we covered:**\n• 7 short/long vowel pairs: a/á, e/é, i/í, o/ó, ö/ő, u/ú, ü/ű\n• Deep vowels (a, á, o, ó, u, ú) vs. high vowels (e, é, i, í, ö, ő, ü, ű)\n• Vowel harmony: suffixes must match the vowel class of the word\n• Mixed words containing both types follow the last vowel\n• Words with i/í/e/é + deep vowels are treated as deep",
        takeaways:["**Vowel harmony is non-negotiable** — every suffix has a deep and high variant. Learn them in pairs from day one.","**The key test:** is the last vowel deep (a,á,o,ó,u,ú) or high (e,é,i,í,ö,ő,ü,ű)? That determines every suffix.","**Mixed words like papír follow the deep rule** — because á is a deep vowel, the word takes deep suffixes.","**ö, ő, ü, ű** are high vowels that often need a special -ök/-öt/-nek variant (3-way harmony).","**Memorize suffix pairs:** -ban/-ben, -nak/-nek, -ra/-re, -tól/-től — each pair covers one grammatical relationship."] }
    ]},
    { id:"a1-nouns", title:"Nouns & Plural Forms (9 Groups)", icon:"📚", sections:[
      { type:"concept", title:"How Hungarian Nouns Form Their Plurals",
        body:"The plural marker is **-k**, but a linking vowel is often needed. There are 9 groups:\n\n**Group 1** — Final a/e lengthens (a→á, e→é):\n• apa → apák · alma → almák · megye → megyék · neve → nevék\n\n**Group 2** — High-vowel words ending in consonant:\n• Most: -ek (ember→emberek, szék→székek, kép→képek)\n• With ö/ő/ü/ű in last syllable: -ök (gyümölcs→gyümölcsök, tükör→tükrök)\n\n**Group 3** — Deep-vowel words ending in consonant:\n• Most: -ok (asztal→asztalok, barát→barátok, vonat→vonatok)\n• Some monosyllables: -ak (ház→házak, fal→falak, kar→karok)\n\n**Group 4** — Drop-vowel (last vowel drops in plural):\n• árok→árkok, bokor→bokrok, álom→álmok, jutalom→jutalmak\n\n**Group 5** — Long vowel shortens:\n• madár→madarak (á→a), víz→vizek (í→i), tűz→tüzek (ű→ü)\n• kenyér→kenyerek (é→e), tehén→tehenek (é→e)\n\n**Group 7** — V-words (v is inserted):\n• ló→lovak, tó→tavak, kő→kövek, fű→füvek, mű→művek\n\n**Groups 6,8,9** — Mixed words, loanwords, compounds\n\n**No gender** — all nouns work the same way regardless of meaning." },
      { type:"example", title:"20 Plural Form Examples",
        examples:[
          {hu:"asztal → asztalok",en:"table → tables",note:"Group 3: deep -ok"},
          {hu:"ember → emberek",en:"person → people",note:"Group 2: high -ek"},
          {hu:"alma → almák",en:"apple → apples",note:"Group 1: a→á +k"},
          {hu:"ház → házak",en:"house → houses",note:"Group 3: monosyllable -ak"},
          {hu:"madár → madarak",en:"bird → birds",note:"Group 5: á→a +-ak"},
          {hu:"tó → tavak",en:"lake → lakes",note:"Group 7: ó→a +v +-ak"},
          {hu:"kép → képek",en:"picture → pictures",note:"Group 2: high é → -ek"},
          {hu:"lány → lányok",en:"girl → girls",note:"Group 3: deep -ok"},
          {hu:"vonat → vonatok",en:"train → trains",note:"Group 3: deep -ok"},
          {hu:"gyümölcs → gyümölcsök",en:"fruit → fruits",note:"Group 2: ü → -ök"},
          {hu:"álom → álmok",en:"dream → dreams",note:"Group 4: drop-vowel"},
          {hu:"tükör → tükrök",en:"mirror → mirrors",note:"Group 4+2: drop+ö → -ök"},
          {hu:"víz → vizek",en:"water → waters",note:"Group 5: í→i +-ek"},
          {hu:"kenyér → kenyerek",en:"bread → breads",note:"Group 5: é→e +-ek"},
          {hu:"kő → kövek",en:"stone → stones",note:"Group 7: ő→ö +v +-ek"},
          {hu:"ló → lovak",en:"horse → horses",note:"Group 7: ó→o +v +-ak"},
          {hu:"fű → füvek",en:"grass → grasses",note:"Group 7: ű→ü +v +-ek"},
          {hu:"barát → barátok",en:"friend → friends",note:"Group 3: deep -ok"},
          {hu:"utca → utcák",en:"street → streets",note:"Group 1: a→á +k"},
          {hu:"idő → idők",en:"time/weather → times",note:"Group 1-like: ő ending → -k"},
        ]},
      { type:"exercise", title:"Exercise 4 — Choose the Correct Plural",
        instructions:"Select the correct plural form.",
        ex_type:"mcq",
        questions:[
          {q:"kép (picture):",opts:["képek","képok","képák"],correct:0,explain:"kép is high-vowel (é) → -ek: képek"},
          {q:"lány (girl):",opts:["lányok","lányak","lányék"],correct:0,explain:"lány is deep-vowel → -ok: lányok"},
          {q:"tó (lake):",opts:["tók","tóak","tavak"],correct:2,explain:"V-word Group 7: tó → tavak (ó→a +v)"},
          {q:"álom (dream):",opts:["álomok","álmok","álomek"],correct:1,explain:"Drop-vowel Group 4: álom → álmok (o drops)"},
        ]},
      { type:"summary",
        summary:"This chapter taught the 9 groups that determine how Hungarian nouns form their plurals.\n\n**What we covered:**\n• The plural marker -k with linking vowels -ok/-ak/-ek/-ök\n• Group 1: a→á, e→é before -k (almák, kertek)\n• Groups 2 & 3: high-vowel (-ek/-ök) and deep-vowel (-ok/-ak) regular nouns\n• Group 4: drop-vowel nouns (álom→álmok)\n• Group 5: long vowel shortens (madár→madarak)\n• Group 7: v-words with inserted v (tó→tavak, ló→lovak)",
        takeaways:["**Learn the plural, get the accusative free** — accusative = replace -k with -t, keeping the same link vowel.","**Groups 1-3 cover ~80% of all nouns** — master these first before worrying about the irregular groups.","**V-words (Group 7) are common and must be memorized:** tó→tavak, ló→lovak, kő→kövek, fű→füvek.","**No gender in Hungarian** — every noun follows the same pluralization rules regardless of meaning.","**Group 5 (long vowel shortens) includes some very common words:** madár, víz, kenyér, tűz, tél, szél."] }
    ]},
    { id:"a1-verbs", title:"Verbs — Present Tense", icon:"⚡", sections:[
      { type:"concept", title:"Two Conjugation Systems — Definite & Indefinite",
        body:"Hungarian verbs have **two full conjugation systems**. This is the most important grammar rule.\n\n**Use INDEFINITE when:**\n• No object: Megyek. (I'm going.) · Alszom. (I'm sleeping.)\n• Indefinite object (egy / no article): Látok egy házat. · Eszek kenyeret.\n• Object is 1st/2nd person: Látlak. (I see you.) · Szeretlek. (I love you.)\n\n**Use DEFINITE when:**\n• Object has definite article a/az: Látom a házat. · Eszem a kenyeret.\n• Object is a proper name: Látom Pétert. · Szeretem Marit.\n• Object has a possessive ending: Látom a házát. (I see his house.)\n\n**Present Indefinite — lát (to see):**\n| Person | Singular | Plural |\n|--------|---------|--------|\n| 1st | látok | látunk |\n| 2nd | látsz | láttok |\n| 3rd | lát | látnak |\n\n**Present Definite — lát (to see):**\n| Person | Singular | Plural |\n|--------|---------|--------|\n| 1st | látom | látjuk |\n| 2nd | látod | látjátok |\n| 3rd | látja | látják |\n\n**Pro-drop:** Pronouns usually omitted because verb endings show person.\nMegyek = I'm going · Olvasol = You're reading · Alszik = He/She is sleeping" },
      { type:"example", title:"20 Definite vs. Indefinite Examples",
        examples:[
          {hu:"Látok egy házat.",en:"I see a house.",note:"indefinite: egy = a/an"},
          {hu:"Látom a házat.",en:"I see THE house.",note:"definite: a = the"},
          {hu:"Eszek kenyeret.",en:"I eat some bread.",note:"indefinite: no article"},
          {hu:"Eszem a kenyeret.",en:"I eat THE bread.",note:"definite: a = the"},
          {hu:"Olvasok.",en:"I'm reading.",note:"indefinite: no object"},
          {hu:"Olvasom a könyvet.",en:"I'm reading the book.",note:"definite: a = the"},
          {hu:"Iszom vizet.",en:"I drink water.",note:"indefinite: no article"},
          {hu:"Iszom a vizet.",en:"I drink the water.",note:"definite: a = the"},
          {hu:"Írok egy levelet.",en:"I'm writing a letter.",note:"indefinite: egy"},
          {hu:"Írom a levelet.",en:"I'm writing the letter.",note:"definite: a"},
          {hu:"Várok valakit.",en:"I'm waiting for someone.",note:"indefinite: valakit"},
          {hu:"Várom Pétert.",en:"I'm waiting for Peter.",note:"definite: proper name"},
          {hu:"Csinálok valamit.",en:"I'm doing something.",note:"indefinite: valamit"},
          {hu:"Látlak téged.",en:"I see you.",note:"special form: -lak/-lek for 1st→2nd"},
          {hu:"Szeretem az anyámat.",en:"I love my mother.",note:"definite: possessive ending"},
          {hu:"Szeretem Marit.",en:"I love Mari.",note:"definite: proper name"},
          {hu:"Nézek egy filmet.",en:"I'm watching a film.",note:"indefinite: egy"},
          {hu:"Nézem a filmet.",en:"I'm watching the film.",note:"definite: a"},
          {hu:"Keresek állást.",en:"I'm looking for a job.",note:"indefinite: no article"},
          {hu:"Keresem a pénztárcámat.",en:"I'm looking for my wallet.",note:"definite: possessive -mat"},
        ]},
      { type:"vocab", title:"Essential Verbs",
        words:[
          {hu:"megy",en:"to go",emoji:"🚶"},
          {hu:"lát",en:"to see",emoji:"👁️"},
          {hu:"eszik",en:"to eat",emoji:"🍽️"},
          {hu:"iszik",en:"to drink",emoji:"🥤"},

          {hu:"van",en:"to be",emoji:"✨"},

      { type:"exercise", title:"Exercise 5 — Definite or Indefinite?",
        instructions:"Choose the correct conjugation form.",
        ex_type:"mcq",
        questions:[
          {q:"___ a könyvet. (I'm reading THE book.)",opts:["Olvasok","Olvasom"],correct:1,explain:"'a könyvet' has definite article → definite conjugation: olvasom"},
          {q:"___ egy könyvet. (I'm reading A book.)",opts:["Olvasok","Olvasom"],correct:0,explain:"'egy könyvet' = indefinite → indefinite conjugation: olvasok"},
          {q:"___ Pétert. (I see Peter.)",opts:["Látok","Látom"],correct:1,explain:"Proper name = definite → látom"},
          {q:"___. (I'm going — no object.)",opts:["Megyek","Megem"],correct:0,explain:"No object → indefinite conjugation: megyek"},
        ]},
      { type:"summary",
        summary:"This chapter introduced the most distinctive feature of Hungarian verb grammar: two full conjugation systems.\n\n**What we covered:**\n• Indefinite conjugation: no object, indefinite object (egy), or 1st/2nd person object\n• Definite conjugation: object has a/az, is a proper name, or has possessive ending\n• Full present tense tables for both systems\n• Pro-drop: Hungarian usually omits subject pronouns\n• Special -lak/-lek form for 1st person subject + 2nd person object",
        takeaways:["**The single most important rule:** see 'a' or 'az' before the object → use definite conjugation.","**Látok egy házat vs. Látom a házat** — memorize this pair. It demonstrates the entire system.","**Pro-drop is natural** — never force pronouns unless emphasizing. Megyek means 'I am going', én megyek means 'I AM going (not someone else)'.","**-lak/-lek is a gift** — one form covers 'I see/love/know you'. Látlak, Szeretlek, Ismerlek.","**Build the habit now:** before every verb, ask 'is the object definite?' This reflex is worth more than any rule list."] }
    ]},
    { id:"a1-vocabulary", title:"Everyday Vocabulary", icon:"🗣️", sections:[
      { type:"concept", title:"Greetings, Numbers, Colors & Days",
        body:"**Greetings & Essentials:**\n• Szia! / Helló! — Hi! (informal)\n• Szervusz! — Hello! (old-fashioned informal)\n• Jó reggelt! — Good morning!\n• Jó napot! — Good day! (formal)\n• Jó estét! — Good evening!\n• Jó éjszakát! — Good night!\n• Viszontlátásra! / Viszlát! — Goodbye!\n• Köszönöm / Köszi — Thank you / Thanks\n• Kérem / Kérem szépen — Please / You're welcome\n• Igen — Yes · Nem — No · Talán — Maybe\n• Elnézést! — Excuse me! / Sorry!\n• Nem értem. — I don't understand.\n• Nem tudom. — I don't know.\n• Segítség! — Help!\n\n**Numbers 1–20:** egy, kettő/két, három, négy, öt, hat, hét, nyolc, kilenc, tíz, tizenegy, tizenkettő, tizenhárom, tizennégy, tizenöt, tizenhat, tizenhét, tizennyolc, tizenkilenc, húsz\n\n**Colors:** piros (red), kék (blue), zöld (green), sárga (yellow), fehér (white), fekete (black), barna (brown), szürke (gray), lila (purple), narancs/narancssárga (orange), rózsaszín (pink), arany (gold), ezüst (silver)\n\n**Days:** hétfő (Mon), kedd (Tue), szerda (Wed), csütörtök (Thu), péntek (Fri), szombat (Sat), vasárnap (Sun)" },
      { type:"example", title:"20 Essential Vocabulary Examples",
        examples:[
          {hu:"Jó reggelt!",en:"Good morning!",note:"reggel = morning"},
          {hu:"Jó napot!",en:"Good day! (formal)",note:"used with strangers/formally"},
          {hu:"Jó estét!",en:"Good evening!",note:"este = evening"},
          {hu:"Szia! / Viszlát!",en:"Hi! / Bye! (both informal)",note:"szia = informal greeting AND farewell"},

          {hu:"Kérem szépen.",en:"Please / Here you are.",note:"extremely common polite phrase"},

          {hu:"Nem tudom.",en:"I don't know.",note:"tud = to know/can"},
          {hu:"Igen, kérem.",en:"Yes, please.",note:"combining yes + please"},
          {hu:"Nem, köszönöm.",en:"No, thank you.",note:"politely declining"},
          {hu:"Hogy vagy?",en:"How are you? (informal)",note:"vagy = you are"},
          {hu:"Jól vagyok, köszönöm.",en:"I'm fine, thank you.",note:"jól = well/fine"},
          {hu:"Mi a neve?",en:"What is your name? (formal)",note:"neve = his/her/your name"},
          {hu:"A nevem Péter.",en:"My name is Peter.",note:"nevem = my name"},
          {hu:"Hány éves vagy?",en:"How old are you?",note:"éves = years old"},
          {hu:"Hol laksz?",en:"Where do you live?",note:"lakik = to live"},
          {hu:"Segíthetek?",en:"Can I help you?",note:"segít = to help"},
          {hu:"Hol van a WC?",en:"Where is the toilet?",note:"practical vocabulary"},
          {hu:"Mennyibe kerül?",en:"How much does it cost?",note:"kerül = costs"},
        ]},
      { type:"vocab", title:"Objects & Animals",
        words:[
          {hu:"asztal",en:"table",img:"asztal"},

          {hu:"autó",en:"car",img:"autó"},

      { type:"exercise", title:"Exercise 6 — Essential Hungarian",
        instructions:"Choose the correct answer.",
        ex_type:"mcq",
        questions:[
          {q:"'Good morning' in Hungarian:",opts:["Jó estét!","Jó reggelt!","Jó napot!","Viszontlátásra!"],correct:1,explain:"Jó reggelt! = Good morning (reggel = morning)"},
          {q:"'Thank you' in Hungarian:",opts:["Kérem","Köszönöm","Igen","Elnézést"],correct:1,explain:"Köszönöm = Thank you"},
          {q:"Color: red =",opts:["kék","zöld","piros","fehér"],correct:2,explain:"piros = red; kék = blue; zöld = green; fehér = white"},
          {q:"'I don't understand':",opts:["Nem tudom","Nem értem","Nem megyek","Nem látok"],correct:1,explain:"Nem értem = I don't understand (ért = to understand)"},

      { type:"summary",
        summary:"This chapter built your core everyday vocabulary: greetings, numbers, colors, and days.\n\n**What we covered:**\n• Formal vs. informal greetings (Jó napot vs. Szia)\n• Essential phrases: Köszönöm, Kérem, Elnézést, Nem értem\n• Numbers 1–20 and their structure (tizenegy = ten+one)\n• 13 core colors\n• Days of the week and months",
        takeaways:["**Szia is both hello AND goodbye** — informal only. Use Jó napot (hello) and Viszontlátásra (goodbye) with strangers.","**Köszönöm vs. Kérem** — Köszönöm = thank you; Kérem = please AND you're welcome. One word, two uses.","**Hungarian numbers 11-19** are built as tizen+number: tizenegy (11), tizenkettő (12). This pattern extends to 20s, 30s etc.","**Nem értem (I don't understand) is your lifeline** — learn it before you need it. Say it confidently.","**Days have no capital letters in Hungarian** — hétfő, kedd, szerda — unlike English Monday, Tuesday, Wednesday."] }
    ]},
{ id:"a1-family", title:"Family & People", icon:"👨‍👩‍👧", sections:[
      { type:"concept", title:"Family Vocabulary & Describing People",
        body:`**Family members (családtagok):**
| Hungarian | English | Hungarian | English |
|-----------|---------|-----------|---------|
| apa / édesapa | father | anya / édesanya | mother |
| fiú | son / boy | lány | daughter / girl |
| fivér / bátyám / öcsém | brother (older/younger) | nővér / néném / húgom | sister (older/younger) |
| nagyapa / nagypapa | grandfather | nagyanya / nagymama | grandmother |
| nagybácsi | uncle | nagynéni | aunt |
| unokatestvér | cousin | unoka | grandchild |
| férj | husband | feleség | wife |
| házastárs | spouse | partner | partner |

**Describing people (ember leírása):**
• Adjectives: magas (tall), alacsony (short), kövér (fat), sovány (thin), fiatal (young), öreg/idős (old)
• Hair: szőke (blonde), barna (brunette), fekete (black), vörös/rőt (red), ősz (grey), kopasz (bald)
• Eyes: kék szemű (blue-eyed), barna szemű (brown-eyed), zöld szemű (green-eyed)

**Asking about people:**
• Ki ez? — Who is this?
• Hány éves? — How old is he/she?
• Hogy néz ki? — What does he/she look like?
• Milyen a személyisége? — What is his/her personality like?` },

          {q:"'My older brother' in Hungarian:",opts:["öcsém","fivérem","bátyám","férjem"],correct:2,explain:"bátyám = my older brother. öcsém = my younger brother."},

          {q:"'Tall and blonde' describing a person:",opts:["magas és barna","magas és szőke","alacsony és szőke","fiatal és kövér"],correct:1,explain:"magas = tall, szőke = blonde"},
        ]},
      { type:"summary",
        summary:`This chapter covered Hungarian family vocabulary and describing people.

**What we covered:**
• Core family members with gender-specific terms (bátyám/öcsém, nővérem/húgom)
• Physical descriptions: height, build, age, hair and eye colour
• Personality adjectives
• Key questions: Ki ez? Hány éves? Hogy néz ki? Milyen?
• Possessive endings in context (apám, anyám, fivérem)`,
        takeaways:[
          "**Hungarian has separate words for older/younger siblings** — bátyám (older brother), öcsém (younger brother), nővérem (older sister), húgom (younger sister). This reflects the Confucian-influenced importance of birth order.",
          "**Professions after van omit the article** — A feleségem tanár. NOT 'egy tanár'. This rule from the A2 articles chapter applies constantly in family descriptions.",
          "**Hasonlít vkire (resembles someone)** uses the -ra/-re suffix — hasonlít az apjára = resembles his/her father.",
          "**Egyke (only child)** — useful word with no direct English equivalent compound.",
        ]},
    ]},
    { id:"a1-daily-life", title:"Daily Life & Routines", icon:"📅", sections:[
      { type:"concept", title:"Times, Routines, and the Present Tense in Daily Life",
        body:`**Times of day:**
• reggel (in the morning) · délelőtt (in the late morning)
• délben (at noon) · délután (in the afternoon)
• este (in the evening) · éjjel/éjszaka (at night)

**Days recap + telling time:**
• Hány óra van? — What time is it?
• Háromra van. — It is three o'clock. (-ra/-re suffix)
• Negyed négy. — Quarter past three. (lit: quarter four)
• Fél négy. — Half past three. (lit: half four — DIFFERENT from English!)
• Háromnegyed négy. — Quarter to four. (lit: three-quarters four)

**Common daily routine verbs:**
| Hungarian | English |
|-----------|---------|
| felkel | gets up |
| megmosakodik | washes up |
| reggelizik | has breakfast |
| dolgozik | works |
| ebédel | has lunch |
| vacsorázik | has dinner |
| lefekszik | goes to bed |
| alszik | sleeps |

**Frequency adverbs:**
• mindig (always) · általában (usually) · gyakran (often) · néha (sometimes) · ritkán (rarely) · soha (never)

**"Soha" and "nem" — double negation is STANDARD in Hungarian:**
Soha nem megyek oda. (I never go there.) — BOTH soha AND nem are required.` },
      { type:"example", title:"20 Daily Life Examples",
        examples:[
          {hu:"Hatkor kelek fel.",en:"I get up at six.",note:"-kor = at (time point)"},
          {hu:"Reggel kávét iszom.",en:"I drink coffee in the morning.",note:"no article for habitual"},
          {hu:"Fél nyolcra megyek dolgozni.",en:"I go to work at half past seven.",note:"fél nyolc = 7:30"},
          {hu:"Délben ebédelek.",en:"I have lunch at noon.",note:"délben = at noon"},
          {hu:"Általában nyolckor fekszem le.",en:"I usually go to bed at eight.",note:"általában = usually"},
          {hu:"Soha nem iszom alkoholt.",en:"I never drink alcohol.",note:"double negation: soha + nem"},
          {hu:"Ritkán nézek tévét.",en:"I rarely watch TV.",note:"ritkán = rarely"},
          {hu:"Minden nap futok.",en:"I run every day.",note:"minden nap = every day"},
          {hu:"Hetente háromszor edzek.",en:"I train three times a week.",note:"hetente = weekly"},
          {hu:"Negyed ötkor végzek.",en:"I finish at quarter past four.",note:"negyed öt = 4:15"},
          {hu:"Háromnegyed hatkor indul a vonat.",en:"The train leaves at quarter to six.",note:"háromnegyed hat = 5:45"},
          {hu:"Mikor kelsz fel?",en:"When do you get up?",note:"mikor = when"},
          {hu:"Mit szoktál reggelizni?",en:"What do you usually have for breakfast?",note:"szokott + inf = usually does"},
          {hu:"Korán kelek.",en:"I get up early.",note:"korán = early"},
          {hu:"Késő este dolgozom.",en:"I work late in the evening.",note:"késő este = late evening"},
          {hu:"Délelőtt bevásárolok.",en:"I go shopping in the late morning.",note:"bevásárol = to do shopping"},
          {hu:"Este olvasok vagy tévét nézek.",en:"In the evening I read or watch TV.",note:"vagy = or"},
          {hu:"Hétvégén kikapcsolódok.",en:"I relax on the weekend.",note:"hétvégén = on the weekend"},
          {hu:"Munkanapokon autóval megyek.",en:"On weekdays I go by car.",note:"munkanap = weekday"},
          {hu:"Mennyi ideje tart?",en:"How long does it take?",note:"mennyi ideig = for how long"},
        ]},
      { type:"exercise", title:"Exercise — Daily Routines",
        instructions:"Choose the correct translation.",
        ex_type:"mcq",
        questions:[
          {q:"'Half past seven' in Hungarian time-telling:",opts:["Fél hét","Fél nyolc","Negyed nyolc","Háromnegyed nyolc"],correct:1,explain:"Fél nyolc = half past seven. Hungarian counts to the NEXT hour: fél 8 = half of 8 = 7:30."},
          {q:"'I never drink coffee' — correct Hungarian:",opts:["Soha iszom kávét.","Nem iszom soha kávét.","Soha nem iszom kávét.","Nem soha iszom kávét."],correct:2,explain:"Double negation: soha (never) + nem (not) are BOTH required. Soha nem iszom kávét."},
          {q:"'I usually go to bed at ten' — frequency adverb:",opts:["mindig","általában","soha","ritkán"],correct:1,explain:"általában = usually / generally"},
          {q:"'Quarter past three' in Hungarian:",opts:["Háromnegyed három","Fél három","Negyed három","Negyed négy"],correct:3,explain:"Negyed négy = quarter past three (lit: quarter of four = 3:15)"},

      { type:"summary",
        summary:`This chapter covered daily routines, telling time, and frequency expressions.

**What we covered:**
• Hungarian time system: negyed (¼), fél (½), háromnegyed (¾) — counting toward the NEXT hour
• Daily routine verbs with their irregular forms

        takeaways:[
          "**Fél nyolc = 7:30, NOT 8:30** — Hungarian counts toward the next hour. Fél = half (of the next hour). This trips up every English speaker.",
          "**Double negation is grammatically correct** in Hungarian — soha nem megyek = I never go. Using only one negation sounds foreign.",
          "**Szokott + infinitive** expresses habitual action — Mit szoktál csinálni? = What do you usually do? Very natural, worth memorizing.",

    { id:"a1-food", title:"Food, Eating & Hungarian Cuisine", icon:"🍽️", sections:[
      { type:"concept", title:"Food Vocabulary, Ordering, and Meals",
        body:`**Hungarian meals (étkezések):**
• reggeli — breakfast · tízórai — mid-morning snack
• ebéd — lunch (main meal in Hungary!) · uzsonna — afternoon snack · vacsora — dinner

**Key food categories:**
| Category | Hungarian | Examples |
|----------|-----------|---------|
| Meat | hús | marhahús (beef), sertéshús (pork), csirkehús (chicken), halak (fish) |
| Vegetables | zöldségek | paradicsom (tomato), paprika (pepper/paprika), hagyma (onion), krumpli (potato) |
| Fruit | gyümölcsök | alma (apple), körte (pear), szilva (plum), meggy (sour cherry) |
| Dairy | tejtermékek | tej (milk), túró (cottage cheese), tejföl (sour cream) |
| Bread | kenyér | fehér kenyér, barna kenyér, zsemle (bread roll) |

**Hungarian signature dishes:**
• gulyás — goulash (soup, not stew!) · pörkölt — meat stew · paprikás csirke — chicken paprikash
• lángos — fried dough street food · kürtőskalács — chimney cake
• halászlé — fish soup · töltött káposzta — stuffed cabbage · lecsó — pepper-tomato stew

**Ordering at a restaurant:**
• Kérek egy... — I would like a...
• Kérnék egy... — I would like a... (polite conditional)
• Mit ajánl? — What do you recommend?
• Hozna egy... — Could you bring a...
• Fizetni szeretnék. — I would like to pay.
• Kérem a számlát! — The bill, please!` },
      { type:"example", title:"20 Food & Restaurant Examples",
        examples:[
          {hu:"Kérnék egy gulyáslevest.",en:"I would like a goulash soup.",note:"conditional = polite order"},
          {hu:"Mit ajánl ma?",en:"What do you recommend today?",note:"ajánl = to recommend"},
          {hu:"Vegetáriánus vagyok.",en:"I am vegetarian.",note:"vegetáriánus"},
          {hu:"Allergiás vagyok a diófélékre.",en:"I am allergic to nuts.",note:"allergiás vkire/vmire"},
          {hu:"Mennyibe kerül ez az étel?",en:"How much does this dish cost?",note:"étel = dish/food"},
          {hu:"Kérem a számlát!",en:"The bill, please!",note:"számla = bill/receipt"},
          {hu:"Jó étvágyat!",en:"Enjoy your meal! (Bon appétit)",note:"standard phrase before eating"},
          {hu:"Nagyon finom volt!",en:"It was very delicious!",note:"finom = delicious, tasty"},
          {hu:"Ebéd a főétkezésem.",en:"Lunch is my main meal.",note:"főétkezés = main meal"},
          {hu:"Tejfölt kérek mellé.",en:"I'd like sour cream with it.",note:"mellé = alongside/with it"},
          {hu:"Milyen húst kérsz?",en:"What kind of meat would you like?",note:"milyen = what kind"},
          {hu:"Csípőset kérek.",en:"I'd like it spicy.",note:"csípős = spicy/hot"},
          {hu:"Egy pohár vizet kérnék.",en:"I would like a glass of water.",note:"pohár = glass"},
          {hu:"Van gluténmentes lehetőség?",en:"Is there a gluten-free option?",note:"gluténmentes = gluten-free"},
          {hu:"A pörkölt nagyon fűszeres.",en:"The pörkölt is very spicy.",note:"fűszeres = seasoned/spicy"},
          {hu:"Friss zöldségeket szeretek.",en:"I like fresh vegetables.",note:"friss = fresh"},
          {hu:"Reggelire tojást eszem.",en:"I eat eggs for breakfast.",note:"-ra/-re = for (meal)"},
          {hu:"Főzök ma este.",en:"I'm cooking tonight.",note:"főz = to cook"},
          {hu:"Bevásárlok a piacon.",en:"I shop at the market.",note:"piac = market"},
          {hu:"Éhes vagyok.",en:"I am hungry.",note:"éhes = hungry · szomjas = thirsty"},
        ]},
      { type:"exercise", title:"Exercise — Food & Ordering",
        instructions:"Choose the correct answer.",
        ex_type:"mcq",
        questions:[
          {q:"In Hungary, which meal is traditionally the main meal?",opts:["Reggeli (breakfast)","Ebéd (lunch)","Vacsora (dinner)","Tízórai (snack)"],correct:1,explain:"Ebéd (lunch) is traditionally the main meal in Hungary — usually a hot two-course meal eaten at midday."},
          {q:"'The bill, please!' in Hungarian:",opts:["Jó étvágyat!","Kérem a számlát!","Mit ajánl?","Fizetni szeretnék."],correct:1,explain:"Kérem a számlát! = Please the bill! The most standard phrase to ask for the check."},
          {q:"'Gulyás' in Hungary is:",opts:["A thick meat stew","A paprika chicken dish","A soup","A fried dough"],correct:2,explain:"Gulyás in Hungary is a SOUP (gulyásleves), not the thick stew foreigners often imagine. The stew version is called pörkölt."},
          {q:"'I am allergic to' in Hungarian:",opts:["Allergiás vagyok...","Nem szeretem...","Nem kérem...","Gluténmentes vagyok..."],correct:0,explain:"Allergiás vagyok valamire = I am allergic to something. Takes -ra/-re suffix."},
        ]},
      { type:"summary",
        summary:`This chapter covered Hungarian food vocabulary, meal structure, and restaurant language.

**What we covered:**
• Hungarian meal names and the cultural importance of ebéd (lunch)
• Core food categories: meats, vegetables, fruit, dairy
• Iconic Hungarian dishes every learner should know
• Restaurant phrases using polite conditional (kérnék)
• Dietary restrictions vocabulary`,
        takeaways:[
          "**Ebéd is the main meal** — in Hungarian culture, lunch is the hot substantial meal. Vacsora (dinner) is often lighter. This affects how you discuss eating habits.",
          "**Gulyás is a soup** — the world knows it as a stew, but in Hungary it's gulyásleves (goulash soup). What foreigners call goulash is pörkölt.",
          "**Kérnék (I would like) is standard** — conditional mood in restaurants signals politeness. Kérek (I want) sounds blunt. Always use kérnék when ordering.",
          "**Tejföl (sour cream) is everywhere** — it accompanies almost every dish. Knowing this word is practically essential for eating in Hungary.",
        ]},
    ]},
  ]},

  { level:"A2", color:"#3b82f6", title:"Elementary", chapters:[
    { id:"a2-cases", title:"Accusative & Dative Cases", icon:"🎯", sections:[
      { type:"concept", title:"Suffixes Replace Prepositions",
        body:"**Accusative (-t)** — marks the direct object:\nThe link vowel mirrors the plural pattern.\n• Deep words with -ok plural: -ot (asztal→asztalot)\n• Deep words with -ak plural: -at (ház→házat)\n• High words with -ek plural: -et (ember→embert, but kép→képet)\n• High words with -ök plural: -öt (gyümölcs→gyümölcsöt)\n\n**Rule 1 — No link vowel after:** j, l, ly, n, ny, r, s, sz, z\n• lány→lányt · őr→őrt · asztal→asztalt ← BUT some are irregular\n\n**Rule 2 — Irregular nouns follow their plural:**\n• nyár (summer) → nyarak (pl.) → nyarat (acc.) — irregular!\n• sál (scarf) → sálak (pl.) → sálat (acc.)\n\n**Dative (-nak/-nek)** — indirect object (to/for somebody):\n• No link vowel needed — attach directly!\n• Deep: -nak · High: -nek\n• Making plural dative: add -nak/-nek to plural form\n\n**Possession with dative:**\n• Nekem van egy házam. (I have a house.)\n  Literal: 'To-me there-is a house-of-mine'\n• Nincs autóm. (I don't have a car.) — nincs = there is not\n• Van autója? (Does he/she have a car?) — neutral question" },
      { type:"example", title:"20 Case Examples",
        examples:[
          {hu:"Látom a házat.",en:"I see the house.",note:"-at = accusative (deep)"},
          {hu:"Olvasom a könyvet.",en:"I read the book.",note:"-et = accusative (high)"},
          {hu:"Eszem az almát.",en:"I eat the apple.",note:"-át = acc. (Group 1: a→á)"},
          {hu:"Iszom a vizet.",en:"I drink the water.",note:"-et = acc. (Group 5: í→i)"},
          {hu:"Keresem a kulcsomat.",en:"I'm looking for my key.",note:"-at = acc. of kulcs"},
          {hu:"Látom a gyümölcsöt.",en:"I see the fruit.",note:"-öt = acc. (high round)"},
          {hu:"Várom a buszt.",en:"I'm waiting for the bus.",note:"-t direct (ends in sz)"},
          {hu:"Szeretem a kutyát.",en:"I love the dog.",note:"-át = acc. (kutya Group 1)"},
          {hu:"Adok a gyerekeknek.",en:"I give to the children.",note:"-nek = dative (high)"},
          {hu:"Mondok valamit a barátomnak.",en:"I say something to my friend.",note:"-nak = dative (deep)"},
          {hu:"Írok egy levelet a tanárnak.",en:"I write a letter to the teacher.",note:"acc. + dative together"},
          {hu:"Küldök virágot az anyámnak.",en:"I send flowers to my mother.",note:"virágot = acc., anyámnak = dat."},
          {hu:"Megmutatom a képet a barátomnak.",en:"I show the picture to my friend.",note:"képet = acc., barátomnak = dat."},
          {hu:"Nekem van egy házam.",en:"I have a house.",note:"nekem + van + possessive"},
          {hu:"Nincs autóm.",en:"I don't have a car.",note:"nincs = there is not"},
          {hu:"Van laptopja?",en:"Does he/she have a laptop?",note:"van + possessive ending"},
          {hu:"Nekünk van két gyerekünk.",en:"We have two children.",note:"nekünk (dative of mi)"},
          {hu:"Nincs pénzem.",en:"I don't have money.",note:"nincs + 1PS possessive"},
          {hu:"Nincsenek barátaim.",en:"I don't have friends.",note:"nincsenek = there are not (plural)"},
          {hu:"Mennyi ideje van?",en:"How much time does he/she have?",note:"ideje = his/her time (possessive)"},
        ]},
      { type:"exercise", title:"Exercise 7 — Cases",
        instructions:"Choose the correctly declined form.",
        ex_type:"mcq",
        questions:[
          {q:"Látom a ___. (I see the house.)",opts:["házat","háznak","házban","ház"],correct:0,explain:"-at = accusative, direct object of látom"},
          {q:"Adok a ___. (I give to the child.)",opts:["gyereknek","gyereket","gyerekben","gyerekre"],correct:0,explain:"-nek = dative (giving TO someone, high vowel)"},
          {q:"___ van egy kutyám. (I have a dog.)",opts:["Engem","Nálam","Nekem","Tőlem"],correct:2,explain:"Nekem (dative of én 'I') + van = I have"},
        ]},
      { type:"summary",
        summary:"This chapter covered the two most important Hungarian cases: accusative (direct object) and dative (indirect object/possession).\n\n**What we covered:**\n• Accusative -t with link vowels following plural patterns\n• Rules 1 & 2: direct attachment after j,l,n,r,s,sz,z vs. following irregular plural forms\n• Dative -nak/-nek with no link vowel needed\n• Possession structure: nekem van + possessive ending (NOT a 'have' verb)\n• Nincs for negative possession",
        takeaways:["**Know the plural → get the accusative** — replace -k with -t, keeping the same link vowel. álom→álmok→álmot.","**Dative is the simplest case** — just -nak or -nek with no link vowel. Attach directly to the noun.","**'I have' = Nekem van egy [noun+possessive]** — there is no 'have' verb. This structure must be memorized as a unit.","**Nincs = there is not** — use for negating possession: Nincs autóm = I don't have a car (NOT Nem van autóm).","**Dative double-duty:** -nak/-nek marks both indirect objects AND the possessor in the 'to have' construction."] }
    ]},
    { id:"a2-adjectives", title:"Adjectives & Comparison", icon:"🎨", sections:[
      { type:"concept", title:"Attributive Adjectives Never Change Form",
        body:"**Attributive** (before noun) — NEVER decline:\n• a nagy ház (the big house)\n• a nagy házat (accusative) — adjective stays nagy!\n• a nagy házakban (plural locative) — still nagy!\n• a szép lányt látom (I see the beautiful girl) — szép unchanged\n\n**Predicative** (after verb to be) — MUST agree:\n• A ház nagy. (The house is big.) — 3rd PS, no van in present!\n• A házak nagyok. (The houses are big.) — plural\n• NOTE: 3rd person van/vannak is OMITTED in present tense!\n• But all other persons: Én nagy vagyok. · Te nagy vagy. · Mi nagyok vagyunk.\n\n**Plural predicative endings:**\n• Ending in a/e: laza→lazák, enyhe→enyhék\n• High-vowel: szép→szépek, kényelmes→kényelmesek\n• Deep-vowel most: magas→magasak, BUT nagy→nagyok, vastag→vastagok\n\n**Comparison:**\n• Positive: olyan...mint (as...as) — olyan okos, mint Dávid.\n• Comparative: -bb + mint (more/er than) — nagyobb, mint = bigger than\n  Link vowels: -obb (deep), -ebb (high), -abb (some monosyllables)\n• Superlative: a leg-...-bb — a legnagyobb (the biggest)\n\n**Irregular comparatives:**\n• jó→jobb→legjobb · szép→szebb→legszebb\n• sok→több→legtöbb · kevés→kevesebb→legkevesebb\n• hosszú→hosszabb · könnyű→könnyebb" },
      { type:"example", title:"20 Adjective Examples",
        examples:[
          {hu:"a piros alma",en:"the red apple",note:"attributive: piros unchanged"},
          {hu:"az alma piros",en:"the apple is red",note:"predicative: 3rd PS, no van"},
          {hu:"az almák pirosak",en:"the apples are red",note:"predicative plural: -ak"},
          {hu:"a nagy ház",en:"the big house",note:"attributive: nagy unchanged"},
          {hu:"A ház nagy.",en:"The house is big.",note:"predicative singular"},
          {hu:"A házak nagyok.",en:"The houses are big.",note:"predicative plural: -ok"},
          {hu:"a szép lány",en:"the beautiful girl",note:"attributive unchanged"},
          {hu:"A lány szép.",en:"The girl is beautiful.",note:"predicative 3rd PS"},
          {hu:"a szép lányt",en:"the beautiful girl (acc.)",note:"only noun declines!"},
          {hu:"Péter nagyobb, mint Dávid.",en:"Peter is taller than David.",note:"comparative -bb + mint"},
          {hu:"Péter nagyobb Dávidnál.",en:"Peter is taller than David.",note:"-nál replaces mint"},
          {hu:"Ez a legjobb étel!",en:"This is the best food!",note:"superlative: jó→legjobb"},
          {hu:"Anna a legszebb lány.",en:"Anna is the most beautiful girl.",note:"superlative + noun"},
          {hu:"olyan okos, mint Dávid",en:"as smart as David",note:"positive comparison"},
          {hu:"kevésbé drága",en:"less expensive",note:"kevésbé + adjective"},
          {hu:"ez az autó gyorsabb",en:"this car is faster",note:"comparative + demonstrative"},
          {hu:"a legdrágább telefon",en:"the most expensive phone",note:"superlative of drága"},
          {hu:"Én fáradt vagyok.",en:"I am tired.",note:"predicative: 1st PS, vagyok needed"},
          {hu:"Ti boldogok vagytok.",en:"You are happy.",note:"predicative: 2nd PP"},
          {hu:"Ezek a könyvek érdekesek.",en:"These books are interesting.",note:"predicative demonstrative"},
        ]},
      { type:"exercise", title:"Exercise 8 — Adjective Forms",
        instructions:"Choose the correct form.",
        ex_type:"mcq",
        questions:[
          {q:"I see a BIG house (attributive):",opts:["Látok egy nagyot házat.","Látok egy nagy házat.","Látok egy nagyok házat."],correct:1,explain:"Attributive adjectives never decline: nagy házat"},
          {q:"The houses ARE BIG (predicative plural):",opts:["A házak nagy.","A házak nagyok.","A házak nagyat."],correct:1,explain:"Predicative plural: nagy → nagyok"},
          {q:"The BEST food (irregular superlative of jó):",opts:["a jobbabb étel","a legjobb étel","a legjobbabb étel"],correct:1,explain:"jó (good) → superlative: legjobb (irregular)"},
        ]},
      { type:"summary",
        summary:"This chapter taught the two types of adjective positions and the full comparison system.\n\n**What we covered:**\n• Attributive adjectives (before noun): completely invariable — never decline!\n• Predicative adjectives (after van): agree with subject in number\n• 3rd person van/vannak is OMITTED in present tense\n• Comparison: olyan...mint, -bb+mint/-nál, a leg-...-bb\n• Irregular comparatives: jó→jobb, szép→szebb, sok→több",
        takeaways:["**Attributive = frozen** — a nagy ház, a nagy házat, a nagy házakban. The adjective never changes. This is a huge simplification vs. German/Russian.","**Predicative = must agree** — A házak nagyok (not *nagy). When the adjective is the predicate, add the plural ending.","**Van/vannak disappears in 3rd person present** — A ház nagy. (NOT: A ház nagy van.) This is a firm rule.","**Superlative always needs 'a'** — a legjobb (the best), a legszebb (the most beautiful). The definite article is mandatory.","**Memorize the 4 irregular comparatives** — jó/jobb, szép/szebb, sok/több, kevés/kevesebb. They appear in almost every conversation."] }
    ]},
    { id:"a2-pronouns", title:"Pronouns", icon:"👤", sections:[
      { type:"concept", title:"ő = He, She, AND It — No Gender!",
        body:"**Personal pronouns (usually omitted):**\n| Person | Singular | Plural |\n|--------|---------|--------|\n| 1st | én (I) | mi (we) |\n| 2nd | te (you) | ti (you pl.) |\n| 3rd | **ő** (he/she/it!) | ők (they) |\n\nSince verb endings show person/number, pronouns are used ONLY for emphasis:\nÉn megyek, nem te. (I'M going, not you.) — strong contrast needed\nÓ tudja! (HE/SHE knows!) — emphasis\n\n**Accusative pronouns (object):**\nengem (me), téged/magadat (you), őt (him/her/it), minket/bennünket (us), titeket/benneteket (you pl.), őket (them)\n\n**Dative pronouns (to/for):**\nnekem (to me), neked (to you), neki (to him/her), nekünk (to us), nektek (to you pl.), nekik (to them)\n\n**Demonstrative pronouns:**\nez (this), az (that) — Acc: ezt (this-ACC), azt (that-ACC)\nPlural: ezek (these), azok (those) — Acc: ezeket, azokat\n\n**Reflexive pronouns:**\nmagam (myself), magad (yourself), maga/magát (himself/herself/itself)\nmagunkat (ourselves), magatokat (yourselves), magukat (themselves)\n\n**Reciprocal:** egymást (each other)" },
      { type:"example", title:"20 Pronoun Examples",
        examples:[
          {hu:"Ő orvos.",en:"He/She is a doctor.",note:"ő = he OR she — no gender!"},
          {hu:"Látom őt.",en:"I see him/her.",note:"accusative: őt"},
          {hu:"Neked adom.",en:"I give it to you.",note:"dative: neked"},
          {hu:"Ezt a könyvet olvasom.",en:"I'm reading this book.",note:"ezt = acc. of ez"},
          {hu:"Én megyek, nem ő.",en:"I'M going, not he/she.",note:"pronouns for contrast/emphasis"},
          {hu:"Engem keres?",en:"Are you looking for me?",note:"engem = accusative of én"},
          {hu:"Minket nem lát.",en:"He doesn't see us.",note:"minket = accusative of mi"},
          {hu:"Nekik adom a könyvet.",en:"I give the book to them.",note:"nekik = dative of ők"},
          {hu:"Azt mondja, hogy...",en:"He/she says that...",note:"azt = acc. of az"},
          {hu:"Ezeket a képeket nézem.",en:"I'm looking at these pictures.",note:"ezeket = acc. pl. of ez"},
          {hu:"Azokat veszem meg.",en:"I'm buying those (ones).",note:"azokat = acc. pl. of az"},
          {hu:"Ő is jön.",en:"He/she is coming too.",note:"is = also/too"},
          {hu:"Nekünk is van.",en:"We have it too.",note:"nekünk + is"},
          {hu:"Magamat látom a tükörben.",en:"I see myself in the mirror.",note:"reflexive: magamat"},
          {hu:"Megvágta magát.",en:"He cut himself.",note:"reflexive: magát"},
          {hu:"Szeretik egymást.",en:"They love each other.",note:"reciprocal: egymást"},
          {hu:"Nekem adja.",en:"He gives it to me.",note:"dative: nekem"},
          {hu:"Tőled kérem.",en:"I ask/get it from you.",note:"tőled = from you (ablative)"},
          {hu:"Veled megyek.",en:"I'm going with you.",note:"veled = with you (social)"},
          {hu:"Miattad késünk.",en:"We're late because of you.",note:"miattad = because of you"},
        ]},
      { type:"exercise", title:"Exercise 9 — Pronouns",
        instructions:"Select the correct pronoun form.",
        ex_type:"mcq",
        questions:[
          {q:"I give ___ (to him) the book.",opts:["ő","őt","neki","nála"],correct:2,explain:"to him = dative → neki"},
          {q:"I see ___ (her).",opts:["ő","őt","neki","tőle"],correct:1,explain:"see her = accusative → őt"},
          {q:"Hungarian for both 'he' and 'she':",opts:["én","ő","te","ők"],correct:1,explain:"ő = he/she/it — no grammatical gender!"},

      { type:"summary",
        summary:"This chapter introduced all pronoun types, including the gender-neutral ő and the accusative/dative forms.\n\n**What we covered:**\n• Personal pronouns (usually omitted): én, te, ő, mi, ti, ők\n• ő = he AND she AND it — Hungarian has no grammatical gender\n• Accusative forms: engem, téged, őt, minket, titeket, őket\n• Dative forms: nekem, neked, neki, nekünk, nektek, nekik\n• Demonstrative pronouns: ez/az and their declined forms\n• Reflexive (magam) and reciprocal (egymást)",
        takeaways:["**ő = he/she/it** — Hungarian has zero gender distinction. Context always makes meaning clear.","**Omit pronouns by default** — only include én, te, ő etc. when you want to CONTRAST or EMPHASIZE.","**Accusative vs. dative of pronouns:** őt = I see HIM/HER (direct), neki = I give TO HIM/HER (indirect).","**Ez/az decline like nouns** — ezt látom (I see this), annak adom (I give to that). Learn these accusative/dative forms.","**Egymást** (each other) is one of the most useful words in Hungarian — Szeretik egymást = They love each other."] }
    ]},
    { id:"a2-possession", title:"Possession & Possessive Endings", icon:"🏠", sections:[
      { type:"concept", title:"Ownership Endings on the Possessed Noun",
        body:"Instead of 'my house' Hungarian attaches endings to the noun itself:\n\n**Possessive endings for ház (house) — singular possession:**\n| Person | Ending | Result | Meaning |\n|--------|--------|--------|----------|\n| my | -m / -om / -am / -em | házam | my house |\n| your (sg.) | -d / -od / -ad / -ed | házad | your house |\n| his/her/its | -a / -ja | háza | his/her house |\n| our | -nk / -unk / -ünk | házunk | our house |\n| your (pl.) | -tok / -tek / -ötök | házatok | your house |\n| their | -uk / -ük / -juk / -jük | házuk | their house |\n\n**For nouns ending in a vowel** (the vowel often lengthens):\n• alma → almám (my apple), almád, almája, almánk...\n\n**Expressing 'to have':**\n• Nekem van egy házam. (I have a house.)\n• Nincs kutyám. (I don't have a dog.)\n• Van autója? (Does he/she have a car?)\n• Nincs semmi bajom. (I have nothing wrong / I'm fine.)\n\n**Possessive case — 'of' or 'whose':**\n• a ház teteje = the roof of the house (tető + possession ending)\n• Kié ez? = Whose is this?\n• Az enyém. (Mine.) · A tiéd. (Yours.) · Az övé. (His/hers.)\n• A mienk. (Ours.) · A tiétek. (Yours pl.) · Az övék. (Theirs.)\n\n**Plural possession:** add -i- before the personal ending:\n• házaim (my houses), házaid (your houses), házai (his/her houses)" },
      { type:"example", title:"20 Possession Examples",
        examples:[
          {hu:"a házam",en:"my house",note:"1st PS: ház + -am"},
          {hu:"a kutyád",en:"your dog",note:"2nd PS: kutya + -d (a drops)"},
          {hu:"az autója",en:"his/her car",note:"3rd PS: autó + -ja (same for he/she!)"},
          {hu:"a könyvünk",en:"our book",note:"1st PP: könyv + -ünk (high)"},
          {hu:"a házatok",en:"your house (pl.)",note:"2nd PP: ház + -atok (deep)"},
          {hu:"az autójuk",en:"their car",note:"3rd PP: autó + -juk"},
          {hu:"az almám",en:"my apple",note:"Group 1: alma + -m (a stays, -m added)"},
          {hu:"a nővérem",en:"my sister",note:"nővér + -em (high)"},
          {hu:"a barátom",en:"my friend",note:"barát + -om (deep)"},
          {hu:"Nekem van egy kutyám.",en:"I have a dog.",note:"nekem + van + kutyám"},
          {hu:"Nincs autóm.",en:"I don't have a car.",note:"nincs + possessive"},
          {hu:"Van testvéred?",en:"Do you have a sibling?",note:"van + testvér + -ed"},
          {hu:"Nincs pénzünk.",en:"We don't have money.",note:"nincs + pénz + -ünk"},
          {hu:"Kié ez a táska?",en:"Whose is this bag?",note:"Kié? = Whose?"},
          {hu:"Az enyém.",en:"It's mine.",note:"possessive pronoun"},
          {hu:"A tiéd a piros autó.",en:"The red car is yours.",note:"possessive pronoun"},
          {hu:"Az övé a nagy ház.",en:"The big house is his/hers.",note:"övé = his/hers"},
          {hu:"a házaim",en:"my houses",note:"plural possession: ház + -aim"},
          {hu:"a barátaim",en:"my friends",note:"plural: barát + -aim"},
          {hu:"a könyveim",en:"my books",note:"plural: könyv + -eim (high)"},
        ]},
      { type:"exercise", title:"Exercise 10 — Possessives",
        instructions:"Choose the correct form.",
        ex_type:"mcq",
        questions:[
          {q:"'my house' (ház):",opts:["házam","háza","házad","házunk"],correct:0,explain:"1st PS: ház + -am = házam"},
          {q:"'his/her car' (autó):",opts:["autóm","autód","autója","autónk"],correct:2,explain:"3rd PS: autó + -ja = autója (same for his AND hers!)"},
          {q:"'I don't have a dog':",opts:["Nem kutyám van.","Nincs kutyám.","Van nincs kutyám."],correct:1,explain:"Nincs + noun with possessive ending = don't have"},
        ]},
      { type:"summary",
        summary:"This chapter covered the full Hungarian possession system: endings on the possessed noun and possessive pronouns.\n\n**What we covered:**\n• Six possessive endings for singular possession (házam/házad/háza/házunk/házatok/házuk)\n• Endings for nouns ending in vowels (almám, almád, almája...)\n• The 'have' structure: nekem van + possessive\n• Nincs for negation\n• Plural possession with -i- (házaim = my houses)\n• Possessive pronouns (enyém, tiéd, övé...)",
        takeaways:["**3rd person is always háza (not *házzá)** — the ending -a/-e/-ja/-je marks his/her/its. The same form for he and she.","**Plural possession adds -i-** — házaim (my houses), barátaim (my friends). The -i- signals 'multiple possessed items'.","**Nincs + possessive = don't have** — Nincs autóm is the natural way. Avoid constructing it as 'not have'.","**Learn possessive endings by vowel class:** deep words → -am/-ad/-a/-unk/-atok/-uk; high words → -em/-ed/-e/-ünk/-etek/-ük.","**Kié? (Whose?) is answered with possessive pronouns** — Az enyém (mine), a tiéd (yours), az övé (his/hers)."] }
    ]},
{ id:"a2-postpositions", title:"Postpositions — Hungarian Prepositions", icon:"🗺️", sections:[
      { type:"concept", title:"Postpositions: They Come AFTER the Noun",
        body:`In English, prepositions come BEFORE their noun (in the box, under the table).
In Hungarian, postpositions come AFTER the noun (az asztal alatt = the table under = under the table).

**Most important postpositions (névutók):**
| Postposition | Meaning | Example |
|-------------|---------|---------|
| alatt | under | az asztal alatt (under the table) |
| felett / fölött | above, over | a felhők felett (above the clouds) |
| előtt | in front of, before | a ház előtt (in front of the house) |
| mögött | behind | a fa mögött (behind the tree) |
| mellett | next to, beside | az ajtó mellett (next to the door) |
| között | between, among | a két ház között (between the two houses) |
| után | after | az ebéd után (after lunch) |
| előtt | before (time) | a vacsora előtt (before dinner) |
| miatt | because of | az eső miatt (because of the rain) |
| helyett | instead of | tea helyett (instead of tea) |
| ellen | against | a betegség ellen (against the illness) |
| nélkül | without | víz nélkül (without water) |
| szerint | according to | szerintem (in my opinion) |
| óta | since, for (time) | egy hete óta (for a week) |
| felé | toward | Budapest felé (toward Budapest) |
| körül | around, approximately | öt óra körül (around five o'clock) |

**MOTION variants — 3-directional postpositions:**
Many postpositions have three forms following the static/toward/away logic:
• alá (to under) · alatt (at/under) · alól (from under)
• elé (to in front of) · előtt (in front of) · elől (from in front of)
• mögé (to behind) · mögött (behind) · mögül (from behind)
• mellé (to next to) · mellett (next to) · mellől (from next to)

**Personal postpositions:**
Some take personal endings just like possessives:
• szerintem/szerinted/szerinte = in my/your/his opinion
• mögöttem/mögötted/mögötte = behind me/you/him` },
      { type:"example", title:"20 Postposition Examples",
        examples:[
          {hu:"Az asztal alatt van.",en:"It is under the table.",note:"alatt = under (static)"},
          {hu:"Tedd az asztal alá!",en:"Put it under the table!",note:"alá = to under (motion toward)"},
          {hu:"Vedd ki az asztal alól!",en:"Take it out from under the table!",note:"alól = from under"},
          {hu:"A bank a posta mellett van.",en:"The bank is next to the post office.",note:"mellett = next to"},
          {hu:"A tükör az ajtó mögött van.",en:"The mirror is behind the door.",note:"mögött = behind"},
          {hu:"Az ebéd előtt megmosakodtam.",en:"I washed up before lunch.",note:"előtt = before"},
          {hu:"Az ebéd után kávézunk.",en:"We have coffee after lunch.",note:"után = after"},
          {hu:"Az eső miatt otthon maradtunk.",en:"We stayed home because of the rain.",note:"miatt = because of"},
          {hu:"Tea helyett vizet iszom.",en:"I drink water instead of tea.",note:"helyett = instead of"},
          {hu:"Pénz nélkül nem megyek.",en:"I'm not going without money.",note:"nélkül = without"},
          {hu:"Szerintem igaza van.",en:"In my opinion he/she is right.",note:"szerintem = in my opinion"},
          {hu:"Budapest felé tartunk.",en:"We're heading toward Budapest.",note:"felé = toward"},
          {hu:"Öt óra körül megyek.",en:"I'm going around five o'clock.",note:"körül = around/approximately"},
          {hu:"Két éve itt lakom.",en:"I have lived here for two years.",note:"óta after duration"},
          {hu:"A gyerekek között ül.",en:"She sits among the children.",note:"között = between/among"},
          {hu:"A ház előtt parkolok.",en:"I park in front of the house.",note:"előtt = in front of"},
          {hu:"Mögöttem áll.",en:"He/she is standing behind me.",note:"personal postposition: mögöttem"},
          {hu:"Mellettem ül.",en:"He/she sits next to me.",note:"personal postposition: mellettem"},
          {hu:"A betegség ellen küzd.",en:"He/she fights against the illness.",note:"ellen = against"},
          {hu:"A hegyek felett repül.",en:"It flies above the mountains.",note:"felett = above/over"},
        ]},
      { type:"exercise", title:"Exercise — Postpositions",
        instructions:"Choose the correct postposition.",
        ex_type:"mcq",
        questions:[
          {q:"'The cat is UNDER the chair':",opts:["a szék előtt","a szék alatt","a szék mögött","a szék felett"],correct:1,explain:"alatt = under (static position)"},
          {q:"'I stayed home BECAUSE OF the rain':",opts:["az eső nélkül","az eső felett","az eső miatt","az eső előtt"],correct:2,explain:"miatt = because of. Takes -nak/-nek on the noun → az eső miatt."},
          {q:"'In my opinion' (personal postposition):",opts:["szerint","szerintem","szerinted","szerinte"],correct:1,explain:"szerintem = in my opinion (1PS personal ending on szerint)"},
          {q:"Motion 'put it BEHIND the door' uses:",opts:["az ajtó mögött","az ajtó mögül","az ajtó mögé","az ajtó mögötte"],correct:2,explain:"mögé = to behind (motion toward). mögött = behind (static). mögül = from behind (motion away)."},
        ]},
      { type:"summary",
        summary:`This chapter covered Hungarian postpositions — the equivalent of English prepositions, but placed AFTER the noun.

**What we covered:**
• 16 core postpositions with meanings and examples
• The 3-directional system: static/toward/away (alatt/alá/alól)
• Personal postpositions with personal endings (szerintem, mögöttem)
• Common uses: spatial, temporal, causal, manner`,
        takeaways:[
          "**Postpositions come AFTER the noun** — unlike English prepositions. Az asztal alatt (the table under) = under the table. The word order is the mirror of English.",
          "**Three-form spatial postpositions** follow the same static/toward/away logic as the 9 location suffixes. alatt (at/under) → alá (to under) → alól (from under).",
          "**Szerint takes personal endings** — szerintem/szerinted/szerinte/szerintünk/szerintetek/szerintük. These are essential for expressing opinions naturally.",
          "**Miatt (because of) vs. mert (because)** — miatt is a postposition followed by a noun; mert is a conjunction followed by a clause. Az eső miatt (because of the rain) vs. Mert esik az eső (because it is raining).",
        ]},
    ]},
    { id:"a2-interrogatives", title:"Question Words — Complete Guide", icon:"❓", sections:[
      { type:"concept", title:"All Hungarian Question Words",
        body:`**The complete question word (kérdőszó) system:**

| Question word | English | Usage note |
|--------------|---------|------------|
| Ki? | Who? | for people |
| Mi? | What? | for things |
| Kik? | Who? (plural) | for multiple people |
| Mik? | What? (plural) | for multiple things |
| Melyik? | Which (one)? | specific choice |
| Milyen? | What kind/like? | quality description |
| Mennyi? | How much/many? | uncountable/large quantity |
| Hány? | How many? | countable, smaller numbers |
| Mikor? | When? | time |
| Mióta? | Since when? / How long? | duration from past |
| Meddig? | Until when? / How long? | duration into future |
| Hol? | Where? (static) | location |
| Hova/Hová? | Where to? | destination |
| Honnan? | Where from? | origin/source |
| Hogyan/Hogy? | How? | manner |
| Miért? | Why? | reason |
| Mennyibe kerül? | How much does it cost? | price |
| Hány éves? | How old? | age |

**CRITICAL rule: Question word goes DIRECTLY before the verb:**
• Hol LAKSZ? (Where do you LIVE?) — hol before laksz ✓
• *Laksz hol? ← wrong word order

**Kié? (Whose?)** — special question for possession:
• Kié ez a táska? — Whose is this bag?
• Az enyém. — Mine.

**Mi + case = many questions:**
• Miben? (In what?) · Mire? (Onto what?) · Miért? (Why? / For what?)
• Mikor? (When?) · Miről? (About what?) · Mivel? (With what?)` },
      { type:"example", title:"20 Question Word Examples",
        examples:[
          {hu:"Ki ez a férfi?",en:"Who is this man?",note:"Ki? = Who? (person)"},
          {hu:"Mi ez?",en:"What is this?",note:"Mi? = What? (thing)"},

          {hu:"Milyen az időjárás?",en:"What is the weather like?",note:"Milyen? = What kind/like?"},
          {hu:"Hány éves vagy?",en:"How old are you?",note:"Hány éves? = How old?"},
          {hu:"Mennyi az óra?",en:"What time is it? (What is the hour?)",note:"Mennyi? = How much?"},
          {hu:"Mikor jön haza?",en:"When is he/she coming home?",note:"Mikor? = When?"},
          {hu:"Hol lakik?",en:"Where does he/she live?",note:"Hol? = Where? (static)"},
          {hu:"Hova mész?",en:"Where are you going?",note:"Hova? = Where to? (motion)"},
          {hu:"Honnan jössz?",en:"Where are you coming from?",note:"Honnan? = Where from?"},
          {hu:"Hogyan csinálod?",en:"How do you do it?",note:"Hogyan? = How?"},
          {hu:"Miért késtél?",en:"Why were you late?",note:"Miért? = Why?"},

          {hu:"Kivel mész?",en:"Who are you going with?",note:"Kivel? = With whom?"},
          {hu:"Miről beszéltek?",en:"What were you talking about?",note:"Miről? = About what?"},
          {hu:"Kié ez a kocsi?",en:"Whose is this car?",note:"Kié? = Whose?"},
          {hu:"Hány személyre foglalod?",en:"For how many people are you booking?",note:"Hány? = How many?"},
          {hu:"Mivel utazol?",en:"How are you travelling? (By what means?)",note:"Mivel? = With what?"},

      { type:"exercise", title:"Exercise — Question Words",
        instructions:"Choose the correct question word.",
        ex_type:"mcq",

          {q:"You want to ask 'Where are you going?' (motion):",opts:["Hol mész?","Hova mész?","Honnan mész?","Mikor mész?"],correct:1,explain:"Hova? = Where to? (motion toward a destination). Hol? = Where? (static location)."},
          {q:"'What is the weather like?' — correct question word:",opts:["Mi az időjárás?","Milyen az időjárás?","Melyik az időjárás?","Mennyi az időjárás?"],correct:1,explain:"Milyen? = What kind/what is X like? Used for quality and description."},
          {q:"'How long have you lived here?' (from the past until now):",opts:["Meddig lakol itt?","Mikor laksz itt?","Mióta laksz itt?","Hogyan laksz itt?"],correct:2,explain:"Mióta? = Since when? / How long (from a past point until now). Meddig? = Until when? (future duration)."},

      { type:"summary",
        summary:`This chapter covered the complete Hungarian question word system — essential for real conversation.

**What we covered:**

        takeaways:[
          "**Hol/Hova/Honnan mirrors the location suffix triplets** — Hol? (static, -ban/on/nál), Hova? (toward, -ba/ra/hoz), Honnan? (away, -ból/ról/tól). Learn them together.",

  { level:"B1", color:"#f59e0b", title:"Intermediate", chapters:[
    
    { id:"a2-articles", title:"Articles & How to Use Them", icon:"📰", sections:[
      { type:"concept", title:"Definite & Indefinite Articles — When to Use and When to Omit",
        body:`**Definite article: a / az**
• a before consonants: a ház (the house)
• az before vowels: az asztal (the table)

**When to USE the definite article:**
• Specific known things: A könyv az asztalon van. (The book is on the table.)
• Generalization: Az emberek közönyösek. (People are unconcerned.)
• Abstract concepts: A pénz nem minden. (Money is not everything.)
• Species/types: Szeretem az olasz tésztákat. (I like Italian pasta.)
• Geographical names with adjectives: a romantikus Párizs
• With possessive endings: Az ő háza nagy. (His house is big.)

**Indefinite article: egy** (unstressed form of 'one')
• Undetermined, first-mentioned: Van egy toll az ágyon. (There is a pen on the bed.)

**When to OMIT articles entirely:**
• Professions as predicate: A férjem orvos. (My husband IS a doctor.) — no 'egy'!
• Nouns as part of action: Reggel kávét főz. (He makes coffee in the morning.) — no article
• 'Some' quantity: Bort kérek. (I'd like some wine.)
• Made of: Az asztal fából van. (The table is made of wood.)
• Proper names, countries: Dávid egyetemre jár. Olaszország szép.
• There is/are: Van iskola a sarkon. (There is a school on the corner.)` },
      { type:"example", title:"20 Article Usage Examples",
        examples:[
          {hu:"a ház",en:"the house",note:"a before consonant"},
          {hu:"az asztal",en:"the table",note:"az before vowel"},

          {hu:"Olaszország szép.",en:"Italy is beautiful.",note:"country name → NO article"},

          {hu:"Almát veszek.",en:"I'm buying apples.",note:"unspecified quantity → NO article"},

      { type:"summary",
        summary:"This chapter covered when Hungarian uses, omits, or selects the definite vs. indefinite article.\n\n**What we covered:**\n• a/az (definite) vs. egy (indefinite) vs. no article\n• Definite for specific, known, generalized, and abstract nouns\n• Mandatory article with possessed nouns, geographic names in context\n• Article omitted for professions as predicate, unspecified quantities, materials, countries\n• Special rule: 'there is/are' constructions never use articles",

          "**Made of = no article on material** — Az asztal fából van. The material stands bare.",

        ]

    { id:"a2-numerals", title:"Numbers & Numerals", icon:"🔢", sections:[
      { type:"concept", title:"Cardinal, Ordinal, and Special Number Forms",
        body:`**Cardinal numbers (tőszámok):**
| 1–10 | 11–20 | Tens |
|------|-------|------|
| egy, kettő/két, három, négy, öt, hat, hét, nyolc, kilenc, tíz | tizenegy...húsz | harminc, negyven, ötven, hatvan, hetven, nyolcvan, kilencven, száz |

• kettő (standalone) vs. két (before noun): két alma (two apples) but Kettő van. (There are two.)
• Compound numbers: huszonegy (21), harminchárom (33), száz (100), ezer (1000), millió

**Numbers with nouns — singular always!**
• két alma (two apples — NOT almák!)
• öt gyerek (five children — NOT gyerekek!)
• After a number, the noun stays singular.

**Ordinal numbers (sorszámok):** add -dik/-adik/-edik/-ödik
• első (1st), második (2nd), harmadik (3rd), negyedik (4th), ötödik (5th)
• hatodik, hetedik, nyolcadik, kilencedik, tizedik
• Used for: dates, floors, bus lines, rankings

**Fractions:** fél (half), negyed (quarter), harmad (third)
• fél liter (half a liter), három negyed (three quarters)

**Multiplicative:** kétszer (twice), háromszor (three times), egyszer (once)

**Date format:** 2024. március 15. (year. month day.) — period after year!` },

        examples:[

          {hu:"március tizenötödike",en:"the 15th of March",note:"ordinal date form"},
          {hu:"fél óra",en:"half an hour",note:"fél = half"},
          {hu:"negyed tizenkettő",en:"quarter past twelve (lit: quarter twelve)",note:"negyed = quarter for time"},
          {hu:"háromszor",en:"three times",note:"multiplicative: három+szor"},
          {hu:"egyszer",en:"once",note:"multiplicative: egy+szer"},
