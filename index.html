              const ch = fullCurriculum.flatMap(l => l.chapters).find(c => c.id === r.chapId);
              if (ch) {
                const level = fullCurriculum.find(l => l.chapters.find(c => c.id === r.chapId));
                setSelLevel(level); setSelChap(ch); setSecIdx(r.secIdx); setView('learn');
                setShowSearch(false); setSearchQuery('');
              }
            }} style={{...mk.card(T,{display:'flex',gap:12,alignItems:'center',padding:'12px 14px',cursor:'pointer',marginBottom:6,textAlign:'left',width:'100%',outline:'none'})}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:3}}>
                  {lv && <Pill color={lv.color}>{r.level}</Pill>}
                  <span style={{fontSize:11,color:T.muted}}>{r.chapTitle}</span>
                </div>
                {(r.type==='example'||r.type==='vocab') && (
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontWeight:700,color:T.accent,fontFamily:'Georgia,serif',fontSize:15}}>{r.hu}</span>
                    <span style={{color:T.muted}}>→</span>
                    <span style={{color:T.textSub,fontSize:14}}>{r.en}</span>
                  </div>
                )}
                {r.type==='concept' && <span style={{fontSize:14,fontWeight:500,color:T.text}}>{r.title}</span>}
              </div>
              <Icons.chevR/>
            </button>
          );
        })}
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════
  //  HOME
  // ══════════════════════════════════════════════════════════════
  const Home = () => {
    const XP_LEVELS = [0,100,250,500,1000,2000,3500,5000,7500,10000];
    const lvIdx   = XP_LEVELS.findLastIndex(t => profile.xp >= t);
    const xpLevel = lvIdx + 1;
    const xpPrev  = XP_LEVELS[lvIdx] || 0;
    const xpNext  = XP_LEVELS[Math.min(xpLevel, XP_LEVELS.length-1)];
    const xpPct   = xpNext > xpPrev ? Math.min(100, Math.round(((profile.xp-xpPrev)/(xpNext-xpPrev))*100)) : 100;

    return (
      <div>
        {/* Hero stats */}
        <div style={{...mk.card(T,{padding:'18px 16px',marginBottom:10,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'})}}>
          <img src={COAT_OF_ARMS} alt="" style={{height:40,objectFit:'contain',flexShrink:0}} onError={e=>e.target.style.display='none'}/>
          <div style={{flex:1,minWidth:140}}>
            <h1 style={{fontSize:19,fontWeight:700,margin:'0 0 10px',color:T.text,fontFamily:"'DM Serif Display',Georgia,serif"}}>Magyar Diák</h1>
            <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
              {[
                {icon:<Icons.flame/>, v:`${profile.streak}d`,              l:'Streak', c:T.accent},
                {icon:<Icons.zap/>,   v:`Lv ${xpLevel}`,                   l:`${profile.xp} XP`, c:'#f59e0b'},
                {icon:<Icons.check/>, v:`${profile.done.length}/${totalCh}`,l:'Done',   c:T.success},
              ].map(({icon,v,l,c}) => (
                <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{color:c,display:'flex'}}>{icon}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:T.text,lineHeight:1}}>{v}</div>
                    <div style={{fontSize:10,color:T.muted,marginTop:1}}>{l}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* XP bar */}
        <div style={{...mk.card(T,{padding:'11px 16px',marginBottom:8})}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:11,color:T.muted}}>Level {xpLevel} → {xpLevel+1}</span>
            <span style={{fontSize:11,color:T.muted}}>{profile.xp} / {xpNext} XP</span>
          </div>
          <PBar pct={xpPct} color="#f59e0b" h={4}/>
        </div>

        {/* Progress bar */}
        <div style={{...mk.card(T,{padding:'11px 16px',marginBottom:14})}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:11,color:T.muted}}>Overall progress</span>
            <span style={{fontSize:11,color:T.muted}}>{profile.done.length}/{totalCh} · {donePct}%</span>
          </div>
          <PBar pct={donePct} color={T.accent} h={4}/>
        </div>

        {/* Primary CTA */}
        {dueSrsCards.length > 0 ? (
          <button onClick={() => { HAPTIC.medium(); startSrs(); goView('practice'); }}
            style={{width:'100%',padding:'16px 18px',borderRadius:12,border:'none',background:T.accent,color:T.accentText,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:12,marginBottom:14,boxShadow:T.shadowMd}}>
            <div style={{width:40,height:40,borderRadius:9,background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:20}}>🧠</div>
            <div style={{flex:1,textAlign:'left'}}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:1}}>{dueSrsCards.length} cards due for review</div>
              <div style={{fontSize:12,opacity:.85}}>Tap to start your daily SRS session</div>
            </div>
            <Icons.chevR/>
          </button>
        ) : (
          <div style={{...mk.card(T,{padding:'13px 16px',marginBottom:14,display:'flex',gap:10,alignItems:'center'})}}>
            <span style={{fontSize:18}}>✅</span>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:T.success}}>All caught up!</div>
              <div style={{fontSize:11,color:T.muted}}>No reviews due today.</div>
            </div>
          </div>
        )}

        {/* Level mini-grid */}
        <div style={{...mk.label(T,{marginBottom:8})}}>Progress by level</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
          {fullCurriculum.map(lv => {
            const done = lv.chapters.filter(c => profile.done.includes(c.id)).length;
            const pct  = Math.round((done/lv.chapters.length)*100);
            return (
              <button key={lv.level} onClick={() => { HAPTIC.medium(); setSelLevel(lv); goView('learn'); }}
                style={{...mk.card(T,{padding:'10px 8px',textAlign:'center',cursor:'pointer',outline:'none'})}}>
                <Pill color={lv.color}>{lv.level}</Pill>
                <div style={{marginTop:7,marginBottom:3}}><PBar pct={pct} color={lv.color} h={3}/></div>
                <div style={{fontSize:10,color:T.muted}}>{done}/{lv.chapters.length}</div>
              </button>
            );
          })}
        </div>
      </div>
    );
  };

  // ══════════════════════════════════════════════════════════════
  //  LEARN
  // ══════════════════════════════════════════════════════════════
  const Learn = () => {

    const ChapterEditor = ({ch, onSave, onClose}) => {
      const [title, setTitle]       = useState(ch.title);
      const [sections, setSections] = useState(ch.sections.filter(s => s.type !== 'summary'));
      return (
        <div style={{...mk.card(T,{padding:16,marginBottom:12})}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:600,color:T.text}}>Editing chapter</span>
            <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:T.muted}}><Icons.close/></button>
          </div>
          <input value={title} onChange={e => setTitle(e.target.value)} style={{...mk.inp(T),marginBottom:8}} placeholder="Chapter title"/>
          <div style={{fontSize:11,color:T.muted,marginBottom:8}}>{sections.length} sections</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {['concept','example','vocab','exercise'].map(type => (
              <button key={type} onClick={() => { HAPTIC.light(); setSections(p => [...p, {type,title:`New ${type}`,body:'',examples:[],words:[],questions:[],items:[]}]); }}
                style={{...mk.btn(T,'secondary',{padding:'5px 10px',fontSize:11})}}>+ {type}</button>
            ))}
          </div>
          <button onClick={() => { HAPTIC.success(); onSave({title,sections}); onClose(); }}
            style={{...mk.btn(T,{width:'100%',justifyContent:'center'})}}>
            <Icons.check/> Save
          </button>
        </div>
      );
    };

    // ── Chapter view ────────────────────────────────────────────
    if (selChap) {
      const ch     = editedChapters[selChap.id] ? {...selChap,...editedChapters[selChap.id]} : selChap;
      const secs   = ch.sections || [];
      const cur    = secs[secIdx];
      const isLast = secIdx === secs.length - 1;
      const isDone = profile.done.includes(selChap.id);

      return (
        <div>
          {/* Breadcrumb */}
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14,fontSize:12,flexWrap:'wrap'}}>
            <button onClick={() => { HAPTIC.light(); setSelLevel(null); setSelChap(null); setSecIdx(0); resetEx(); setEditMode(false); }}
              style={{background:'none',border:'none',color:T.muted,cursor:'pointer',fontFamily:'inherit',fontSize:12,padding:0,display:'flex',alignItems:'center',gap:3}}>
              <Icons.book/>Learn
            </button>
            <span style={{color:T.border}}>›</span>
            <button onClick={() => { HAPTIC.light(); setSelChap(null); setSecIdx(0); resetEx(); setEditMode(false); }}
              style={{background:'none',border:'none',color:T.muted,cursor:'pointer',fontFamily:'inherit',fontSize:12,padding:0}}>
              {selLevel?.level}
            </button>
            <span style={{color:T.border}}>›</span>
            <span style={{fontWeight:600,color:T.textSub,fontSize:12}}>{ch.title}</span>
          </div>

          {editMode && <ChapterEditor ch={ch} onSave={changes => saveChapterEdit(selChap.id,changes)} onClose={() => setEditMode(false)}/>}

          {/* Chapter header + progress dots */}
          <div style={{...mk.card(T,{marginBottom:12,padding:'14px 16px'})}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{flex:1,minWidth:0}}>
                <h2 style={{fontSize:16,fontWeight:700,margin:0,color:T.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ch.title}</h2>
                <div style={{fontSize:11,color:T.muted,marginTop:2}}>
                  Section {secIdx+1} of {secs.length} · {SEC_LABELS[secs[secIdx]?.type] || ''}
                </div>
              </div>
              <div style={{display:'flex',gap:5,flexShrink:0,marginLeft:8}}>
                <button onClick={() => { HAPTIC.tick(); setEditMode(e => !e); }} aria-label="Edit chapter"
                  style={{width:30,height:30,borderRadius:7,border:`1px solid ${editMode?T.accent:T.border}`,background:editMode?T.accentSoft:'transparent',color:editMode?T.accent:T.muted,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                  <Icons.edit/>
                </button>
                {isDone && (
                  <span style={{display:'flex',alignItems:'center',gap:3,background:T.successBg,color:T.successText,padding:'4px 9px',borderRadius:20,fontSize:11,fontWeight:600}}>
                    <Icons.check/> Done
                  </span>
                )}
              </div>
            </div>
            {/* Progress dot rail */}
            <div style={{display:'flex',gap:3,alignItems:'center'}}>
              {secs.map((s, i) => (
                <button key={i} onClick={() => { HAPTIC.tick(); setSecIdx(i); resetEx(); }}
                  aria-label={SEC_LABELS[s.type] || `Section ${i+1}`}
                  title={SEC_LABELS[s.type] || `Section ${i+1}`}
                  style={{height:6,borderRadius:3,border:'none',background:i===secIdx?T.accent:i<secIdx?T.accent+'55':T.border,cursor:'pointer',padding:0,transition:'all .2s',flexShrink:0,width:i===secIdx?28:8}}>
                </button>
              ))}
            </div>
          </div>

          {/* Section content */}
          <div style={{...mk.card(T,{marginBottom:12,padding:20})}}>
            {cur && (() => {
              switch (cur.type) {
                case 'concept':  return <ConceptSection sec={cur} T={T}/>;
                case 'example':  return <ExampleSection sec={cur} T={T}/>;
                case 'vocab':    return <VocabSection sec={cur} T={T} IMGS={IMGS}/>;
                case 'summary':  return <SummarySection sec={cur} T={T}/>;
                case 'exercise':
                  if (cur.ex_type==='mcq')       return <ExerciseMCQ sec={cur} ei={secIdx} T={T} exAns={exAns} exShow={exShow} doMCQ={doMCQ}/>;
                  if (cur.ex_type==='truefalse')  return <ExerciseTF  sec={cur} ei={secIdx} T={T} exAns={exAns} exShow={exShow} doTF={doTF}/>;
                  if (cur.ex_type==='match')      return <ExerciseMatch sec={cur} T={T} matchSt={matchSt} setMatchSt={setMatchSt}/>;
                  return null;
                default: return <div style={{color:T.muted,fontSize:14}}>Unknown section: {cur.type}</div>;
              }
            })()}
          </div>

          {/* Navigation: small Prev + full-width Next/Complete */}
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button onClick={() => { HAPTIC.light(); if(secIdx>0){ setSecIdx(s=>s-1); resetEx(); } }}
              disabled={secIdx===0} aria-label="Previous section"
              style={{width:40,height:48,borderRadius:10,border:`1.5px solid ${T.border}`,background:'transparent',cursor:secIdx===0?'not-allowed':'pointer',color:T.muted,opacity:secIdx===0?.3:1,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Icons.chevL/>
            </button>
            {isLast ? (
              <button onClick={() => markDone(selChap.id)}
                style={{flex:1,padding:'14px 20px',borderRadius:10,border:'none',background:isDone?T.successBg:T.accent,color:isDone?T.successText:T.accentText,fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:isDone?'none':T.shadowMd}}>
                <Icons.check/>{isDone?'Chapter Complete ✓':'Complete · +30 XP'}
              </button>
            ) : (
              <button onClick={() => { HAPTIC.light(); setSecIdx(s=>s+1); resetEx(); }}
                style={{flex:1,padding:'14px 20px',borderRadius:10,border:'none',background:T.accent,color:T.accentText,fontWeight:700,fontSize:15,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:T.shadowMd}}>
                Next <Icons.chevR/>
              </button>
            )}
          </div>
        </div>
      );
    }

    // ── Level view ──────────────────────────────────────────────
    if (selLevel) {
      return (
        <div>
          <button onClick={() => { HAPTIC.light(); setSelLevel(null); }}
            style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:13,padding:'0 0 12px',fontFamily:'inherit'}}>
            <Icons.arrowL/> All levels
          </button>
          <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:14}}>
            <Pill color={selLevel.color}>{selLevel.level}</Pill>
            <h2 style={{margin:0,fontSize:18,fontWeight:700,color:T.text}}>{selLevel.title}</h2>
          </div>
          <div style={{display:'grid',gap:6,marginBottom:14}}>
            {(fullCurriculum.find(l => l.level===selLevel.level)?.chapters || []).map(ch => {
              const done = profile.done.includes(ch.id);
              return (
                <button key={ch.id} onClick={() => { HAPTIC.medium(); setSelChap(ch); setSecIdx(0); resetEx(); }}
                  style={{...mk.card(T,{display:'flex',alignItems:'center',gap:14,padding:'13px 15px',cursor:'pointer',textAlign:'left',borderLeft:`3px solid ${done?selLevel.color:T.border}`,outline:'none'})}}
                  onMouseEnter={e => { e.currentTarget.style.borderLeftColor=selLevel.color; e.currentTarget.style.background=T.surfaceAlt; }}
                  onMouseLeave={e => { e.currentTarget.style.borderLeftColor=done?selLevel.color:T.border; e.currentTarget.style.background=T.surface; }}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                      <span style={{fontSize:14,fontWeight:600,color:T.text}}>{ch.title}</span>
                      {ch.isCustom && <span style={{fontSize:10,background:T.accentSoft,color:T.accent,padding:'1px 6px',borderRadius:20}}>custom</span>}
                    </div>
                    <div style={{fontSize:12,color:T.muted}}>{ch.sections?.length||0} sections</div>
                  </div>
                  {done ? <span style={{color:T.success,flexShrink:0}}><Icons.check/></span> : <span style={{color:T.border,flexShrink:0}}><Icons.chevR/></span>}
                  {ch.isCustom && (
                    <button onClick={e => { e.stopPropagation(); HAPTIC.warning(); deleteCustom(ch.id); }}
                      style={{width:28,height:28,borderRadius:6,border:`1px solid ${T.accent}33`,background:T.accentSoft,cursor:'pointer',color:T.accent,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <Icons.trash/>
                    </button>
                  )}
                </button>
              );
            })}
          </div>
          <button onClick={() => { HAPTIC.medium(); startQuiz(selLevel.level); setView('practice'); }}
            style={mk.btn(T)}>
            <Icons.target/> Take {selLevel.level} Quiz
          </button>
        </div>
      );
    }

    // ── Level list ──────────────────────────────────────────────
    return (
      <div>
        <div style={{...mk.label(T,{marginBottom:10})}}>All Levels — A1 to C2</div>
        <div style={{display:'grid',gap:6}}>
          {fullCurriculum.map(lv => {
            const d   = lv.chapters.filter(c => profile.done.includes(c.id)).length;
            const pct = Math.round((d/lv.chapters.length)*100);
            return (
              <button key={lv.level} onClick={() => { HAPTIC.medium(); setSelLevel(lv); }}
                style={{...mk.card(T,{display:'flex',alignItems:'center',gap:14,padding:'13px 15px',cursor:'pointer',textAlign:'left',outline:'none'})}}
                onMouseEnter={e => e.currentTarget.style.background=T.surfaceAlt}
                onMouseLeave={e => e.currentTarget.style.background=T.surface}>
                <Pill color={lv.color}>{lv.level}</Pill>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:3}}>{lv.title}</div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:12,color:T.muted}}>{lv.chapters.length} chapters · {d} done</span>
                    <div style={{flex:1,maxWidth:80}}><PBar pct={pct} color={lv.color} h={3}/></div>
                  </div>
                </div>
                <Icons.chevR/>
              </button>
            );
          })}
        </div>
      </div>
    );
  };

  // ══════════════════════════════════════════════════════════════
  //  PRACTICE
  // ══════════════════════════════════════════════════════════════
  const Practice = () => {
    const TABS = [
      {id:'srs',       label:'SRS Review', icon:<Icons.brain/>},
      {id:'quiz',      label:'Quiz',       icon:<Icons.target/>},
      {id:'verbs',     label:'Verb Drill', icon:<Icons.zap/>},
      {id:'sentences', label:'Sentences',  icon:<Icons.typeText/>},
    ];

    // ── SRS view ────────────────────────────────────────────────
    const SrsView = () => {
      if (srsSession?.done) return (
        <div style={{...mk.card(T,{padding:'36px 24px',textAlign:'center'})}}>
          <div style={{fontSize:48,marginBottom:12}}>🎉</div>
          <div style={{fontSize:22,fontWeight:700,color:T.text,marginBottom:6}}>Review Complete!</div>
          <div style={{fontSize:14,color:T.muted,marginBottom:24}}>{srsSession.correct}/{srsSession.cards.length} correct</div>
          <div style={{display:'flex',gap:8,justifyContent:'center'}}>
            <button onClick={() => { HAPTIC.medium(); startSrs(); }} style={mk.btn(T)}><Icons.refresh/> Review Again</button>
            <button onClick={() => setSrsSession(null)} style={mk.btn(T,'secondary')}>Done</button>
          </div>
        </div>
      );

      if (srsSession) {
        const card = srsSession.cards[srsSession.cur];
        const lv   = fullCurriculum.find(l => l.level===card.level);
        return (
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {lv && <Pill color={lv.color}>{card.level}</Pill>}
                <span style={{fontSize:13,color:T.muted}}>Card {srsSession.cur+1}/{srsSession.cards.length}</span>
              </div>
              <button onClick={() => setSrsSession(null)} style={{background:'none',border:'none',cursor:'pointer',color:T.muted,display:'flex',padding:4}}><Icons.close/></button>
            </div>
            <div style={{height:4,borderRadius:2,background:T.border,overflow:'hidden',marginBottom:16}}>
              <div style={{height:'100%',width:`${Math.round((srsSession.cur/srsSession.cards.length)*100)}%`,background:T.accent,transition:'width .4s'}}/>
            </div>
            <div style={{...mk.card(T,{padding:28,textAlign:'center',marginBottom:12})}}>
              <div style={{display:'flex',justifyContent:'center',marginBottom:8}}><SpeakBtn text={card.hu} T={T}/></div>
              <div style={{fontSize:32,fontWeight:700,color:T.accent,fontFamily:'Georgia,serif',marginBottom:4}}>{card.hu}</div>
              {srsSession.shown ? (
                <>
                  <div style={{fontSize:18,color:T.textSub,marginBottom:20}}>{card.en}</div>
                  <div style={{fontSize:12,color:T.muted,marginBottom:10,fontWeight:500}}>How well did you know this?</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:8}}>
                    {[
                      {q:1,label:'Again',  interval:'Tomorrow',  color:'#CC2936'},
                      {q:3,label:'Hard',   interval:'2–3 days',  color:'#F59E0B'},
                      {q:4,label:'Good',   interval:'4–7 days',  color:'#2E5E3C'},
                      {q:5,label:'Easy',   interval:'1–2 weeks', color:'#1A3A6B'},
                    ].map(({q,label,interval,color}) => (
                      <button key={q} onClick={() => rateSrs(q)}
                        style={{padding:'12px 8px',borderRadius:10,border:`1.5px solid ${color}33`,background:color+'11',color,cursor:'pointer',fontFamily:'inherit',textAlign:'center'}}>
                        <div style={{fontSize:14,fontWeight:700}}>{label}</div>
                        <div style={{fontSize:11,opacity:.75,marginTop:2}}>{interval}</div>
                      </button>
                    ))}
                  </div>
                  <button onClick={() => rateSrs(0)}
                    style={{width:'100%',padding:'8px',borderRadius:8,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>
                    Skip (don't count)
                  </button>
                </>
              ) : (
                <button onClick={() => { HAPTIC.medium(); showSrsAnswer(); }}
                  style={{...mk.btn(T,{margin:'0 auto',padding:'12px 28px'})}}>
                  Show Answer
                </button>
              )}
            </div>
          </div>
        );
      }

      const totalCards = Object.keys(mergedSrsCards).length;
      return (
        <div>
          <div style={{...mk.card(T,{padding:'22px 18px',marginBottom:12,textAlign:'center'})}}>
            <div style={{fontSize:40,marginBottom:8}}>🧠</div>
            <div style={{fontSize:17,fontWeight:600,color:T.text,marginBottom:6}}>Spaced Repetition Review</div>
            <div style={{fontSize:13,color:T.muted,marginBottom:18}}>Reviews are scheduled when memory starts to fade — the optimal time to reinforce.</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:18}}>
              {[
                {v:dueSrsCards.length, l:'Due Now',  c:T.accent},
                {v:totalCards,         l:'Total',    c:T.textSub},
                {v:Object.values(mergedSrsCards).filter(c=>c.repetitions>0).length, l:'Learned', c:T.success},
              ].map(({v,l,c}) => (
                <div key={l} style={{background:T.surfaceAlt,borderRadius:8,padding:'12px 6px',textAlign:'center'}}>
                  <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            <button onClick={() => dueSrsCards.length>0 ? startSrs() : notify('No cards due! Come back tomorrow.')}
              style={{...mk.btn(T,{margin:'0 auto',padding:'12px 28px',opacity:dueSrsCards.length===0?.5:1})}}>
              <Icons.brain/> {dueSrsCards.length>0 ? `Start Review (${dueSrsCards.length})` : 'All caught up!'}
            </button>
          </div>
        </div>
      );
    };

    // ── Verb drill ──────────────────────────────────────────────
    const VerbDrillView = () => {
      const SESSION_LEN = 10;
      const VERBS = [
        {inf:'megy', en:'to go',   forms:{indef:['megyek','mész','megy','megyünk','mentek','mennek'],def:['megyek','mész','megy','megyünk','mentek','megy']}},
        {inf:'lát',  en:'to see',  forms:{indef:['látok','látsz','lát','látunk','láttok','látnak'],def:['látom','látod','látja','látjuk','látjátok','látják']}},
        {inf:'olvas',en:'to read', forms:{indef:['olvasok','olvasol','olvas','olvasunk','olvastok','olvasnak'],def:['olvasom','olvasod','olvassa','olvassuk','olvassátok','olvassák']}},
        {inf:'eszik',en:'to eat',  forms:{indef:['eszek','eszel','eszik','eszünk','esztek','esznek'],def:['eszem','eszed','eszi','esszük','eszitek','eszik']}},
        {inf:'iszik',en:'to drink',forms:{indef:['iszok','iszol','iszik','iszunk','isztok','isznak'],def:['iszom','iszod','issza','isszuk','isszátok','isszák']}},
        {inf:'van',  en:'to be',   forms:{indef:['vagyok','vagy','van','vagyunk','vagytok','vannak'],def:['vagyok','vagy','van','vagyunk','vagytok','vannak']}},
        {inf:'ad',   en:'to give', forms:{indef:['adok','adsz','ad','adunk','adtok','adnak'],def:['adom','adod','adja','adjuk','adjátok','adják']}},
        {inf:'vesz', en:'to take', forms:{indef:['veszek','veszel','vesz','veszünk','vesztek','vesznek'],def:['veszem','veszed','veszi','vesszük','veszitek','veszik']}},
      ];
      const PERSONS = ['1st PS','2nd PS','3rd PS','1st PP','2nd PP','3rd PP'];

      const randCard = () => {
        const verb = VERBS[Math.floor(Math.random()*VERBS.length)];
        const conj = Math.random()>0.5?'def':'indef';
        const person = Math.floor(Math.random()*6);
        return {verb,conj,person};
      };

      const [drill, setDrill] = useState(() => ({...randCard(),input:'',revealed:false,score:0,total:0,done:false}));
      const correct   = drill.verb.forms[drill.conj][drill.person];
      const isCorrect = drill.input.trim().toLowerCase() === correct.toLowerCase();

      const check = () => {
        if (drill.revealed) return;
        HAPTIC.medium();
        isCorrect ? HAPTIC.success() : HAPTIC.error();
        setDrill(s => ({...s, revealed:true}));
      };
      const next = () => {
        HAPTIC.light();
        const newTotal = drill.total + 1;
        const newScore = drill.score + (isCorrect ? 1 : 0);
        if (newTotal >= SESSION_LEN) {
          setDrill(s => ({...s, done:true, total:newTotal, score:newScore}));
        } else {
          setDrill(s => ({...randCard(), input:'', revealed:false, score:newScore, total:newTotal, done:false}));
        }
      };

      if (drill.done) return (
        <div style={{...mk.card(T,{padding:'36px 24px',textAlign:'center'})}}>
          <div style={{fontSize:48,marginBottom:10}}>{drill.score>=8?'🎉':drill.score>=5?'👍':'📚'}</div>
          <div style={{fontSize:22,fontWeight:700,color:T.text,marginBottom:4}}>{drill.score}/{SESSION_LEN}</div>
          <div style={{fontSize:14,color:T.muted,marginBottom:20}}>
            {drill.score>=8?'Excellent!':drill.score>=5?'Good effort!':'Keep practicing!'}
          </div>
          <div style={{marginBottom:24}}><PBar pct={Math.round((drill.score/SESSION_LEN)*100)} color={drill.score>=8?T.success:T.accent} h={8}/></div>
          <button onClick={() => { HAPTIC.medium(); setDrill({...randCard(),input:'',revealed:false,score:0,total:0,done:false}); }}
            style={{...mk.btn(T,{margin:'0 auto'})}}>
            <Icons.refresh/> New Session
          </button>
        </div>
      );

      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:12,color:T.muted}}>Question {drill.total+1} of {SESSION_LEN}</span>
            <span style={{fontSize:12,color:T.muted}}>{drill.score} correct</span>
          </div>
          <div style={{height:4,borderRadius:2,background:T.border,overflow:'hidden',marginBottom:14}}>
            <div style={{height:'100%',width:`${(drill.total/SESSION_LEN)*100}%`,background:T.accent,transition:'width .3s'}}/>
          </div>
          <div style={{...mk.card(T,{padding:20,marginBottom:10})}}>
            <div style={{textAlign:'center',marginBottom:14}}>
              <div style={{fontSize:12,color:T.muted,marginBottom:4}}>
                {drill.conj==='def'?'Definite':'Indefinite'} conjugation · {PERSONS[drill.person]}
              </div>
              <div style={{fontSize:26,fontWeight:700,color:T.accent,fontFamily:'Georgia,serif',marginBottom:2}}>{drill.verb.inf}</div>
              <div style={{fontSize:14,color:T.muted}}>{drill.verb.en}</div>
            </div>
            <input value={drill.input} onChange={e => setDrill(s=>({...s,input:e.target.value}))}
              onKeyDown={e => e.key==='Enter' && !drill.revealed && check()}
              placeholder="Type the conjugated form…"
              style={{...mk.inp(T),textAlign:'center',fontSize:16,fontFamily:'Georgia,serif',marginBottom:8}}/>
            {drill.revealed && (
              <div style={{padding:'10px 14px',borderRadius:8,marginBottom:8,background:isCorrect?T.successBg:T.accentSoft,color:isCorrect?T.successText:T.accent,fontSize:14,textAlign:'center',fontFamily:'Georgia,serif',fontWeight:600}}>
                {isCorrect?'✓ Correct!':'✗ '+correct}
              </div>
            )}
            <div style={{display:'flex',gap:7}}>
              {!drill.revealed ? (
                <button onClick={check} style={{...mk.btn(T,{flex:1,justifyContent:'center'})}}>Check</button>
              ) : (
                <button onClick={next} style={{...mk.btn(T,{flex:1,justifyContent:'center'})}}>Next <Icons.chevR/></button>
              )}
              {!drill.revealed && (
                <button onClick={() => { HAPTIC.tick(); setDrill(s=>({...s,revealed:true})); }}
                  style={mk.btn(T,'secondary')}>Reveal</button>
              )}
            </div>
          </div>
          <div style={{...mk.card(T,{padding:'12px 16px',display:'flex',gap:20,justifyContent:'center'})}}>
            {[{v:drill.score,l:'Correct'},{v:drill.total-drill.score,l:'Wrong'},{v:SESSION_LEN-drill.total,l:'Left'}].map(({v,l})=>(
              <div key={l} style={{textAlign:'center'}}>
                <div style={{fontSize:18,fontWeight:700,color:T.text}}>{v}</div>
                <div style={{fontSize:11,color:T.muted}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ── Sentence builder ────────────────────────────────────────
    const SentenceBuilderView = () => {
      const CHALLENGES = [
        {hu:'Látom a házat.',en:'I see the house.',hint:'lát + definite conjugation'},
        {hu:'Elmegyek a boltba.',en:'I go to the shop.',hint:'el- prefix + -ba'},
        {hu:'Nem mentem el.',en:"I didn't go away.",hint:'negation separates prefix'},
        {hu:'Kérnék egy kávét.',en:'I would like a coffee.',hint:'conditional mood'},
        {hu:'Mennem kell.',en:'I have to go.',hint:'personal infinitive + kell'},
        {hu:'A könyv az asztalon van.',en:'The book is on the table.',hint:'-on = on surface'},
        {hu:'Ha tudnék, segítenék.',en:'If I could, I would help.',hint:'conditional clause'},
        {hu:'Sírva mondta el.',en:'He said it while crying.',hint:'adverb participle -va'},
        {hu:'Soha nem megyek oda.',en:'I never go there.',hint:'double negation required'},
        {hu:'Mit csináltál tegnap?',en:'What did you do yesterday?',hint:'past tense interrogative'},
      ];
      const [idx, setIdx]       = useState(0);
      const [input, setInput]   = useState('');
      const [checked, setChecked] = useState(false);
      const ch        = CHALLENGES[idx % CHALLENGES.length];
      const isCorrect = input.trim() === ch.hu;

      const check = () => { HAPTIC.medium(); setChecked(true); isCorrect ? HAPTIC.success() : HAPTIC.error(); };
      const next  = () => { HAPTIC.light(); setIdx(i=>i+1); setInput(''); setChecked(false); };

      return (
        <div>
          <div style={{...mk.card(T,{padding:20,marginBottom:10})}}>
            <div style={{textAlign:'center',marginBottom:14}}>
              <div style={{fontSize:12,color:T.muted,marginBottom:6}}>Translate to Hungarian</div>
              <div style={{fontSize:22,fontWeight:600,color:T.text,marginBottom:4}}>{ch.en}</div>
              <div style={{fontSize:12,color:T.muted}}>Hint: {ch.hint}</div>
            </div>
            <input value={input} onChange={e=>{setInput(e.target.value);setChecked(false);}}
              onKeyDown={e=>e.key==='Enter'&&!checked&&check()}
              placeholder="Type the Hungarian sentence…"
              style={{...mk.inp(T),textAlign:'center',fontSize:15,fontFamily:'Georgia,serif',marginBottom:8}}/>
            {checked && (
              <div style={{padding:'12px 14px',borderRadius:8,marginBottom:8,background:isCorrect?T.successBg:T.accentSoft,color:isCorrect?T.successText:T.accent,fontSize:14,textAlign:'center'}}>
                {isCorrect?'✓ Perfect!':'✗ Correct form: '}{!isCorrect&&<span style={{fontFamily:'Georgia,serif',fontWeight:700}}>{ch.hu}</span>}
              </div>
            )}
            <div style={{display:'flex',gap:7}}>
              {!checked ? (
                <button onClick={check} style={{...mk.btn(T,{flex:1,justifyContent:'center'})}}>Check</button>
              ) : (
                <button onClick={next} style={{...mk.btn(T,{flex:1,justifyContent:'center'})}}>Next <Icons.chevR/></button>
              )}
              <SpeakBtn text={ch.hu} T={T}/>
            </div>
          </div>
        </div>
      );
    };

    // ── Quiz view ───────────────────────────────────────────────
    const QuizView = () => {
      if (!quiz) return (
        <div>
          <div style={{...mk.label(T,{marginBottom:10})}}>Level Quizzes</div>
          <div style={{display:'grid',gap:7}}>
            {fullCurriculum.map(lv => {
              const best = profile.best[lv.level];
              return (
                <div key={lv.level} style={{...mk.card(T,{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 15px',flexWrap:'wrap',gap:10})}}>
                  <div>
                    <div style={{display:'flex',gap:8,marginBottom:3,alignItems:'center'}}>
                      <Pill color={lv.color}>{lv.level}</Pill>
                      {best && <span style={{fontSize:12,color:T.muted,display:'flex',alignItems:'center',gap:2}}><Icons.star/>{best}%</span>}
                    </div>
                    <div style={{fontSize:13,color:T.textSub}}>{lv.title} · {QUIZZES[lv.level]?.length||0} questions</div>
                  </div>
                  <button onClick={() => startQuiz(lv.level)}
                    style={{...mk.btn(T,'secondary',{borderColor:lv.color+'44',background:lv.color+'12',color:lv.color})}}>
                    <Icons.target/> Start
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );

      if (quiz.done) {
        const pct = Math.round((quiz.score/quiz.qs.length)*100);
        const lv  = fullCurriculum.find(l=>l.level===quiz.lv);
        return (
          <div style={{...mk.card(T,{padding:'36px 24px',textAlign:'center'})}}>
            <div style={{width:64,height:64,borderRadius:'50%',background:pct>=80?T.successBg:pct>=60?T.accentSoft:T.surfaceAlt,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',color:pct>=80?T.success:T.accent}}>
              {pct>=80?<Icons.trophy/>:pct>=60?<Icons.star/>:<Icons.book/>}
            </div>
            <div style={{fontSize:36,fontWeight:700,color:T.text,marginBottom:4}}>{pct}%</div>
            <div style={{fontSize:14,color:T.muted,marginBottom:22}}>{quiz.score}/{quiz.qs.length} correct · +{quiz.score*10} XP</div>
            <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
              <button onClick={() => startQuiz(quiz.lv)} style={mk.btn(T)}><Icons.refresh/> Retry</button>
              <button onClick={() => setQuiz(null)} style={mk.btn(T,'secondary')}>All Quizzes</button>
            </div>
          </div>
        );
      }

      const q  = quiz.qs[quiz.cur];
      const lv = fullCurriculum.find(l=>l.level===quiz.lv);
      return (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            {lv && <Pill color={lv.color}>{quiz.lv}</Pill>}
            <span style={{fontSize:13,color:T.muted}}>{quiz.cur+1}/{quiz.qs.length}</span>
          </div>
          <div style={{height:4,borderRadius:2,background:T.border,overflow:'hidden',marginBottom:14}}>
            <div style={{height:'100%',width:`${Math.round((quiz.cur/quiz.qs.length)*100)}%`,background:lv?.color||T.accent,transition:'width .4s'}}/>
          </div>
          <div style={{...mk.card(T,{padding:20,marginBottom:10})}}>
            <p style={{fontSize:15,fontWeight:500,lineHeight:1.6,color:T.text,marginBottom:16}}>{q.q}</p>
            <div style={{display:'grid',gap:6,marginBottom:quiz.res?10:0}}>
              {(q.opts||[]).map((o,i) => {
                let bg=T.surface,bdr=T.border,col=T.textSub;
                if (quiz.res) {
                  if (i===q.correct)           { bg=T.successBg; bdr=T.success; col=T.successText; }
                  else if (i===quiz.res.selectedIdx) { bg=T.accentSoft; bdr=T.accent; col=T.accent; }
                }
                return (
                  <button key={i} onClick={() => { HAPTIC.medium(); answerQuiz(i); }}
                    style={{padding:'11px 14px',borderRadius:8,border:`1.5px solid ${bdr}`,background:bg,color:col,textAlign:'left',cursor:quiz.res?'default':'pointer',fontFamily:'inherit',fontSize:14,display:'flex',gap:11,alignItems:'center',transition:'border-color .15s,background .15s'}}
                    onMouseEnter={e => { if (!quiz.res) e.currentTarget.style.borderColor=lv?.color||T.accent; }}
                    onMouseLeave={e => { if (!quiz.res) e.currentTarget.style.borderColor=T.border; }}>
                    <span style={{width:22,height:22,borderRadius:'50%',border:`1.5px solid ${quiz.res?(i===q.correct?T.success:i===quiz.res?.selectedIdx?T.accent:T.border):T.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:T.muted,flexShrink:0}}>
                      {String.fromCharCode(65+i)}
                    </span>{o}
                  </button>
                );
              })}
            </div>
            {quiz.res && (
              <>
                <div role="status" style={{padding:'10px 13px',borderRadius:8,marginBottom:10,fontSize:13,lineHeight:1.5,background:quiz.res.ok?T.successBg:T.accentSoft,color:quiz.res.ok?T.successText:T.accent,fontWeight:500,display:'flex',gap:8}}>
                  <span style={{flexShrink:0}}>{quiz.res.ok?'✅':'❌'}</span><span>{quiz.res.explain}</span>
                </div>
                <button onClick={advanceQuiz}
                  style={{...mk.btn(T,{width:'100%',justifyContent:'center',padding:'13px 20px',fontSize:14,borderRadius:10,boxShadow:T.shadowMd})}}>
                  {quiz.cur+1>=quiz.qs.length?'See Results':'Continue'} <Icons.chevR/>
                </button>
              </>
            )}
          </div>
        </div>
      );
    };

    return (
      <div>
        <div style={{...mk.label(T,{marginBottom:10})}}>Practice</div>
        <div style={{display:'flex',gap:5,marginBottom:14,overflowX:'auto',paddingBottom:2}}>
          {TABS.map(tab => (
            <button key={tab.id} onClick={() => { HAPTIC.tick(); setPracticeTab(tab.id); setSrsSession(null); setQuiz(null); }}
              style={{display:'flex',alignItems:'center',gap:5,padding:'7px 13px',borderRadius:20,border:`1.5px solid ${practiceTab===tab.id?T.accent:T.border}`,background:practiceTab===tab.id?T.accentSoft:'transparent',color:practiceTab===tab.id?T.accent:T.muted,fontSize:12,fontWeight:practiceTab===tab.id?600:400,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
              <span style={{display:'flex'}}>{tab.icon}</span>{tab.label}
            </button>
          ))}
        </div>
        {practiceTab==='srs'       && <SrsView/>}
        {practiceTab==='quiz'      && <QuizView/>}
        {practiceTab==='verbs'     && <VerbDrillView/>}
        {practiceTab==='sentences' && <SentenceBuilderView/>}
      </div>
    );
  };

  // ══════════════════════════════════════════════════════════════
  //  NOTES
  // ══════════════════════════════════════════════════════════════
  const Notes = () => {
    const TABS = [
      {id:'quizbank',  label:'Quiz Bank',    icon:<Icons.target/>},
      {id:'expander',  label:'Add to Quizzes',icon:<Icons.plus/>},
      {id:'chapters',  label:'My Chapters',  icon:<Icons.book/>},
      {id:'sentences', label:'Sentences',    icon:<Icons.typeText/>},
      {id:'vocabulary',label:'Vocabulary',   icon:<Icons.eye/>},
    ];

    const QbForm = ({initial, onSave, onCancel, saveLabel='Add Question'}) => {
      const [form, setForm] = useState(initial || {type:'mcq',hungarian:'',translation:'',level:'A1',opts:['','','',''],correct:0,explain:''});
      return (
        <div style={{display:'grid',gap:9}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div>
              <div style={{...mk.label(T,{marginBottom:4})}}>Type</div>
              <select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} style={mk.inp(T)}>
                <option value="mcq">Multiple Choice</option>
                <option value="match">Match</option>
                <option value="fill">Fill in Blank</option>
              </select>
            </div>
            <div>
              <div style={{...mk.label(T,{marginBottom:4})}}>CEFR Level</div>
              <select value={form.level} onChange={e=>setForm(p=>({...p,level:e.target.value}))} style={mk.inp(T)}>
                {['A1','A2','B1','B2','C1','C2'].map(l=><option key={l}>{l}</option>)}
              </select>
            </div>
          </div>
          <input value={form.hungarian} onChange={e=>setForm(p=>({...p,hungarian:e.target.value}))} placeholder="Hungarian word or question…" style={mk.inp(T)}/>
          <input value={form.translation} onChange={e=>setForm(p=>({...p,translation:e.target.value}))} placeholder="English translation…" style={mk.inp(T)}/>
          {form.type==='mcq' && form.opts.map((o,i) => (
            <div key={i} style={{display:'flex',gap:8,alignItems:'center'}}>
              <div onClick={() => { HAPTIC.tick(); setForm(p=>({...p,correct:i})); }}
                style={{width:18,height:18,borderRadius:'50%',flexShrink:0,cursor:'pointer',border:`2px solid ${form.correct===i?T.accent:T.border}`,background:form.correct===i?T.accent:'transparent'}}/>
              <input style={{...mk.inp(T)}} placeholder={`Option ${String.fromCharCode(65+i)}`} value={o}
                onChange={e=>{const opts=[...form.opts];opts[i]=e.target.value;setForm(p=>({...p,opts}));}}/>
            </div>
          ))}
          <input value={form.explain||''} onChange={e=>setForm(p=>({...p,explain:e.target.value}))} placeholder="Explanation (optional)…" style={mk.inp(T)}/>
          <div style={{display:'flex',gap:7}}>
            <button onClick={() => { if(form.hungarian&&form.translation){HAPTIC.success();onSave(form);} }} style={mk.btn(T)}>
              <Icons.check/> {saveLabel}
            </button>
            <button onClick={() => { HAPTIC.light(); onCancel(); }} style={mk.btn(T,'secondary')}>Cancel</button>
          </div>
        </div>
      );
    };

    const QuizBankTab = () => {
      const allSel = userQuestions.length>0 && userQuestions.every(q=>selectedIds.has(q.id));
      const toggle = id => setSelectedIds(p => { const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });
      const doDelete = ids => { HAPTIC.heavy(); setUserQuestions(p=>p.filter(q=>!ids.has(q.id))); setSelectedIds(new Set()); setConfirmDel(null); notify('Deleted'); };

      if (qbView==='add') return (
        <div>
          <button onClick={() => { HAPTIC.light(); setQbView('list'); }}
            style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:13,padding:'0 0 12px',fontFamily:'inherit'}}>
            <Icons.arrowL/> Quiz Bank
          </button>
          <h3 style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:10}}>Add New Question</h3>
          <div style={mk.card(T,{padding:16})}>
            <QbForm onSave={q=>{setUserQuestions(p=>[...p,{...q,id:`uq_${Date.now()}`}]);setQbView('list');notify('Added');}} onCancel={()=>setQbView('list')}/>
          </div>
        </div>
      );

      if (qbView==='edit' && editingQ) return (
        <div>
          <button onClick={() => { HAPTIC.light(); setQbView('list'); setEditingQ(null); }}
            style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',color:T.muted,cursor:'pointer',fontSize:13,padding:'0 0 12px',fontFamily:'inherit'}}>
            <Icons.arrowL/> Quiz Bank
          </button>
          <h3 style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:10}}>Edit Question</h3>
          <div style={mk.card(T,{padding:16})}>
            <QbForm initial={editingQ} saveLabel="Save Changes"
              onSave={q=>{setUserQuestions(p=>p.map(x=>x.id===editingQ.id?{...q,id:editingQ.id}:x));setQbView('list');setEditingQ(null);notify('Saved');}}
              onCancel={()=>{setQbView('list');setEditingQ(null);}}/>
          </div>
        </div>
      );

      return (
        <div>
          {confirmDel && (
            <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
              <div style={{...mk.card(T,{padding:22,maxWidth:320,width:'100%'})}}>
                <div style={{fontSize:15,fontWeight:600,color:T.text,marginBottom:7}}>Delete {confirmDel==='bulk'?`${selectedIds.size} questions`:'question'}?</div>
                <div style={{fontSize:13,color:T.muted,marginBottom:18}}>This cannot be undone.</div>
                <div style={{display:'flex',gap:7}}>
                  <button onClick={() => doDelete(confirmDel==='bulk'?selectedIds:new Set([confirmDel]))} style={mk.btn(T)}><Icons.trash/> Delete</button>
                  <button onClick={() => { HAPTIC.light(); setConfirmDel(null); }} style={mk.btn(T,'secondary')}>Cancel</button>
                </div>
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:7,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
            <button onClick={() => { HAPTIC.medium(); setQbView('add'); }} style={mk.btn(T)}><Icons.plus/> Add New</button>
            {selectedIds.size>0 && (
              <>
                <button onClick={() => { HAPTIC.warning(); setConfirmDel('bulk'); }}
                  style={{...mk.btn(T,'secondary',{color:T.accent,borderColor:T.accent+'44'})}}><Icons.trash/> Delete ({selectedIds.size})</button>

{JSON.stringify({
  themeKey: '"piros"|"feher"|"zold"|"arany"',
  hapticEnabled: 'boolean',
  profile: {
    done: '["chapterId", ...]',
    best: '{"A1":85,"A2":70,...}',
    streak: 'number',
    xp: 'number',
    lastLogin: '"Date string"'
  },
  userQuestions: [{
    id: '"uq_timestamp"',
    type: '"mcq"|"match"|"fill"',
    hungarian: '"the question text"',
    translation: '"correct answer / translation"',
    level: '"A1"|"A2"|"B1"|"B2"|"C1"|"C2"',
    opts: '["A","B","C","D"]',
    correct: 'index 0-3',
    explain: '"explanation shown after answering"'
  }],
  srsCards: {
    'chapterId_word': {
      id: 'string', hu: 'string', en: 'string', level: 'string',
      easeFactor: 'number (SM-2)', interval: 'days', repetitions: 'number',
      nextReview: 'timestamp ms'
    }
  },
  customChapters: [{
    id: '"custom_timestamp"',
    title: 'string', level: '"A1"|...|"C2"',
    icon: 'emoji string', isCustom: true,
    sections: [{ type: '"concept"|"example"|"vocab"|"exercise"|"summary"', title: 'string' }]
  }],
  editedChapters: {'chapterId': { title: 'string', sections: '[]' }}
}, null, 2)}
                </div>
                <div style={{marginTop:8,color:T.muted}}>
                  Import merges into existing data. Chapter IDs that match built-in chapters will override them (editedChapters). Unknown keys are ignored.
                </div>
              </div>
            )}

            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              <button onClick={() => { HAPTIC.medium(); persist.export({themeKey,hapticEnabled,profile,userQuestions,srsCards,customChapters,editedChapters}); notify('Exported as .json'); }}

      <div style={{position:'fixed',top:0,right:0,bottom:0,width:256,zIndex:201,background:T.surface,borderLeft:`1px solid ${T.border}`,boxShadow:'-8px 0 32px rgba(0,0,0,0.12)',transform:navOpen?'translateX(0)':'translateX(100%)',transition:'transform .28s cubic-bezier(0.32,0.72,0,1)',display:'flex',flexDirection:'column',overflowY:'auto'}}
        role="dialog" aria-label="Navigation menu" aria-hidden={!navOpen}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 18px',borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <img src={COAT_OF_ARMS} alt="" style={{height:24,objectFit:'contain'}} onError={e=>e.target.style.display='none'}/>
            <span style={{fontSize:14,fontWeight:700,color:T.text,fontFamily:"'DM Serif Display',Georgia,serif"}}>Magyar Diák</span>
          </div>
          <button onClick={() => { HAPTIC.light(); setNavOpen(false); }} aria-label="Close menu"
            style={{background:'none',border:'none',cursor:'pointer',color:T.muted,display:'flex',padding:4}}>
            <Icons.close/>
          </button>
        </div>

        {/* Theme color dots */}
        <div style={{padding:'12px 14px'}}>
          <div style={{...mk.label(T,{marginBottom:9,paddingLeft:2})}}>Theme</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:4}}>
            {Object.entries(THEMES).map(([k,th]) => (
              <button key={k} onClick={() => { HAPTIC.tick(); setThemeKey(k); setNavOpen(false); }}
                style={{padding:'7px 4px',borderRadius:8,border:`2px solid ${themeKey===k?th.accent:T.border}`,background:themeKey===k?th.accentSoft:T.surfaceAlt,cursor:'pointer',fontFamily:'inherit',textAlign:'center'}}>
                <div style={{width:16,height:16,borderRadius:'50%',background:th.accent,margin:'0 auto 3px'}}/>
                <div style={{fontSize:10,fontWeight:themeKey===k?700:400,color:themeKey===k?th.accent:T.muted}}>{th.name}</div>
              </button>
            ))}
          </div>
        </div>
        <Divider T={T}/>

        {/* Support links */}
        <div style={{padding:'8px 10px 16px'}}>
          <div style={{...mk.label(T,{marginBottom:7,paddingLeft:4})}}>More</div>
          {[
            {id:'settings', label:'Settings', icon:<Icons.settings/>, sub:false},
            {id:'faq',  label:'FAQ',   icon:<Icons.info/>,   sub:true},
            {id:'help', label:'Help',  icon:<Icons.volume/>, sub:true},
            {id:'about',label:'About', icon:<Icons.eye/>,    sub:true},
          ].map(item => (
            <button key={item.id}
              onClick={() => { HAPTIC.light(); item.sub ? (setView('settings'),setSettingsPage(item.id)) : goView(item.id); setNavOpen(false); }}
              style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'9px 12px',borderRadius:8,background:'transparent',color:T.textSub,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:14,marginBottom:1}}>
              <span style={{color:T.muted,display:'flex',flexShrink:0}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
      </div>
    </>
  );

  const BottomNav = () => (
    <nav style={{position:'fixed',bottom:0,left:0,right:0,background:T.surface,borderTop:`1px solid ${T.border}`,display:'flex',zIndex:100,height:58,paddingBottom:'env(safe-area-inset-bottom,0)'}}
      aria-label="Main navigation">
      {NAV.map(item => (
        <button key={item.id} onClick={() => { HAPTIC.light(); goView(item.id); }}
          aria-label={item.label} aria-current={view===item.id?'page':undefined}
          style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,color:view===item.id?T.accent:T.muted,borderTop:view===item.id?`2px solid ${T.accent}`:'2px solid transparent',paddingTop:view===item.id?0:2,transition:'color .15s'}}>
          <span style={{display:'flex',transform:view===item.id?'scale(1.1)':'scale(1)',transition:'transform .15s'}}>{item.icon}</span>
          <span style={{fontSize:10,fontWeight:view===item.id?600:400,letterSpacing:'0.04em',textTransform:'uppercase',marginTop:1}}>{item.label}</span>
        </button>
      ))}
    </nav>
  );

  // ══════════════════════════════════════════════════════════════
  //  RENDER
  // ══════════════════════════════════════════════════════════════
  return (
    <div style={{minHeight:'100vh',background:T.bg,color:T.text,fontFamily:"'DM Sans','Inter',system-ui,sans-serif",transition:'background .25s,color .25s',paddingBottom:58}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .page-enter{animation:fadeUp .2s ease both;}
        button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid ${T.accent};outline-offset:2px;}
        input:focus,select:focus{border-color:${T.accent}!important;outline:none;}
        button:active{opacity:.82;}
        ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:${T.border};border-radius:3px;}
      `}</style>

      <NotifToast/>
      <Onboarding/>
      <SearchOverlay/>

      {/* Header */}
      <header style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:'0 14px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,boxShadow:T.shadow}}
        role="banner">
        <button onClick={() => { HAPTIC.light(); goView('home'); }}
          style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer',padding:0}}
          aria-label="Go to home">
          <img src={COAT_OF_ARMS} alt="" style={{height:26,objectFit:'contain'}} onError={e=>e.target.style.display='none'}/>
          <span style={{fontSize:16,fontWeight:700,color:T.text,fontFamily:"'DM Serif Display',Georgia,serif"}}>Magyar Diák</span>
        </button>
        <div style={{display:'flex',gap:6}}>
          <button onClick={() => { HAPTIC.light(); setShowSearch(s=>!s); }}
            aria-label="Search" aria-expanded={showSearch}
            style={{width:36,height:36,borderRadius:8,border:`1px solid ${showSearch?T.accent:T.border}`,background:showSearch?T.accentSoft:'transparent',color:showSearch?T.accent:T.textSub,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            <Icons.search/>
          </button>
          <button onClick={() => { HAPTIC.light(); setNavOpen(o=>!o); }}
            aria-label={navOpen?'Close menu':'Open menu'} aria-expanded={navOpen}
            style={{width:36,height:36,borderRadius:8,border:`1px solid ${navOpen?T.accent:T.border}`,background:navOpen?T.accentSoft:'transparent',color:navOpen?T.accent:T.textSub,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            {navOpen ? <Icons.close/> : <Icons.menu/>}
          </button>
        </div>
      </header>

      <NavPanel/>

      <main style={{maxWidth:820,margin:'0 auto',padding:'16px 14px 20px'}} role="main">
        <div key={view} className="page-enter">
          {view==='home'     && <Home/>}
          {view==='learn'    && <Learn/>}
          {view==='practice' && <Practice/>}
          {view==='notes'    && <Notes/>}
          {view==='profile'  && <Profile/>}
          {view==='settings' && <Settings/>}
        </div>
      </main>

      <BottomNav/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(window.MagyarDiakApp));
</script>
</body>
</html>
