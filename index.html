  { id:"b1-tenses", title:"Past Tense & Future Expressions", icon:"⏰", sections:[
      { type:"concept", title:"Only 2 Tenses — Present Covers Future Too",
        body:"**Hungarian has just present and past tense.** Future uses present tense or constructions.\n\n**Past tense** — formed with -tt/-t suffix:\n\n**Past Indefinite (olvas = to read):**\n| Person | Singular | Plural |\n|--------|---------|--------|\n| 1st | olvastam | olvastunk |\n| 2nd | olvastál | olvastatok |\n| 3rd | olvasott | olvastak |\n\n**Past Definite (lát = to see):**\n| Person | Singular | Plural |\n|--------|---------|--------|\n| 1st | láttam | láttuk |\n| 2nd | láttad | láttátok |\n| 3rd | látta | látták |\n\n**Irregular past forms (must memorize):**\n• megy → ment (went) · jön → jött (came) · van → volt (was)\n• eszik → evett (ate) · iszik → ivott (drank) · hisz → hitt (believed)\n• vesz → vett (bought/took) · visz → vitt (carried)\n• tesz → tett (put/did) · lesz → lett (became)\n\n**Future expressions:**\n1. **Present tense** (planned/imminent future): Holnap megyek. (I'm going tomorrow.)\n2. **fog + infinitive** (deliberate/certain future): Menni fogok. · Látni fogja.\n3. **majd + present** (eventual/indefinite): Majd megcsinálom. (I'll get around to it.)\n4. **Time adverb + present** (scheduled): Holnap indul a vonat. (The train leaves tomorrow.)" },
      { type:"example", title:"20 Tense Examples",
        examples:[
          {hu:"Tegnap moziba mentem.",en:"Yesterday I went to the cinema.",note:"past indef. 1PS: megy→mentem"},
          {hu:"Láttam a filmet.",en:"I saw the film.",note:"past definite 1PS: lát→láttam"},
          {hu:"Péter elment a boltba.",en:"Peter went to the shop.",note:"past indef. 3PS: megy→ment"},
          {hu:"Megettük az ebédet.",en:"We ate up the lunch.",note:"past definite 1PP: eszik→ettük"},
          {hu:"Ittál vizet?",en:"Did you drink water?",note:"past indef. 2PS: iszik→ittál"},
          {hu:"Volt itt valaki.",en:"Someone was here.",note:"past of van: volt"},
          {hu:"Jött a busz.",en:"The bus came.",note:"past indef. 3PS: jön→jött"},
          {hu:"Olvasták az újságot.",en:"They read the newspaper.",note:"past definite 3PP"},
          {hu:"Vettél tejet?",en:"Did you buy milk?",note:"past indef. 2PS: vesz→vettél"},
          {hu:"Lett belőle tanár.",en:"He/she became a teacher.",note:"past of lesz: lett"},
          {hu:"Holnap megyek.",en:"I'm going tomorrow.",note:"present = near future"},
          {hu:"Ma este főzök.",en:"I'm cooking tonight.",note:"present = planned future"},
          {hu:"Menni fogok moziba.",en:"I will go to the cinema.",note:"fog + infinitive"},
          {hu:"El fogja olvasni.",en:"He/she will read it.",note:"fog: definite 3PS"},
          {hu:"Meg fogod csinálni?",en:"Will you do it?",note:"fog: definite 2PS"},
          {hu:"Majd megcsinálom.",en:"I'll get around to doing it.",note:"majd = eventual future"},
          {hu:"Majd szólok.",en:"I'll let you know eventually.",note:"majd + present"},
          {hu:"Jövőre Magyarországra megyek.",en:"Next year I'm going to Hungary.",note:"time word = future"},
          {hu:"A vonat három órakor indul.",en:"The train departs at three.",note:"timetable = present tense"},
          {hu:"Holnap lesz az esküvő.",en:"The wedding is tomorrow.",note:"lesz = future form of van"},
        ]},
      { type:"exercise", title:"Exercise 11 — Tenses",
        instructions:"Select the correct verb form.",
        ex_type:"mcq",
        questions:[
          {q:"Yesterday I ate pizza: Tegnap pizzát ___.",opts:["eszem","ettem","enni fogok"],correct:1,explain:"Past indefinite 1PS: eszik → ettem"},
          {q:"Tomorrow I will certainly read: Holnap olvasni ___.",opts:["olvastam","olvasok","fogok"],correct:2,explain:"Certain future: olvasni fogok (fog + infinitive)"},
          {q:"She saw the film: ___ a filmet.",opts:["Látta","Látja","Látni fogja"],correct:0,explain:"Past definite 3PS: látta"},
        ]},
      { type:"summary",
        summary:"This chapter showed that Hungarian manages all time expression with just two tenses plus present-tense future.\n\n**What we covered:**\n• Past tense with -tt/-t suffix, full definite and indefinite tables\n• Key irregular pasts: megy→ment, jön→jött, van→volt, eszik→evett, vesz→vett\n• Three future strategies: present tense, fog+infinitive, majd+present\n• When to use each: present for plans, fog for certainty, majd for indefinite",
        takeaways:["**Two tenses total** — present and past. Once you master these, you can express ALL time in Hungarian.","**Present tense covers future** — Holnap megyek = I'm going tomorrow. This is the most natural and common way.","**fog+infinitive = deliberate/certain future** — Menni fogok = I WILL go (I've decided). More emphatic than plain present.","**Irregular pasts are your highest-frequency verbs** — megy/ment, jön/jött, van/volt, eszik/evett must be automatic.","**Definite past requires definite object** — just like present tense. The rule doesn't change in past tense."] }
    ]},
    { id:"b1-prefixes", title:"Verbal Prefixes (Igekötők)", icon:"🔧", sections:[
      { type:"concept", title:"Prefixes That Travel — Aspect and Direction",
        body:"Verbal prefixes modify meaning and add aspect (completion vs. ongoing).\n\n**Common prefixes and their meanings:**\n| Prefix | Core meaning | Example |\n|--------|-------------|----------|\n| meg- | completion/achievement | ír→megír (finish writing) |\n| el- | away / movement | megy→elmegy (go away) |\n| be- | inward / into | megy→bemegy (go in) |\n| ki- | outward / out | megy→kimegy (go out) |\n| fel- | upward | megy→felmegy (go up) |\n| le- | downward | megy→lemegy (go down) |\n| vissza- | back/return | megy→visszamegy (go back) |\n| át- | across/through | megy→átmegy (cross) |\n| össze- | together | gyűjt→összegyűjt (collect) |\n| szét- | apart/scattered | szed→szétszed (disassemble) |\n| rá- | onto/upon | néz→ránéz (glance at) |\n| meg- can also mean: | start of state | szeret→megszeret (come to love) |\n\n**CRITICAL word order rules — When do prefixes separate?**\n\n**Stays attached:** normal affirmative sentences\n• Elmegyek. · Megeszem. · Visszajön.\n\n**ALWAYS separates with NEGATION** (nem/ne goes before verb):\n• Nem megyek el. ← NOT 'Nem elmegyek'!\n• Ne menj el! ← NOT 'Ne elmenj'!\n\n**Separates with FOCUS** (emphasis element before verb):\n• MA megyek el. (TODAY I'm going away — ma is focused)\n• PÉTER ment el, nem én. (PETER left, not me)\n\n**In IMPERATIVE** (prefix comes after verb):\n• Menj el! · Gyere be! · Tedd le!" },
      { type:"example", title:"20 Verbal Prefix Examples",
        examples:[
          {hu:"Megeszem a kenyeret.",en:"I eat up the bread (completely).",note:"meg- = completion"},
          {hu:"Nem eszem meg a kenyeret.",en:"I don't eat up the bread.",note:"negation: meg SEPARATES"},
          {hu:"Ne edd meg!",en:"Don't eat it up!",note:"imperative negation: meg after verb"},
          {hu:"Ma eszem meg.",en:"I'll eat it TODAY.",note:"ma = focus before verb, meg separates"},
          {hu:"Elmegyek a boltba.",en:"I go to the shop.",note:"el- = away/off"},
          {hu:"Nem megyek el.",en:"I'm not going away.",note:"negation: el separates"},
          {hu:"Menj el!",en:"Go away!",note:"imperative: el after verb"},
          {hu:"Bemegyek a házba.",en:"I go into the house.",note:"be- = inward"},
          {hu:"Nem megyek be.",en:"I'm not going in.",note:"negation: be separates"},
          {hu:"Kimegy a kertbe.",en:"He/she goes out to the garden.",note:"ki- = outward"},
          {hu:"Felmegy a lépcsőn.",en:"He/she goes up the stairs.",note:"fel- = upward"},
          {hu:"Lemegy a pincébe.",en:"He/she goes down to the cellar.",note:"le- = downward"},
          {hu:"Visszamegy haza.",en:"He/she goes back home.",note:"vissza- = back/return"},
          {hu:"Átmegy az úton.",en:"He/she crosses the road.",note:"át- = across/through"},
          {hu:"Megírta a levelet.",en:"He/she wrote the letter (finished).",note:"meg- + past definite"},
          {hu:"Nem írta meg a levelet.",en:"He/she didn't write the letter.",note:"negation past: meg separates"},
          {hu:"Összegyűjtötte a pénzt.",en:"He/she collected the money.",note:"össze- = together"},
          {hu:"Mikor ment el?",en:"When did he/she leave?",note:"question word (mikor) before verb, el separates"},
          {hu:"Péter ment el, nem Anna.",en:"PETER left, not Anna.",note:"focus: Péter before verb, el separates"},
          {hu:"Tedd le a táskát!",en:"Put down the bag!",note:"imperative: le after verb"},
        ]},
      { type:"exercise", title:"Exercise 12 — Prefix Position",
        instructions:"Choose the correctly formed sentence.",
        ex_type:"mcq",
        questions:[
          {q:"'I'm not going away' — correct negation:",opts:["Nem elmegyek.","Nem megyek el.","Elmegyek nem."],correct:1,explain:"Negation: nem + verb + separated prefix: nem megyek el"},
          {q:"'I went in' (normal past, no emphasis):",opts:["Bementem.","Mentem be.","Nem bementem."],correct:0,explain:"Normal past (no emphasis/negation): prefix attaches: bementem"},
          {q:"'I didn't go in' (past + negation):",opts:["Nem bemegyek.","Nem mentem be.","Be nem mentem."],correct:1,explain:"Past + negation: nem + verb + prefix: nem mentem be"},
        ]},
      { type:"summary",
        summary:"This chapter explained how verbal prefixes modify meaning, add aspect, and move within the sentence according to strict rules.\n\n**What we covered:**\n• 10 common prefixes: meg-, el-, be-, ki-, fel-, le-, vissza-, át-, össze-, szét-\n• meg- for completion, directional prefixes for movement\n• Normal position: prefix attaches (Elmegyek)\n• With negation: prefix ALWAYS separates (Nem megyek el)\n• With focus: prefix separates (MA megyek el)\n• In imperative: prefix goes after verb (Menj el!)",
        takeaways:["**The separation rule for negation is absolute** — Nem megyek el. Never 'Nem elmegyek'. This is one of the most common errors.","**meg- is the most important prefix** — it transforms an ongoing action into a completed one. megír ≠ ír.","**Think of prefixes as mobile** — they travel away from the verb whenever something else needs the pre-verbal focus position.","**The focus position governs everything** — whatever immediately precedes the verb is emphasized. This is why prefixes must move.","**Imperative always separates** — Tedd le! Menj el! Gyere be! The prefix consistently follows in commands."] }
    ]},
    { id:"b1-moods", title:"Imperative & Conditional Moods", icon:"🎭", sections:[
      { type:"concept", title:"Commands, Politeness, Hypotheticals",
        body:"**Imperative Mood — commands and requests:**\n\nFormation: verb stem + -j (for most verbs, informal singular):\n• keres→keress! · olvas→olvass! · megy→menj! · néz→nézz!\n\nSpecial cases:\n• Verbs in -t with long vowel/diphthong before: tanít→taníts! · mutat→mutass!\n• jön→gyere! · van→légy! · tesz→tedd! · vesz→vedd! (irregular)\n\nFormal (3rd PS): Menjen! · Kérem, jöjjön ide! · Tessék!\nNegative: Ne + imperative: Ne menj el! · Ne edd meg! · Ne félj!\n\n**Conditional Mood — wishes, hypotheticals, politeness:**\n\nPresent conditional formation: verb stem + -na/-ne (deep/high):\n| Person | Deep (-na) | High (-ne) |\n|--------|-----------|------------|\n| 1st PS | mennék | kérnék |\n| 2nd PS | mennél | kérnél |\n| 3rd PS | menne | kérne |\n| 1st PP | mennénk | kérnénk |\n| 2nd PP | mennétek | kérnétek |\n| 3rd PP | mennének | kérnének |\n\n**Always use conditional for polite requests:**\n• Kérnék egy kávét. (I would like a coffee.) ← polite ✓\n• Kérek egy kávét. (I want a coffee.) ← blunt/direct\n• Tudna segíteni? (Could you help?) ← very polite\n\n**Past conditional** (would have done):\n• Mentem volna, ha lett volna időm. (I would have gone if I'd had time.)\n\n**Conditional clauses:**\n• Ha + conditional → main clause conditional: Ha tudnék, segítenék.\n• Ha + past conditional → main clause past conditional" },
      { type:"example", title:"20 Mood Examples",
        examples:[
          {hu:"Gyere ide!",en:"Come here! (informal sg.)",note:"jön → gyere (irregular imperative)"},
          {hu:"Menj el!",en:"Go away! (informal sg.)",note:"megy → menj"},
          {hu:"Olvass egy könyvet!",en:"Read a book!",note:"olvas → olvass (double s)"},
          {hu:"Ne menj el!",en:"Don't go away!",note:"ne + imperative"},
          {hu:"Ne félj!",en:"Don't be afraid!",note:"fél → félj → ne félj"},
          {hu:"Tessék helyet foglalni!",en:"Please take a seat! (formal)",note:"tessék = polite please"},
          {hu:"Legyen szíves!",en:"Be so kind! / Please! (formal)",note:"légy/legyen szíves = standard polite"},
          {hu:"Kérnék egy kávét.",en:"I would like a coffee.",note:"conditional = polite order"},
          {hu:"Tudna segíteni?",en:"Could you help?",note:"conditional = very polite request"},
          {hu:"Szeretnék egy szobát foglalni.",en:"I would like to book a room.",note:"szeretnék = I would like (very common)"},
          {hu:"Ha tudnám, megmondanám.",en:"If I knew, I would tell you.",note:"conditional clause"},
          {hu:"Mennék moziba, ha lenne időm.",en:"I would go to the cinema if I had time.",note:"both clauses conditional"},
          {hu:"Mit csinálnál a helyemben?",en:"What would you do in my place?",note:"conditional 2PS"},
          {hu:"Venném, de nincs pénzem.",en:"I would buy it, but I have no money.",note:"conditional + reality"},
          {hu:"Ha lett volna pénzem, vettem volna.",en:"If I had had money, I would have bought it.",note:"past conditional"},
          {hu:"Elmentünk volna, de beteg volt.",en:"We would have gone but he was sick.",note:"past conditional 1PP"},
          {hu:"Nem kérdeznék ilyet.",en:"I wouldn't ask such a thing.",note:"conditional polite refusal"},
          {hu:"Hozd el a könyvet!",en:"Bring the book! (informal)",note:"imperative: hoz → hozd (definite)"},
          {hu:"Tedd le!",en:"Put it down! (informal)",note:"imperative: tesz → tedd (definite)"},
          {hu:"Vedd meg!",en:"Buy it! (informal)",note:"imperative: vesz → vedd (definite)"},
        ]},
      { type:"exercise", title:"Exercise 13 — Moods",
        instructions:"Choose the correct mood form.",
        ex_type:"mcq",
        questions:[
          {q:"Polite way to order coffee:",opts:["Kérek!","Kérnék.","Kérj!"],correct:1,explain:"Conditional (kérnék) = polite: I would like"},
          {q:"'Don't eat that!':",opts:["Ne edd meg!","Edd meg!","Megennéd."],correct:0,explain:"Negative imperative: Ne + imperative form"},
          {q:"'If I could, I would help':",opts:["Ha tudok, segítek.","Ha tudnék, segítenék.","Ha tudtam, segítettem."],correct:1,explain:"Both clauses conditional: ha tudnék...segítenék"},
        ]},
      { type:"summary",
        summary:"This chapter introduced the imperative and conditional moods, with a special focus on using conditional for politeness.\n\n**What we covered:**\n• Imperative formation: stem + -j (with special cases: olvass, tedd, vedd)\n• Formal imperative using 3rd person forms (Menjen!, Tessék!)\n• Negative imperative with ne (not nem!)\n• Conditional -na/-ne endings and full conjugation tables\n• Conditional for polite requests (Kérnék vs. Kérek)\n• Past conditional with volna (Mentem volna)\n• Conditional clauses: ha + conditional → conditional",
        takeaways:["**Use conditional for ALL polite requests** — Kérnék egy kávét is the standard polite order in any café. This one habit transforms your politeness level.","**Negative imperative uses ne, NOT nem** — Ne menj el! (not *Nem menj el!). This is a firm rule.","**Tessék is a universal formal please** — Tessék helyet foglalni! = Please take a seat! Works in almost any formal situation.","**Past conditional = volna after past tense** — Mentem volna = I would have gone. Simple construction, very expressive.","**Conditional clauses require BOTH verbs conditional** — Ha tudnék, segítenék. Both clauses. This differs from English."] }
    ]},
    { id:"b1-location", title:"Adverbs of Place — 9 Suffixes", icon:"📍", sections:[
      { type:"concept", title:"3 Triplets — Static / Toward / Away",
        body:"Hungarian location uses **9 suffixes in 3 triplets**.\n\n**Triplet 1 — Inside (container):**\n| Static (in/inside) | Toward (into) | Away (out of) |\n|-------------------|--------------|---------------|\n| -ban/-ben | -ba/-be | -ból/-ből |\n| a házban (in the house) | a házba (into the house) | a házból (from the house) |\n\n**Triplet 2 — Surface (platform/top/open area):**\n| Static (on) | Toward (onto) | Away (off of) |\n|------------|--------------|---------------|\n| -n/-on/-en/-ön | -ra/-re | -ról/-ről |\n| az asztalon (on the table) | az asztalra (onto the table) | az asztalról (off the table) |\n| Magyarországon (in Hungary) | Magyarországra (to Hungary) | Magyarországról (from Hungary) |\n\n**Triplet 3 — Near/by (proximity):**\n| Static (at/by) | Toward (toward) | Away (away from) |\n|---------------|----------------|------------------|\n| -nál/-nél | -hoz/-hez/-höz | -tól/-től |\n| a háznál (at/by the house) | a házhoz (toward the house) | a háztól (from the house) |\n\n**Special uses of Triplet 2 (surface) for countries, islands, regions:**\n• Countries/regions on a plain use -n/-ra/-ről: Magyarországon, Angliában (exception!)\n• Islands: Ciprusra, Krétan\n\n**Memory tip:** Ask 3 questions every time:\nWHERE is it? (static) / WHERE is it going? (toward) / WHERE is it coming FROM? (away)" },
      { type:"example", title:"20 Location Suffix Examples",
        examples:[
          {hu:"A könyv az asztalon van.",en:"The book is on the table.",note:"-on = static, on surface"},
          {hu:"Teszem a könyvet az asztalra.",en:"I put the book onto the table.",note:"-ra = motion onto"},
          {hu:"Leveszem az asztalról.",en:"I take it off the table.",note:"-ról = motion off surface"},
          {hu:"Megyek a házba.",en:"I'm going into the house.",note:"-ba = motion into"},
          {hu:"Jövök a házból.",en:"I'm coming from the house.",note:"-ból = motion out of"},
          {hu:"Vagyok a kertben.",en:"I am in the garden.",note:"-ben = static inside"},
          {hu:"Várok a megállónál.",en:"I'm waiting at the bus stop.",note:"-nál = static near/by"},
          {hu:"Megyek a megállóhoz.",en:"I'm going toward the bus stop.",note:"-hoz = motion toward"},
          {hu:"Jövök a megállótól.",en:"I'm coming from the bus stop.",note:"-tól = motion away from"},
          {hu:"Magyarországon élek.",en:"I live in Hungary.",note:"-on = surface (country)"},
          {hu:"Magyarországra megyek.",en:"I'm going to Hungary.",note:"-ra = motion to (country)"},
          {hu:"Magyarországról jövök.",en:"I'm coming from Hungary.",note:"-ról = from (country)"},
          {hu:"A vonat az állomáson áll.",en:"The train is at the station.",note:"-on = static at station"},
          {hu:"Felszállok a vonatra.",en:"I board the train.",note:"-ra = motion onto vehicle"},
          {hu:"Leszállok a vonatról.",en:"I get off the train.",note:"-ról = off vehicle"},
          {hu:"Az iskolában vagyok.",en:"I'm at school.",note:"-ban = inside building"},
          {hu:"Iskolába megyek.",en:"I'm going to school.",note:"-ba = into building"},
          {hu:"Iskolából jövök.",en:"I'm coming from school.",note:"-ból = out of building"},
          {hu:"Az orvoshoz megyek.",en:"I'm going to the doctor.",note:"-hoz = toward person"},
          {hu:"Az orvostól jövök.",en:"I'm coming from the doctor.",note:"-tól = away from person"},
        ]},
      { type:"exercise", title:"Exercise 14 — Location Suffixes",
        instructions:"Choose the correct suffix.",
        ex_type:"mcq",
        questions:[
          {q:"The book IS IN the bag: A könyv a táska___.",opts:["táskába","táskában","táskából","táskától"],correct:1,explain:"-ban = static location inside (container)"},
          {q:"I'm going INTO the house: Megyek a ház___.",opts:["házban","házba","házból","házhoz"],correct:1,explain:"-ba = motion into the inside"},
          {q:"Coming FROM the school: Jön az iskola___.",opts:["iskolára","iskolából","iskolában","iskolánál"],correct:1,explain:"-ból = motion out of a building"},
          {q:"I put it ON the table: Az asztal___ teszem.",opts:["asztalon","asztalra","asztalról","asztalban"],correct:1,explain:"-ra = motion onto a surface"},
        ]},
      { type:"summary",
        summary:"This chapter presented the 9 location suffixes organized in 3 functional triplets.\n\n**What we covered:**\n• Triplet 1 (inside): -ban/-ben (static) / -ba/-be (into) / -ból/-ből (out of)\n• Triplet 2 (surface): -n/-on/-en/-ön (static) / -ra/-re (onto) / -ról/-ről (off)\n• Triplet 3 (near/by): -nál/-nél (static) / -hoz/-hez/-höz (toward) / -tól/-től (away from)\n• Countries on plains use Triplet 2 (Magyarországon/ra/ról)\n• Verbs of motion require the correct directional suffix",
        takeaways:["**Learn as 3 triplets, not 9 individual suffixes** — each triplet = one spatial relationship × 3 directions. Three concepts, not nine.","**Static vs. directional is the key question** — WHERE is it? (static) vs. WHERE is it GOING? vs. WHERE is it COMING FROM?","**Hungary uses Triplet 2** — Magyarországon (on Hungary), not *Magyarországban. Open plains → surface suffix.","**The -nál/-hoz/-tól triplet covers people too** — az orvosnál (at the doctor's), orvoshoz (to the doctor), orvostól (from the doctor).","**Vehicles use surface** — vonatra (onto the train), vonaton (on the train), vonatról (off the train). Treat vehicles like platforms."] }
    ]},
{ id:"b1-irregular-verbs", title:"Irregular Verbs — The Essential 17", icon:"⚡", sections:[
      { type:"concept", title:"The 17 Irregular Verbs Every Learner Must Know",
        body:`Hungarian has a small set of highly frequent irregular verbs that must be memorized. These are the verbs with the highest frequency in spoken and written Hungarian.

**Group 1 — v-stem verbs (the stem takes -v- before vowel endings):**
| Infinitive | Meaning | Present 3PS | Past 3PS | Notes |
|------------|---------|-------------|----------|-------|
| tesz | to put/do | tesz | tett | -sz verb |
| vesz | to take/buy | vesz | vett | -sz verb |
| visz | to carry/take | visz | vitt | -sz verb |
| hisz | to believe | hisz | hitt | -sz verb |
| lesz | to become/will be | lesz | lett | future of van |
| eszik | to eat | eszik | evett | -ik verb |
| iszik | to drink | iszik | ivott | -ik verb |

**Group 2 — d/t stem alternations:**
| Infinitive | Meaning | Present 3PS | Past 3PS | Imperative |
|------------|---------|-------------|----------|-----------|
| megy | to go | megy | ment | menj! |
| jön | to come | jön | jött | gyere! |
| van | to be | van | volt | légy! |
| alszik | to sleep | alszik | aludt | aludj! |
| fekszik | to lie down | fekszik | feküdt | feküdj! |
| játszik | to play | játszik | játszott | játssz! |

**Group 3 — other high-frequency irregulars:**
| Infinitive | Meaning | 1PS present | Past 3PS |
|------------|---------|-------------|----------|
| ad | to give | adok | adott |
| kap | to get/receive | kapok | kapott |
| tud | to know/can | tudok | tudott |
| lát | to see | látok | látott |

**The -ik verb conjugation (special 1PS form):**
Regular verbs: én látok → -ik verbs: én eszem, én iszom, én alszom
The 1PS form takes -m (not -k) in BOTH definite and indefinite for -ik verbs.

**Van — full irregular paradigm:**
Present: vagyok, vagy, van/-, vagyunk, vagytok, vannak
Past: voltam, voltál, volt, voltunk, voltatok, voltak  
Future: leszek, leszel, lesz, leszünk, lesztek, lesznek` },
      { type:"example", title:"20 Irregular Verb Examples",
        examples:[
          {hu:"Mit teszel ezzel?",en:"What do you do with this?",note:"tesz (does/puts) → teszel (2PS)"},
          {hu:"Mennyiért vetted?",en:"How much did you pay for it?",note:"vesz (buys) → vetted (past def. 2PS)"},
          {hu:"Hova viszed?",en:"Where are you taking it?",note:"visz (carries) → viszed (def. 2PS)"},
          {hu:"Nem hiszem el.",en:"I don't believe it.",note:"hisz (believes) → hiszem (def. 1PS)"},
          {hu:"Mi lesz belőle?",en:"What will become of it?",note:"lesz = future of van / becomes"},
          {hu:"Mit ettél ma?",en:"What did you eat today?",note:"eszik → ettem/ettél/evett"},
          {hu:"Sokat ivott.",en:"He/she drank a lot.",note:"iszik → ivott (past 3PS)"},
          {hu:"Péter elment.",en:"Peter left/went away.",note:"megy → ment (past indef. 3PS)"},
          {hu:"Gyere ide!",en:"Come here!",note:"jön → gyere! (irregular imperative)"},
          {hu:"Volt egyszer egy király.",en:"Once upon a time there was a king.",note:"van → volt (past 3PS)"},
          {hu:"Az egész éjszaka aludt.",en:"He/she slept all night.",note:"alszik → aludt (past 3PS)"},
          {hu:"A macska az ágyon fekszik.",en:"The cat is lying on the bed.",note:"fekszik → fekszik (3PS present)"},
          {hu:"A gyerekek a kertben játszanak.",en:"The children are playing in the garden.",note:"játszik → játszanak (3PP)"},
          {hu:"Odaadta a pénzt.",en:"He/she gave the money (there).",note:"ad → adta (past def. 3PS)"},
          {hu:"Levelet kaptam tőle.",en:"I received a letter from him/her.",note:"kap → kaptam (past indef. 1PS)"},
          {hu:"Nem tudom a választ.",en:"I don't know the answer.",note:"tud → tudom (def. 1PS)"},
          {hu:"Látod azt a házat?",en:"Do you see that house?",note:"lát → látod (def. 2PS)"},
          {hu:"Eszem valamit.",en:"I'm eating something.",note:"-ik verb: eszem NOT eszek"},
          {hu:"Iszom egy kávét.",en:"I'm drinking a coffee.",note:"-ik verb: iszom NOT iszok"},
          {hu:"Alszom.",en:"I'm sleeping.",note:"-ik verb: alszom NOT alszok"},
        ]},
      { type:"exercise", title:"Exercise — Irregular Verbs",
        instructions:"Choose the correct verb form.",
        ex_type:"mcq",
        questions:[
          {q:"Past tense of 'megy' (3rd person singular):",opts:["megyed","megy","ment","menett"],correct:2,explain:"megy (go) → ment (went). Highly irregular — must be memorized."},
          {q:"Imperative of 'jön' (Come here!):  ___ ide!",opts:["Jöjj","Jön","Gyere","Jössz"],correct:2,explain:"jön has the highly irregular imperative: gyere! (come!) — completely different from the stem."},
          {q:"1PS present of 'eszik' (I eat):  Én ___",opts:["eszek","eszem","eszik","evek"],correct:0,explain:"eszik is an -ik verb: 1PS indefinite = eszek. But definite 1PS = eszem. Without a definite object: eszek."},
          {q:"'Van' in the past tense 3PS:",opts:["van","lenne","volt","len"],correct:2,explain:"van (is/are) → volt (was/were) in past tense. Future: lesz."},
        ]},
      { type:"summary",
        summary:`This chapter covered the 17 most important irregular Hungarian verbs — high frequency words that every learner must memorize.

**What we covered:**
• v-stem verbs: tesz, vesz, visz, hisz, lesz (stem changes before vowels)
• -ik verbs: eszik, iszik, alszik, fekszik, játszik (special 1PS -m ending)
• Suppletive verbs: megy/ment, jön/jött/gyere, van/volt/lesz
• Full paradigm of van (is) across all tenses`,
        takeaways:[
          "**gyere! is the imperative of jön** — completely irregular. You'd never guess it from jön. This is one of the first words Hungarian children learn and one of the most frequent in everyday speech.",
          "**-ik verbs take -m in 1PS** — eszem, iszom, alszom. The indefinite 1PS for regular verbs is -k (látok), but -ik verbs take -m. This is why 'I eat' is eszem, not *eszek.",
          "**lesz is the future of van** — van/volt/lesz form a suppletive triad: is (present) / was (past) / will be (future). Three completely different stems.",
          "**v-stem verbs change before vowel-initial endings** — tesz → tette (past def.) because the -t- ending is vowel-initial: te-t-te.",
        ]},
    ]},
    { id:"b1-relative-clauses", title:"Relative Clauses — Ami, Aki, Amely", icon:"🔗", sections:[
      { type:"concept", title:"Connecting Clauses with Relative Pronouns",
        body:`Hungarian relative pronouns agree with whether they refer to people or things, and take case suffixes.

**Core relative pronouns:**
| Refers to | Nominative | Accusative | Examples |
|-----------|-----------|------------|---------|
| Person(s) | aki (who) | akit (whom) | A férfi, aki jött... |
| Thing(s) | ami (which/that) | amit (which) | A könyv, amit olvastam... |
| Thing(s) specific | amely (which) | amelyet | formal/written variant of ami |
| Place | ahol (where) | ahova (to where) | A város, ahol lakom... |
| Time | amikor (when) | — | A nap, amikor... |
| Reason | amiért (why) | — | Az ok, amiért... |
| Manner | ahogy (how/as) | — | Ahogy mondtad... |

**Aki = who (person), ami = which/that (thing)**
• A lány, aki ott áll, a nővérem. (The girl who is standing there is my sister.)
• A könyv, amit olvasol, nagyon érdekes. (The book that you are reading is very interesting.)

**Case suffixes apply:**
• aki → akit (acc.) · akinek (dat.) · akivel (with whom) · akinél (at whose)
• ami → amit (acc.) · aminek (dat.) · amivel (with which) · amiben (in which)

**Comma rule: relative clauses are ALWAYS set off by commas in Hungarian**

**Ahol/ahova/ahonnan — place relatives follow the location suffix logic:**
• ahol (where, static) · ahova (where to) · ahonnan (where from)
• A ház, ahol lakom... (The house where I live...)
• A city, ahova megyek... (The city I'm going to...)

**Double relative with ugyanaz/ugyanolyan:**
• Ugyanolyan kocsija van, mint nekem. (He has the same kind of car as me.)` },
      { type:"example", title:"20 Relative Clause Examples",
        examples:[
          {hu:"A fiú, aki ott áll, Péter.",en:"The boy who is standing there is Peter.",note:"aki = who (person)"},
          {hu:"A könyv, amit olvasok, nagyon jó.",en:"The book that I'm reading is very good.",note:"amit = which/that (acc. of ami)"},
          {hu:"Az ember, akit keresek, nem volt itt.",en:"The person I was looking for wasn't here.",note:"akit = whom (acc.)"},
          {hu:"Megmutatom a helyet, ahol születtem.",en:"I'll show you the place where I was born.",note:"ahol = where (static)"},
          {hu:"A város, ahova megyek, Budapest.",en:"The city I'm going to is Budapest.",note:"ahova = where to"},
          {hu:"Nem tudom, hogy miért jött.",en:"I don't know why he came.",note:"amiért = why/reason"},
          {hu:"A nap, amikor találkoztunk, csodálatos volt.",en:"The day when we met was wonderful.",note:"amikor = when"},
          {hu:"Ahogy mondtad, igaza volt.",en:"As you said, he/she was right.",note:"ahogy = as/how"},
          {hu:"A lány, akivel dolgozom, nagyon okos.",en:"The girl I work with is very smart.",note:"akivel = with whom"},
          {hu:"A ház, amelyben lakom, régi.",en:"The house I live in is old.",note:"amelyben = in which (formal)"},
          {hu:"Minden, ami fontos, fel van írva.",en:"Everything that is important is written down.",note:"ami = which/that"},
          {hu:"Mindenki, aki eljött, boldog volt.",en:"Everyone who came was happy.",note:"aki (plural: akik)"},
          {hu:"Az ok, amiért jöttem, fontos.",en:"The reason why I came is important.",note:"amiért = for which reason"},
          {hu:"A mód, ahogy csinálja, különleges.",en:"The way he/she does it is special.",note:"ahogy = how/the way"},
          {hu:"Amit mond, az igaz.",en:"What he says is true.",note:"amit as standalone pronoun"},
          {hu:"Akinek nincs pénze, az nem mehet.",en:"The one who has no money cannot go.",note:"akinek = to whom/whose"},
          {hu:"Abban a házban lakom, amelyet látok.",en:"I live in the house that I can see.",note:"amelyet = formal written style"},
          {hu:"A bolt, ahonnan jöttem, zárva volt.",en:"The shop I came from was closed.",note:"ahonnan = from where"},
          {hu:"Valami, ami nem stimmel.",en:"Something that is not right.",note:"valami + ami"},
          {hu:"Olyasmit mondott, amit nem értettem.",en:"He said something that I didn't understand.",note:"olyasmi + amit"},
        ]},
      { type:"exercise", title:"Exercise — Relative Clauses",
        instructions:"Choose the correct relative pronoun.",
        ex_type:"mcq",
        questions:[
          {q:"'The woman ___ works here is my mother.'",opts:["ami","aki","ahol","amit"],correct:1,explain:"aki = who (for persons). A nő, aki itt dolgozik = The woman who works here."},
          {q:"'The book ___ I read was interesting.'",opts:["aki","akit","amit","akivel"],correct:2,explain:"amit = which/that (accusative of ami, for things). A könyv, amit olvastam = The book that I read."},
          {q:"'The city ___ I live is beautiful.'",opts:["ahol","ahova","ahonnan","akiben"],correct:0,explain:"ahol = where (static location). A város, ahol lakom = The city where I live."},
          {q:"Relative clauses in Hungarian are ALWAYS:",opts:["without commas","set off by commas","optional with commas","only at sentence end"],correct:1,explain:"Hungarian always uses commas to set off relative clauses — both before and after. This differs from English."},
        ]},
      { type:"summary",
        summary:`This chapter covered Hungarian relative pronouns — connecting clauses to describe people, things, places, and times.

**What we covered:**
• aki (who) for people vs. ami (which/that) for things
• Case forms: akit, akinek, akivel, amit, amiben, amivel
• Place relatives: ahol/ahova/ahonnan (static/toward/from)
• Time: amikor · Reason: amiért · Manner: ahogy
• Comma rule: relative clauses always punctuated`,
        takeaways:[
          "**aki = person, ami = thing** — this is the core distinction. A lány, aki... vs. A könyv, ami... Never mix them up.",
          "**Relative pronouns take case suffixes** — akit (ACC), akinek (DAT), akivel (INS), amiben (INE). The full case system applies to relative pronouns just like to nouns.",
          "**Always use commas** — A fiú, aki ott áll, Péter. Both commas are required. This is a firm punctuation rule in Hungarian.",
          "**Ahogy = as/the way** is extremely useful — Ahogy mondtad... (As you said...) / Ahogy gondolod (As you think/wish). It's both a conjunction and relative adverb.",
        ]},
    ]},
  ]},

  { level:"B2", color:"#8b5cf6", title:"Upper Intermediate", chapters:[
    
    { id:"b1-modal", title:"Modal Verbs & Expressions", icon:"🎭", sections:[
      { type:"concept", title:"Expressing Ability, Permission, Obligation & Necessity",
        body:`Hungarian expresses modal meanings through specific verbs and suffixes, not separate 'modal verbs' like English can/must.

**-hat/-het suffix — can / may (possibility/permission):**
• mehetek (I can go), láthat (he can see), mehetünk (we can go)
• Polite requests: Segíthet? (Can he help? / Could he help?)
• Interrogative: Mehetek? (May I go? / Can I go?)

**tud — to know how / to be able to (skill/ability):**
• Tud úszni. (He can swim. / He knows how to swim.)
• Nem tudok jönni. (I can't come.)
• Different from -hat: tud = learned ability; -hat = permission/possibility

**kell — must / need to (obligation):**
• Kell mennem. (I must go.) — personal infinitive!
• Kell egy toll. (A pen is needed.) — impersonal
• Mennem kell. (I have to go.) — same meaning, different word order

**szabad — allowed to / may:**
• Szabad belépni? (May I enter?)
• Nem szabad dohányozni. (Smoking is not allowed.)
• Szabad takes infinitive, not personal infinitive

**lehet — it is possible / one can:**
• Lehet menni? (Is it possible to go? / Can one go?)
• Nem lehet tudni. (One cannot know. / It's impossible to know.)

**muszáj / szükséges — must/necessary (stronger obligation):**
• Muszáj elmennünk. (We absolutely must go.)
• Szükséges aláírni. (It is necessary to sign.)

**tilos — forbidden:**
• Tilos a belépés. (Entry is forbidden.)
• Tilos dohányozni. (Smoking is forbidden.)` },
      { type:"example", title:"20 Modal Expression Examples",
        examples:[
          {hu:"Mehetek?",en:"Can I go? / May I go?",note:"-hat suffix = permission"},
          {hu:"Láthatom?",en:"Can I see it? (definite)",note:"-hat + definite: láthat+om"},
          {hu:"Nem mehetek.",en:"I can't go.",note:"nem + -hat form"},
          {hu:"Tud úszni.",en:"He/she can swim (knows how).",note:"tud = learned ability"},
          {hu:"Nem tudok jönni.",en:"I can't come.",note:"tud = ability in negative"},
          {hu:"Mennem kell.",en:"I have to go.",note:"kell + personal infinitive"},
          {hu:"Nem kell menned.",en:"You don't have to go.",note:"nem kell = don't have to"},
          {hu:"Kell egy toll.",en:"A pen is needed.",note:"impersonal kell + noun"},
          {hu:"Szabad belépni?",en:"May I come in?",note:"szabad = permission"},
          {hu:"Nem szabad dohányozni.",en:"Smoking is not allowed.",note:"nem szabad = prohibited"},
          {hu:"Lehet menni?",en:"Is it possible to go?",note:"lehet = impersonal possibility"},
          {hu:"Nem lehet tudni.",en:"One cannot know.",note:"nem lehet = impossible"},
          {hu:"Muszáj elmennünk.",en:"We absolutely must go.",note:"muszáj = strong obligation"},
          {hu:"Tilos a belépés.",en:"Entry is forbidden.",note:"tilos = forbidden (sign language)"},
          {hu:"Tilos dohányozni.",en:"No smoking. (Smoking forbidden.)",note:"tilos + infinitive"},
          {hu:"Segíthet nekem?",en:"Can he/she help me?",note:"-hat polite/formal register"},
          {hu:"Képes megcsinálni.",en:"He/she is capable of doing it.",note:"képes = capable (stronger than tud)"},
          {hu:"Képtelen megérteni.",en:"He/she is incapable of understanding.",note:"képtelen = incapable (opposite of képes)"},
          {hu:"Kellene mennem.",en:"I should go. (conditional of kell)",note:"kellene = should (conditional kell)"},
          {hu:"Tudnál segíteni?",en:"Could you help? (polite)",note:"conditional of tud = could"},
        ]},
      { type:"exercise", title:"Exercise — Modal Expressions",
        instructions:"Choose the correct modal for each meaning.",
        ex_type:"mcq",
        questions:[
          {q:"'I can go' expressing PERMISSION:",opts:["Tudok menni.","Mehetek.","Muszáj mennem."],correct:1,explain:"-hat/-het suffix expresses permission/possibility: mehetek = I can/may go."},
          {q:"'I can swim' expressing LEARNED ABILITY:",opts:["Úszhatom.","Tudok úszni.","Lehet úszni."],correct:1,explain:"tud = knows how / is able to (learned skill): tudok úszni."},
          {q:"'Smoking is not allowed':",opts:["Nem kell dohányozni.","Nem szabad dohányozni.","Nem lehet dohányozni."],correct:1,explain:"szabad expresses social permission: nem szabad = not allowed/permitted."},
          {q:"'I have to go' — obligation with kell:",opts:["Tudok menni.","Mehetek.","Mennem kell."],correct:2,explain:"kell + personal infinitive expresses obligation: mennem kell = I have to go."},
        ]},
      { type:"summary",
        summary:"This chapter covered how Hungarian expresses modality — ability, permission, obligation, and prohibition — through specific constructions rather than dedicated modal verbs.\n\n**What we covered:**\n• -hat/-het for possibility and permission\n• tud for learned ability/skill\n• kell + personal infinitive for obligation\n• szabad for social permission\n• lehet for impersonal possibility\n• muszáj for strong necessity\n• tilos for prohibition\n• Conditional forms: kellene (should), tudnál (could you)",
        takeaways:[
          "**-hat/-het vs. tud:** -hat = permission/possibility ('may I'); tud = learned skill ('I know how to'). Different concepts, often confused.",
          "**kell + personal infinitive** — Mennem kell. The possessive ending on the infinitive shows WHO must do it.",
          "**nem kell ≠ nem szabad** — nem kell = don't have to (no obligation); nem szabad = must not (prohibition). Critical distinction.",
          "**tilos on signs** — you'll see tilos everywhere in Hungary: Tilos a belépés, Tilos dohányozni. Recognize it immediately.",
          "**kellene (conditional of kell) = should** — Mennem kellene = I should go. Much softer than Mennem kell (I must go).",
        ]
      }
    ]},
  { id:"b2-wordorder", title:"Word Order & Focus", icon:"📝", sections:[
      { type:"concept", title:"Pre-Verbal Position = Emphasis",
        body:"Hungarian word order is FREE but MEANING-DRIVEN. The golden rule:\n\n**The element directly BEFORE the verb receives FOCUS (emphasis).**\n\n| Hungarian | English meaning |\n|-----------|----------------|\n| A fiú játszik a kertben. | The boy plays in the garden. (neutral) |\n| A kertben játszik a fiú. | It's IN THE GARDEN the boy plays. |\n| A kutyával játszik a fiú. | It's WITH THE DOG the boy plays. |\n| Tegnap játszott a fiú. | It was YESTERDAY the boy played. |\n\n**Fixed rules:**\n1. **Negation:** nem/ne always directly before verb:\n   Nem megyek el. ← NOT Nem elmegyek.\n2. **Question word:** always directly before verb:\n   Hova mész? · Mit csinálsz? · Miért késtél?\n3. **Verbal prefix separates** when something else takes focus:\n   Normal: Elmegyek. → MA megyek el. (today is focused)\n4. **Topic** (known info) goes to beginning; **Focus** (new/contrasted info) before verb.\n\n**The focus slot is powerful:**\n• Péter hozta a tortát. (It was PETER who brought the cake.)\n• A tortát Péter hozta. (It was THE CAKE that Peter brought.)\n• Nem Péter hozta. (It was NOT PETER who brought it.)\n\n**Neutral sentences** (no strong focus):\n• Subject before verb, other elements after\n• Verbal prefix attached: Elmegyek. · Megeszem. · Visszajön." },
      { type:"example", title:"20 Word Order Examples",
        examples:[
          {hu:"A fiú játszik a kertben.",en:"The boy plays in the garden. (neutral)",note:"normal SVO, no special focus"},
          {hu:"A kertben játszik a fiú.",en:"It's IN THE GARDEN the boy plays.",note:"kertben before verb = focus"},
          {hu:"A kutyával játszik a fiú.",en:"It's WITH THE DOG the boy plays.",note:"kutyával before verb = focus"},
          {hu:"Péter megy a moziba.",en:"Peter is going to the cinema. (neutral)",note:"normal order"},
          {hu:"A moziba megy Péter.",en:"It's TO THE CINEMA Peter is going.",note:"moziba = focus"},
          {hu:"PÉTER megy a moziba.",en:"It's PETER who's going to the cinema.",note:"Péter = focus (subject in focus position)"},
          {hu:"Nem megyek el.",en:"I'm NOT going away.",note:"nem before verb, el separates"},
          {hu:"Hova mész?",en:"Where are you going?",note:"hova = question word before verb"},
          {hu:"Mit csinálsz?",en:"What are you doing?",note:"mit = question word before verb"},
          {hu:"Miért késtél?",en:"Why were you late?",note:"miért = question word before verb"},
          {hu:"Péter hozta a tortát.",en:"It was PETER who brought the cake.",note:"Péter before verb = focus"},
          {hu:"A tortát Péter hozta.",en:"It was THE CAKE that Peter brought.",note:"tortát = focus"},
          {hu:"Nem Péter hozta.",en:"It wasn't Peter who brought it.",note:"nem + subject before verb"},
          {hu:"MA megyek el.",en:"I'm going TODAY.",note:"ma = focus, el separates"},
          {hu:"Péter MA ment el.",en:"Peter left TODAY.",note:"ma before ment = focus"},
          {hu:"Csak egy könyvet vettem.",en:"I only bought ONE book.",note:"csak = only, restricts focus"},
          {hu:"Épp most jött.",en:"He/she just arrived NOW.",note:"épp most = just now, focus"},
          {hu:"Nem én vettem, hanem ő.",en:"I didn't buy it, HE/SHE did.",note:"nem + pronoun = contrast"},
          {hu:"Holnap lesz az esküvő.",en:"The wedding IS TOMORROW.",note:"holnap = time focus"},
          {hu:"Elmegyek, ha te is jössz.",en:"I'll go if you come too.",note:"normal: prefix attached, no special focus"},
        ]},
      { type:"exercise", title:"Exercise 15 — Word Order",
        instructions:"Choose the correctly emphasized sentence.",
        ex_type:"mcq",
        questions:[
          {q:"'IT'S PETER who sees the house' — PETER is focused:",opts:["Péter látja a házat.","A házat látja Péter.","Látja Péter a házat."],correct:0,explain:"Péter directly before verb látja = Péter is focused/emphasized"},
          {q:"Correct negation of 'elmegyek':",opts:["Nem elmegyek.","Nem megyek el.","Elmegyek nem."],correct:1,explain:"nem directly before verb, prefix separates: nem megyek el"},
          {q:"'Where are you going?' — correct form:",opts:["Mész hova?","Hova mész?","Te mész hova?"],correct:1,explain:"Question word (hova) always directly before verb (mész)"},
        ]},
      { type:"summary",
        summary:"This chapter revealed how Hungarian word order encodes information structure, with the pre-verbal position as the focus slot.\n\n**What we covered:**\n• The golden rule: element directly BEFORE the verb = focus/emphasis\n• How the same sentence yields different meanings by reordering\n• Negation (nem) always directly before verb → prefix separates\n• Question words always directly before verb\n• Topic (known info) at beginning, focus (new info) before verb\n• Contrast focus with nem + focused element",
        takeaways:["**Pre-verbal = emphasized** — whatever you put just before the verb is what you're highlighting. This is the entire system.","**English uses stress; Hungarian uses position** — 'He bought THE CAKE' (stress) = 'A tortát vette meg' (position).","**Negation always claims the focus slot** — Nem megyek el. Nem+verb is an unbreakable unit. The prefix must yield.","**Question words are natural focus elements** — Hova mész? Mit csinálsz? The question word IS the focus.","**Once mastered, you gain expressive power** — you can encode subtle emphasis differences that English can only express through tone."] }
    ]},
    { id:"b2-conjunctions", title:"Conjunctions & Complex Sentences", icon:"🔗", sections:[
      { type:"concept", title:"Connecting Clauses with Conjunctions",
        body:"**Core conjunctions:**\n| Hungarian | English | Type |\n|-----------|---------|------|\n| és | and | additive |\n| de | but | contrast |\n| vagy | or | alternative |\n| mert | because | causal |\n| hogy | that / so that | complementizer |\n| ha | if | conditional |\n| amikor / mikor | when | temporal |\n| amíg / míg | while / until | temporal |\n| miután | after | temporal |\n| mielőtt | before | temporal |\n| bár / noha / habár | although | concessive |\n| pedig | however / but (on the other hand) | contrast |\n| tehát / ezért / így | therefore / so | result |\n| ugyanis | namely / because (explaining) | explanatory |\n| sem...sem | neither...nor | negative |\n| akár...akár | either...or (inclusive) | alternative |\n\n**Double conjunctions:**\n• nemcsak..., hanem...is = not only..., but also...\n• minél..., annál... = the more..., the more...\n• egyrészt..., másrészt... = on one hand..., on the other hand...\n• ugyan..., de... = although..., yet...\n\n**hogy** — changes meaning by what follows:\n• Tudom, hogy jön. (I know that he's coming.)\n• Mondd meg neki, hogy jöjjön! (Tell him to come!) — hogy + imperative\n• Olyan finom, hogy megeszi az egészet. — consequence\n• Megkértem, hogy segítsen. (I asked him to help.) — hogy + imperative" },
      { type:"example", title:"20 Conjunction Examples",
        examples:[
          {hu:"Nem eszik, mert nem éhes.",en:"He doesn't eat because he's not hungry.",note:"mert = because (causal)"},
          {hu:"Tudja, hogy igaz.",en:"He knows that it's true.",note:"hogy = that (complementizer)"},
          {hu:"Nemcsak okos, hanem szorgalmas is.",en:"Not only smart, but also hardworking.",note:"nemcsak...hanem...is"},
          {hu:"Minél több, annál jobb.",en:"The more, the better.",note:"minél...annál (comparison)"},
          {hu:"Ha tudnék, segítenék.",en:"If I could, I would help.",note:"ha = if + conditional"},
          {hu:"Amikor hazaért, főzni kezdett.",en:"When he got home, he started cooking.",note:"amikor = when (temporal)"},
          {hu:"Amíg alszol, én főzök.",en:"While you sleep, I cook.",note:"amíg = while (simultaneous)"},
          {hu:"Várj, amíg visszajövök!",en:"Wait until I come back!",note:"amíg = until (endpoint)"},
          {hu:"Mielőtt elmentél, szóltál?",en:"Did you say anything before leaving?",note:"mielőtt = before"},
          {hu:"Miután megettük, megnéztük a filmet.",en:"After we ate, we watched the film.",note:"miután = after"},
          {hu:"Bár fáradt volt, dolgozott.",en:"Although he was tired, he worked.",note:"bár = although (concessive)"},
          {hu:"Péter fáradt, én pedig pihenten vagyok.",en:"Peter is tired, I on the other hand am rested.",note:"pedig = on the other hand"},
          {hu:"Eső volt, tehát otthon maradtunk.",en:"It rained, therefore we stayed home.",note:"tehát = therefore"},
          {hu:"Siet, ugyanis késik.",en:"He's hurrying, because he's late.",note:"ugyanis = because (explaining)"},
          {hu:"Sem pénze, sem ideje nincs.",en:"He has neither money nor time.",note:"sem...sem = neither...nor"},
          {hu:"Megkértem, hogy segítsen.",en:"I asked him to help.",note:"hogy + imperative = request"},
          {hu:"Olyan fáradt, hogy alig áll.",en:"So tired he can barely stand.",note:"hogy = consequence"},
          {hu:"Vagy megiszod, vagy elvisszük.",en:"Either you drink it or we take it away.",note:"vagy...vagy = either...or"},
          {hu:"Egyrészt drága, másrészt szép.",en:"On one hand it's expensive, on the other beautiful.",note:"egyrészt...másrészt"},
          {hu:"Ugyan szép, de drága.",en:"Although it's beautiful, it's expensive.",note:"ugyan...de = although...yet"},
        ]},
      { type:"exercise", title:"Exercise 16 — Conjunctions",
        instructions:"Choose the correct conjunction.",
        ex_type:"mcq",
        questions:[
          {q:"'He doesn't come ___ he is sick.'",opts:["hogy","mert","ha"],correct:1,explain:"mert = because (causal conjunction)"},
          {q:"'___ I knew it, I would help.'",opts:["Amikor","Ha","Hogy"],correct:1,explain:"Ha = if (conditional conjunction)"},
          {q:"'Not only smart ___ also kind.'",opts:["hanem","mert","vagy"],correct:0,explain:"nemcsak...hanem...is = not only...but also"},
        ]},
      { type:"summary",
        summary:"This chapter covered the full range of Hungarian conjunctions and how to build complex multi-clause sentences.\n\n**What we covered:**\n• Core additive, contrast, causal, temporal, and conditional conjunctions\n• Double conjunctions: nemcsak...hanem...is, minél...annál\n• The versatile hogy and its different uses depending on what follows\n• Conditional clauses with ha\n• Temporal clauses with amikor, amíg, mielőtt, miután\n• Concessive clauses with bár/noha",
        takeaways:["**hogy is the most versatile conjunction** — 'that', 'so that', 'in order to', even introducing commands (hogy + imperative).","**nemcsak...hanem...is is B2 gold** — it's one of the most natural-sounding structures once internalized. Nemcsak okos, hanem kedves is.","**minél...annál encodes comparison** — Minél több, annál jobb = The more, the better. A very elegant construction.","**mert (because) vs. ugyanis (namely/because)** — mert introduces the cause; ugyanis explains/elaborates, usually mid-sentence.","**Temporal conjunctions set scene** — Amikor hazaért, főzni kezdett. Mastering these transforms your storytelling ability."] }
    ]},
    { id:"b2-passive", title:"Passive Voice & Reported Speech", icon:"🗣️", sections:[
      { type:"concept", title:"No Passive — Here's What Hungarian Uses Instead",
        body:"**Hungarian has NO active passive voice!** Three strategies replace it:\n\n**Strategy 1 — 3rd person plural as impersonal:**\n• A házat tegnap eladták. (The house was sold yesterday.)\n  Literal: 'They sold the house' — who they is, unknown.\n• Azt mondják, hogy... (It is said that...)\n• Úgy hírlik, hogy... (It is rumored that...)\n• Letartóztatták. (He/she was arrested.) — lit. 'They arrested him'\n\n**Strategy 2 — -ható/-hető suffix (can be done = -able):**\n• A feladat megoldható. (The task is solvable.)\n• A ház eladható. (The house is for sale / sellable.)\n• A szöveg lefordítható. (The text can be translated.)\n\n**Strategy 3 — kell + personal infinitive:**\n• Az ajtót ki kell nyitni. (The door needs to be opened.)\n• A levelet meg kell írni. (The letter must be written.)\n\n**Reported Speech — TENSE DOES NOT CHANGE!**\nThis is very different from English!\n• Direct: Péter mondta: 'Megyek.' (Peter said: 'I'm going.')\n• Indirect: Péter mondta, hogy megy. (Peter said he IS going.) ← stays present!\n• NOT: *mondta, hogy ment ← wrong approach\n\n**Reported questions:**\n• 'Hol van Péter?' → Megkérdeztem, hogy hol van Péter.\n  (I asked where Peter was.) — still present tense!\n• 'Mikor jön?' → Kérdeztem, hogy mikor jön.\n  (I asked when he was coming.) — still present tense!" },
      { type:"example", title:"20 Passive & Reported Speech Examples",
        examples:[
          {hu:"A házat tegnap eladták.",en:"The house was sold yesterday.",note:"3PP impersonal = passive meaning"},
          {hu:"Letartóztatták.",en:"He/she was arrested.",note:"impersonal 3PP — who did it unknown"},
          {hu:"Azt mondják, hogy esni fog.",en:"It is said that it will rain.",note:"azt mondják = it is said"},
          {hu:"Úgy hírlik, hogy elment.",en:"It is rumored that he left.",note:"úgy hírlik = it is rumored"},
          {hu:"A feladat megoldható.",en:"The task is solvable.",note:"-ható = can be done"},
          {hu:"A ház eladható.",en:"The house is sellable / for sale.",note:"-ható suffix"},
          {hu:"Ez a szó lefordítható.",en:"This word can be translated.",note:"-ható + prefix"},
          {hu:"Az ajtót ki kell nyitni.",en:"The door needs to be opened.",note:"kell + infinitive"},
          {hu:"A munkát be kell fejezni.",en:"The work needs to be finished.",note:"kell + infinitive"},
          {hu:"Mondta, hogy jön.",en:"He/she said that he/she is coming.",note:"tense unchanged! jön not jött"},
          {hu:"Mondta, hogy éhes.",en:"He/she said that he/she is hungry.",note:"present → present in reported"},
          {hu:"Gondolta, hogy itt van.",en:"He/she thought he/she is here.",note:"thought it was still present"},
          {hu:"Megkérdeztem, hol van.",en:"I asked where he/she was.",note:"present form in reported question"},
          {hu:"Kérdezte, mikor jövök.",en:"He/she asked when I'm coming.",note:"present in reported question"},
          {hu:"Azt hitte, hogy alvok.",en:"He/she thought I was sleeping.",note:"present in complement clause"},
          {hu:"Bejelentették, hogy bezár.",en:"They announced that it is closing.",note:"3PP + hogy + present"},
          {hu:"Tudtuk, hogy igaza van.",en:"We knew he/she was right.",note:"igaza van stays present"},
          {hu:"Kiderült, hogy tévedtünk.",en:"It turned out that we were wrong.",note:"kiderül = turns out"},
          {hu:"Látható volt, hogy fáradt.",en:"It was visible that he was tired.",note:"-ható adj. form: látható = visible"},
          {hu:"Hallható volt a zene.",en:"The music could be heard.",note:"-ható: hall → hallható = audible"},
        ]},
      { type:"exercise", title:"Exercise 17 — Reported Speech",
        instructions:"Choose the correct form.",
        ex_type:"mcq",
        questions:[
          {q:"Direct: 'Megyek' → Reported: Mondta, hogy ___.",opts:["ment","megy","majd megy"],correct:1,explain:"Hungarian reported speech does NOT change tense: mondta, hogy megy (stays present)"},
          {q:"Passive meaning 'the house was sold':",opts:["A házat eladta.","A házat eladták.","A ház eladva volt."],correct:1,explain:"3PP impersonal (eladták = they sold it) = passive meaning"},
          {q:"'-ható' suffix means:",opts:["must be done","was done","can be done (-able)"],correct:2,explain:"-ható/-hető = can be done / -able: megoldható = solvable"},
        ]},
      { type:"summary",
        summary:"This chapter showed how Hungarian avoids the passive voice and handles reported speech without tense shift.\n\n**What we covered:**\n• Strategy 1: 3rd person plural impersonal (eladták = was sold)\n• Strategy 2: -ható/-hető suffix for 'can be done / -able'\n• Strategy 3: kell + infinitive for 'must be done'\n• Reported speech: tense does NOT change (says he is, not was)\n• Reported questions keep present tense too",
        takeaways:["**No passive voice — ever** — Hungarian expresses passive meaning through active constructions. This is a fundamental difference from English.","**3PP impersonal is the go-to passive equivalent** — A házat eladták. Who sold it? Unknown. This is natural and extremely common.","**-ható/-hető is a productive suffix** — any transitive verb can become -able: megoldható, eladható, hallható, látható.","**Reported speech tense rule is the opposite of English** — English: 'He said he WAS tired'. Hungarian: Mondta, hogy fáradt (IS tired). No backshift ever.","**Reported questions also keep present** — Kérdezte, hol VAN (not volt). This consistency makes reported speech easier than in English."] }
    ]},
{ id:"b2-subjunctive", title:"Subjunctive & Purpose Clauses", icon:"🎭", sections:[
      { type:"concept", title:"Expressing Purpose, Request, and Volition",
        body:`Hungarian uses the **imperative/subjunctive form** in a wide range of subordinate clauses — far more than English uses its subjunctive. This is one of the most important B2 grammar points.

**When the subjunctive (imperative form) is used in subordinate clauses:**

**1. Purpose clauses with hogy (so that / in order that):**
• Azért jöttem, hogy segítsek. (I came so that I could help.)
• Odaadta, hogy megnézhessem. (He gave it so I could look at it.)

**2. Indirect commands with kér, mond, kér, parancsol:**
• Megkértem, hogy jöjjön. (I asked him to come.)
• Mondtam, hogy ne menjen el. (I told him not to leave.)
• Megparancsolta, hogy csöndben legyünk. (He ordered us to be quiet.)

**3. After verbs of wanting/wishing for someone else:**
• Azt szeretném, hogy eljöjjön. (I would like him to come.)
• Azt akarom, hogy tanuljál. (I want you to study.)

**4. After it is necessary/important that:**
• Fontos, hogy megértsd. (It is important that you understand.)
• Szükséges, hogy ott legyen. (It is necessary that he be there.)

**5. With nehogy (lest / so that...not):**
• Vigyázz, nehogy elessenek! (Be careful lest they fall!)
• Zárd be az ajtót, nehogy kijöjjön a kutya! (Close the door so the dog doesn't get out!)

**The pattern:** kérem/akarom/fontos + hogy + SUBJUNCTIVE (= imperative form)

**Key difference from reported speech:**
• Mondta, hogy fáradt. (He said he was tired.) → present, NO subjunctive
• Mondtam, hogy jöjjön. (I told him to come.) → command, USE subjunctive` },
      { type:"example", title:"20 Subjunctive & Purpose Examples",
        examples:[
          {hu:"Azért jöttem, hogy segítsek.",en:"I came in order to help.",note:"hogy + subjunctive = purpose"},
          {hu:"Megkértem, hogy jöjjön el.",en:"I asked him/her to come.",note:"kér + hogy + subj."},
          {hu:"Azt szeretném, hogy maradj.",en:"I would like you to stay.",note:"szeretném + hogy + subj."},
          {hu:"Fontos, hogy megértsd.",en:"It is important that you understand.",note:"fontos + hogy + subj."},
          {hu:"Mondtam, hogy ne menj oda.",en:"I told you not to go there.",note:"ne + subj. = negative subj."},
          {hu:"Szükséges, hogy ott legyen.",en:"It is necessary that he/she be there.",note:"szükséges + hogy + subj."},
          {hu:"Kérte, hogy csöndben legyünk.",en:"He/she asked us to be quiet.",note:"kér + hogy + subj. plural"},
          {hu:"Megengedte, hogy bemenjen.",en:"He/she allowed him/her to go in.",note:"megenged + hogy + subj."},
          {hu:"Vigyázz, nehogy eless!",en:"Be careful not to fall!",note:"nehogy = lest / so that...not"},
          {hu:"Zárd be, nehogy kinyíljon!",en:"Close it so it doesn't open!",note:"nehogy = warning"},
          {hu:"Azt akarom, hogy tanuljál.",en:"I want you to study.",note:"akar + hogy + subj. (2PS)"},
          {hu:"Ajánlotta, hogy próbáljam ki.",en:"He/she recommended that I try it.",note:"ajánl + hogy + subj."},
          {hu:"Szólt, hogy várjam meg.",en:"He/she said to wait for him/her.",note:"szól + hogy + subj."},
          {hu:"Ideje, hogy hazamenjünk.",en:"It is time for us to go home.",note:"ideje (hogy) + subj."},
          {hu:"Jó lenne, ha eljönnél.",en:"It would be good if you came.",note:"ha + conditional (not subj.)"},
          {hu:"Küldöm, hogy elolvassa.",en:"I'm sending it for him/her to read.",note:"purpose: hogy + subj."},
          {hu:"Hívtam, hogy megkérdezzem.",en:"I called to ask.",note:"hogy + subj. of purpose"},
          {hu:"Rendeltem, hogy holnapra legyen.",en:"I ordered it to be ready by tomorrow.",note:"hogy + legyen"},
          {hu:"Elvittem, hogy megjavítsák.",en:"I took it to be repaired.",note:"hogy + subj. passive-like"},
          {hu:"Megparancsolta, hogy üljünk le.",en:"He/she ordered us to sit down.",note:"parancsol + hogy + subj."},
        ]},
      { type:"exercise", title:"Exercise — Subjunctive Clauses",
        instructions:"Choose the correct form.",
        ex_type:"mcq",
        questions:[
          {q:"'I asked him to come' — correct Hungarian:",opts:["Megkértem, hogy jön.","Megkértem, hogy jöjjön.","Megkértem, hogy jönni.","Megkértem, hogy jött."],correct:1,explain:"After megkért (asked/requested), Hungarian requires subjunctive (imperative form) in the hogy clause: jöjjön."},
          {q:"'It is important that you understand' — correct form:",opts:["Fontos, hogy megérted.","Fontos, hogy megérteni.","Fontos, hogy megértsd.","Fontos, hogy megértett."],correct:2,explain:"Fontos/szükséges + hogy + subjunctive: megértsd (2PS subjunctive of megért)."},
          {q:"'Be careful not to fall!' — which word introduces the negative purpose:",opts:["hogy ne","nehogy","ne hogy","hogynem"],correct:1,explain:"nehogy = lest / so that...not. Vigyázz, nehogy elesss! It is written as one word."},
          {q:"'I told him he was tired' vs. 'I told him to rest' — which uses subjunctive?",opts:["Both use subjunctive","Neither uses subjunctive","'Told him he was tired'","'Told him to rest'"],correct:3,explain:"Reported statement (he was tired) uses indicative: mondta, hogy fáradt. Indirect command (to rest) uses subjunctive: mondtam, hogy pihenjen."},
        ]},
      { type:"summary",
        summary:`This chapter covered the Hungarian subjunctive — the imperative form used in subordinate clauses far more widely than English subjunctive.

**What we covered:**
• Purpose clauses: azért, hogy + subjunctive (in order to)
• Indirect commands: kér/mond/parancsol + hogy + subjunctive
• Volition for others: akar/szeretne + hogy + subjunctive
• Impersonal expressions: fontos/szükséges + hogy + subjunctive
• Negative purpose: nehogy (lest / so that...not)
• Key distinction: reported fact (indicative) vs. reported command (subjunctive)`,
        takeaways:[
          "**Hogy + subjunctive ≠ hogy + indicative** — mondta, hogy fáradt (he said he was tired — indicative) vs. mondtam, hogy pihenjen (I told him to rest — subjunctive). The verb type before hogy determines which follows.",
          "**Subjunctive = imperative form** — there is no separate subjunctive paradigm in Hungarian. The same form used for commands (Jöjjön! Come!) is used in subordinate clauses (Kértem, hogy jöjjön).",
          "**nehogy is one word** — vigyázz, nehogy elessenek! It means 'be careful that they don't fall' or 'lest they fall'. Very common in everyday warnings.",
          "**Ideje, hogy... (It's time that...)** is a very common phrase — ideje, hogy hazamenjünk = it's time we went home. The subjunctive is required.",
        ]},
    ]},
    { id:"b2-body-health", title:"Body, Health & Medical Language", icon:"🏥", sections:[
      { type:"concept", title:"Body Parts, Health Vocabulary & Medical Conversations",
        body:`**Body parts (testrészek):**
| Hungarian | English | Hungarian | English |
|-----------|---------|-----------|---------|
| fej | head | arc | face |
| szem | eye | fül | ear |
| orr | nose | száj | mouth |
| fog | tooth | nyelv | tongue |
| nyak | neck | váll | shoulder |
| kar | arm | kéz | hand |
| ujj | finger | köröm | nail |
| mellkas | chest | has | stomach/abdomen |
| hát | back | derék | waist |
| láb | leg/foot | térd | knee |
| boka | ankle | talpam | sole of foot |

**Expressing health problems:**
• Fáj a fejem. — My head hurts. (fáj = it hurts, 3PS subject)
• Fájnak a fogaim. — My teeth hurt. (plural subject → fájnak)
• Rosszul vagyok. — I feel unwell.
• Beteg vagyok. — I am sick/ill.
• Hányingerem van. — I feel nauseous.
• Szédülök. — I am dizzy.
• Köhögök. — I am coughing.
• Láz van nálam. / Lázam van. — I have a fever.

**At the doctor (orvosságnál):**
• Mikor kezdődtek a tünetek? — When did the symptoms start?
• Hol fáj? — Where does it hurt?
• Nyomja meg itt. — Press here.
• Vegyen be naponta háromszor. — Take it three times a day.
• Felírok egy receptet. — I will write a prescription.
• Vér/vizeletvizsgálat — blood/urine test

**Common illnesses:**
megfázás (cold) · influenza (flu) · allergia (allergy) · magas vérnyomás (high blood pressure) · cukorbetegség (diabetes) · törés (fracture) · seb (wound) · égési sérülés (burn)` },
      { type:"example", title:"20 Health & Body Examples",
        examples:[
          {hu:"Fáj a torkom.",en:"My throat hurts.",note:"fáj (3PS) + a torkom (subject)"},
          {hu:"Fájnak a lábam.",en:"My legs hurt.",note:"fájnak (3PP) for plural body part"},
          {hu:"Rosszul érzem magam.",en:"I feel unwell.",note:"magam = myself (reflexive)"},
          {hu:"Magas lázam van.",en:"I have a high fever.",note:"lázam = my fever (possessive)"},
          {hu:"Orvoshoz kellene mennem.",en:"I should go to the doctor.",note:"kellene + personal inf."},
          {hu:"Allergás vagyok a penicillinre.",en:"I am allergic to penicillin.",note:"-ra = on penicillin"},
          {hu:"Vérnyomásom magas.",en:"My blood pressure is high.",note:"vérnyomásom = my blood pressure"},
          {hu:"Naponta kétszer kell bevennem.",en:"I need to take it twice a day.",note:"naponta = daily"},
          {hu:"Mikor volt utoljára orvosánál?",en:"When were you last at the doctor's?",note:"utoljára = last time"},
          {hu:"Hol fáj pontosan?",en:"Where exactly does it hurt?",note:"pontosan = exactly"},
          {hu:"Köhögök és náthás vagyok.",en:"I am coughing and have a cold.",note:"náthás = having a cold"},
          {hu:"Betegállományban vagyok.",en:"I am on sick leave.",note:"betegállomány = sick leave"},
          {hu:"Gyógyszer nélkül is elmúlik.",en:"It will pass without medicine too.",note:"elmúlik = passes/goes away"},
          {hu:"Menjen el a sürgősségre.",en:"Please go to the emergency room.",note:"sürgősség = emergency"},
          {hu:"Vérvétel szükséges.",en:"A blood draw is necessary.",note:"vérvétel = blood draw"},
          {hu:"Törött a csuklóm.",en:"My wrist is broken.",note:"csukló = wrist"},
          {hu:"Érzéstelenítőt kap.",en:"You will receive an anesthetic.",note:"érzéstelenítő = anesthetic"},
          {hu:"Pihenjen sokat és igyon folyadékot.",en:"Rest a lot and drink fluids.",note:"standard doctor advice"},
          {hu:"Az égési sérülés nem mély.",en:"The burn is not deep.",note:"égési sérülés = burn injury"},
          {hu:"Szédülök, ha felállok.",en:"I get dizzy when I stand up.",note:"szédül = to be dizzy"},
        ]},
      { type:"exercise", title:"Exercise — Body & Health",
        instructions:"Choose the correct form.",
        ex_type:"mcq",
        questions:[
          {q:"'My head hurts' — the verb agrees with:",opts:["The speaker (1PS)","The head (3PS)","The pain (3PS)","Always 3PS for fáj"],correct:1,explain:"Fáj a fejem — the subject is 'a fejem' (my head), so fáj is 3PS. The person experiencing pain is not the grammatical subject."},
          {q:"'My teeth hurt' — correct form:",opts:["Fáj a fogaim.","Fájnak a fogaim.","Fájok a fogaim.","A fogaim fáj."],correct:1,explain:"Fogaim (my teeth) is plural → fájnak (3PP). The verb must agree with the plural noun."},
          {q:"'I feel unwell' in Hungarian:",opts:["Rosszul érzem magam.","Beteg érzem.","Fáj vagyok.","Rosszul vagyok érezve."],correct:0,explain:"Rosszul érzem magam = I feel myself badly = I feel unwell. The reflexive magam is required."},
          {q:"'Take it three times a day' — frequency expression:",opts:["háromkor naponta","naponta háromszor","három naponta","háromszor naponkénti"],correct:1,explain:"naponta háromszor = three times a day. naponta = daily (adverbial), háromszor = three times."},
        ]},
      { type:"summary",
        summary:`This chapter covered the vocabulary and grammar needed to discuss health, the body, and medical situations.

**What we covered:**
• Complete body parts vocabulary
• The fáj/fájnak construction (subject is the body part, not the person)
• Common symptoms and illness vocabulary
• Medical appointment language
• Medication instructions`,
        takeaways:[
          "**Fáj a fejem — the body part is the subject** — not the person. 'My head hurts' = 'My head hurts me' in structure. Fáj (3PS singular), fájnak (3PP plural).",
          "**Rosszul érzem magam** — the reflexive magam is required for 'I feel'. Rosszul vagyok (I am unwell) is also common but slightly different in nuance.",
          "**Beteg vagyok ≠ Rosszul érzem magam** — beteg = sick (medical state); rosszul érzem magam = I feel unwell (subjective feeling, could be temporary).",
          "**Lázam van vs. van lázam** — both are correct, but lázam van (possessive first) is more emphatic. Láz van nálam is another option.",
        ]},
    ]},
  ]},

  { level:"C1", color:"#ef4444", title:"Advanced", chapters:[
    
    { id:"b2-adverbs-time", title:"Adverbs of Time & Manner", icon:"⌚", sections:[
      { type:"concept", title:"Expressing When and How in Hungarian",
        body:`**Adverbs of Time — key suffixes:**

**-kor:** at a point in time
• háromkor (at three), karácsonykor (at Christmas), születésnapkor (on a birthday)

**-ban/-ben:** in a period
• januárban (in January), reggel (in the morning), télen (in winter)

**-on/-en/-ön:** on a day/date
• hétfőn (on Monday), március 15-én (on March 15th)

**-ig:** until / up to
• ötig (until five), máig (until today), holnapig (until tomorrow)

**-ra/-re:** in (amount of time from now)
• egy órára (in one hour), holnapra (by tomorrow)

**-val/-vel ezelőtt:** ago
• két nappal ezelőtt (two days ago), évekkel ezelőtt (years ago)

**múlva:** in (future time from now)
• tíz perc múlva (in ten minutes), egy hét múlva (in a week)

**Adverbs of Manner — key patterns:**

**-n/-an/-en/-on (adverb from adjective):** quickly, beautifully...
• gyorsan (quickly), szépen (beautifully), lassan (slowly), boldogan (happily)

**-képpen/-képp:** in the manner of
• barátságosan (in a friendly manner), természetesen (naturally, of course)

**Postpositions for manner:**
• szerint (according to): szerintem (in my opinion), a térkép szerint (according to the map)
• által (by means of / by): a postán által (via the post)
• nélkül (without): víz nélkül (without water), pénz nélkül (without money)
• helyett (instead of): tea helyett kávét (coffee instead of tea)
• miatt (because of): az eső miatt (because of the rain)` },

        examples:[
          {hu:"háromkor",en:"at three (o'clock)",note:"-kor = at a point in time"},
          {hu:"hétfőn",en:"on Monday",note:"-n = on a day of the week"},
          {hu:"januárban",en:"in January",note:"-ban = in a month"},
          {hu:"télen",en:"in winter",note:"-en after season"},
          {hu:"reggel",en:"in the morning",note:"standalone time word (no suffix)"},
          {hu:"este",en:"in the evening",note:"standalone time word"},
          {hu:"ötig maradok.",en:"I'm staying until five.",note:"-ig = until"},
          {hu:"tíz perc múlva",en:"in ten minutes",note:"múlva = in [future time]"},
          {hu:"két nappal ezelőtt",en:"two days ago",note:"-val ezelőtt = ago"},
          {hu:"holnapra",en:"by tomorrow",note:"-ra = by [deadline]"},
          {hu:"Gyorsan fut.",en:"He runs quickly.",note:"-an = adverb from adj"},
          {hu:"Szépen énekel.",en:"She sings beautifully.",note:"-en = adverb from adj"},
          {hu:"Lassan, de biztosan.",en:"Slowly but surely.",note:"-an adverb"},
          {hu:"természetesen",en:"naturally / of course",note:"-en adverb (also: of course!)"},
          {hu:"szerintem",en:"in my opinion",note:"szerint+em personal postposition"},
          {hu:"a térkép szerint",en:"according to the map",note:"szerint postposition"},
          {hu:"pénz nélkül",en:"without money",note:"nélkül = without"},
          {hu:"az eső miatt",en:"because of the rain",note:"miatt = because of"},
          {hu:"tea helyett",en:"instead of tea",note:"helyett = instead of"},
          {hu:"boldogan éltek.",en:"They lived happily.",note:"-an adverb + time narrative"},
        ]},
      { type:"exercise", title:"Exercise — Time & Manner",
        instructions:"Choose the correct suffix or postposition.",
        ex_type:"mcq",
        questions:[
          {q:"'On Monday' in Hungarian:",opts:["hétfőn","hétfőkor","hétfőben"],correct:0,explain:"Days of the week take -n/-en/-ön: hétfőn (on Monday)."},
          {q:"'In January' in Hungarian:",opts:["januárkor","januárban","januáron"],correct:1,explain:"Months take -ban/-ben: januárban (in January)."},
          {q:"'Without money' in Hungarian:",opts:["pénz nélkül","pénz helyett","pénz miatt"],correct:0,explain:"nélkül = without. pénz nélkül = without money."},
          {q:"'In ten minutes' (future) in Hungarian:",opts:["tíz perc ezelőtt","tíz perc múlva","tíz perckor"],correct:1,explain:"múlva = in [amount of time from now]. tíz perc múlva = in ten minutes."},
        ]},
      { type:"summary",
        summary:"This chapter covered the rich system of time and manner expressions in Hungarian.\n\n**What we covered:**\n• -kor for points in time; -ban/-ben for periods; -n/-on/-en/-ön for days\n• -ig for 'until'; múlva for 'in [future time]'; -val ezelőtt for 'ago'\n• Adverbs from adjectives: -n/-an/-en suffixes\n• Key postpositions: szerint, nélkül, miatt, helyett, által\n• Personal postpositions: szerintem (in my opinion), nélkülem (without me)",
        takeaways:[
          "**-kor vs. -ban vs. -n:** -kor = at a time-point (háromkor); -ban = in a period (januárban); -n = on a day (hétfőn). Three different temporal slots.",
          "**múlva vs. ezelőtt:** tíz perc múlva = in ten minutes (future); tíz perccel ezelőtt = ten minutes ago (past). Temporal anchors.",

          "**szerintem is everywhere** — in my opinion, I think. Learn all 6 personal forms: szerintem, szerinted, szerinte, szerintünk, szerintetek, szerintük.",
